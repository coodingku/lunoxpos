<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS SPA - TRANSAKSI INPUT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen font-sans">

    <header class="bg-white border-b p-4 sticky top-0 z-10 shadow-sm">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-slate-800"><i class="fa fa-cash-register mr-2 text-blue-600"></i>POS <span class="text-blue-600">SPA</span></h1>
            <div id="clock" class="text-sm font-mono font-bold text-slate-500">00:00:00</div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-6">
        <div class="bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden">
            <div class="bg-blue-600 p-6 text-white">
                <h2 class="text-lg font-bold">Input Transaksi Baru</h2>
                <p class="text-xs opacity-80">Pastikan data therapist dan durasi sudah benar.</p>
            </div>

            <div class="p-8 space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-black uppercase text-slate-500 mb-2">Outlet</label>
                        <select id="pos-outlet" onchange="loadTherapists()" class="w-full p-4 bg-slate-100 rounded-2xl border-none outline-none font-bold text-slate-700">
                            <option value="Delta">DELTA SPA</option>
                            <option value="Cabana">CABANA SPA</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-black uppercase text-slate-500 mb-2">Pilih Therapist (Standby)</label>
                        <select id="pos-therapist" class="w-full p-4 bg-slate-100 rounded-2xl border-none outline-none font-bold text-blue-600">
                            <option value="">-- Memuat Therapist --</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-black uppercase text-slate-500 mb-2">Layanan / Package</label>
                        <select id="pos-service" class="w-full p-4 bg-slate-100 rounded-2xl border-none outline-none font-bold">
                            <option value="Traditional Massage">Traditional Massage</option>
                            <option value="Shiatsu Therapy">Shiatsu Therapy</option>
                            <option value="Aromatherapy">Aromatherapy</option>
                            <option value="Stone Massage">Stone Massage</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-black uppercase text-slate-500 mb-2">Durasi (Menit)</label>
                        <select id="pos-duration" class="w-full p-4 bg-slate-100 rounded-2xl border-none outline-none font-bold text-red-600">
                            <option value="60">60 Menit</option>
                            <option value="90">90 Menit</option>
                            <option value="120">120 Menit</option>
                        </select>
                    </div>
                </div>

                <hr class="border-slate-100">

                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-xs font-bold text-slate-400 uppercase">Status Input</p>
                        <p id="input-status" class="text-sm font-bold text-emerald-600">Ready</p>
                    </div>
                    <button onclick="prosesTransaksi()" class="bg-blue-600 hover:bg-blue-700 text-white px-10 py-4 rounded-2xl font-black shadow-lg shadow-blue-200 transition-all flex items-center">
                        <i class="fa fa-save mr-3"></i> SIMPAN & START TIMER
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const SB_URL = "https://mbzoydcehhvjdqfefflo.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1iem95ZGNlaGh2amRxZmVmZmxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NzYzNjcsImV4cCI6MjA4ODQ1MjM2N30.q5Ok1HJEeUIh-93KoXuH0zYqRN4i3LcweRMG9pWJkRg";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        // Update Jam
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID');
        }, 1000);

        // Load Therapist yang statusnya 'standby' atau 'checkin'
        async function loadTherapists() {
            const outlet = document.getElementById('pos-outlet').value;
            const select = document.getElementById('pos-therapist');
            
            const { data, error } = await _supabase
                .from('therapists')
                .select('t_id, name')
                .eq('outlet_name', outlet)
                .in('status', ['standby', 'checkin']);

            select.innerHTML = '<option value="">Pilih Therapist</option>';
            if (data) {
                data.forEach(t => {
                    select.innerHTML += `<option value="${t.t_id}">${t.t_id} - ${t.name}</option>`;
                });
            }
        }

        async function prosesTransaksi() {
            const tid = document.getElementById('pos-therapist').value;
            const duration = parseInt(document.getElementById('pos-duration').value);
            const service = document.getElementById('pos-service').value;
            const outlet = document.getElementById('pos-outlet').value;

            if (!tid) return alert("Pilih Therapist Terlebih Dahulu!");

            document.getElementById('input-status').innerText = "Memproses...";
            
            // 1. Hitung Waktu Selesai
            const startTime = new Date();
            const finishTime = new Date(startTime.getTime() + duration * 60000).toISOString();

            // 2. Update status therapist di database (Akan otomatis men-trigger Floor Map)
            const { error: updateError } = await _supabase
                .from('therapists')
                .update({ 
                    status: 'progress', 
                    end_time: finishTime 
                })
                .eq('t_id', tid);

            if (updateError) {
                alert("Gagal update status therapist!");
                return;
            }

            // 3. Catat ke log laporan penjualan (Otomatis masuk ke laporan admin)
            // Catatan: Pastikan kolom product_name dan price ada di tabel orders Anda
            const { error: logError } = await _supabase
                .from('orders')
                .insert([{
                    product_name: `SPA: ${service} (${duration}m)`,
                    qty: 1,
                    status: 'completed',
                    outlet_name: outlet
                    // Anda bisa menambahkan harga di sini jika diperlukan
                }]);

            document.getElementById('input-status').innerText = "Berhasil Disimpan!";
            alert(`Transaksi ${tid} Berhasil! Timer di Floor Map sudah dimulai.`);
            
            // Reset Form
            document.getElementById('pos-therapist').value = "";
            loadTherapists();
        }

        // Load Awal
        loadTherapists();
    </script>
</body>
</html>

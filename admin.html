<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUNOX ADMIN CENTRAL - PREMIUM V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        .outlet-cabana { border-left: 6px solid #f97316; }
        .outlet-delta { border-left: 6px solid #3b82f6; }
        .outlet-lunox { border-left: 6px solid #a855f7; }
        .active-tab { background-color: #3b82f6 !important; color: white !important; border-radius: 12px; }
        .animate-new { animation: slideIn 0.5s ease-out; border: 2px solid #fbbf24; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none !important; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">

    <div id="login-overlay" class="fixed inset-0 bg-slate-950 z-[100] flex items-center justify-center p-6">
        <div class="bg-slate-800 p-8 rounded-3xl w-full max-w-md border border-slate-700 shadow-2xl text-center">
            <h1 class="text-3xl font-black italic mb-8 uppercase text-white">Lunox <span class="text-blue-500">Auth</span></h1>
            <div class="space-y-4">
                <input type="text" id="user-input" placeholder="Username" class="w-full p-4 bg-slate-900 rounded-xl outline-none border border-slate-700 font-bold text-white">
                <input type="password" id="pass-input" placeholder="Password" class="w-full p-4 bg-slate-900 rounded-xl outline-none border border-slate-700 font-bold text-white">
                <button onclick="handleLogin()" class="w-full bg-blue-600 py-4 rounded-xl font-black uppercase hover:bg-blue-700 transition">Masuk</button>
                <p id="login-error" class="text-red-500 text-xs font-bold hidden">Akses Ditolak!</p>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <header class="bg-slate-800 p-6 shadow-2xl sticky top-0 z-50 border-b border-slate-700 no-print">
            <div class="max-w-7xl mx-auto flex flex-col lg:flex-row justify-between items-center gap-6">
                <div>
                    <h1 class="text-2xl font-black tracking-tighter italic">LUNOX <span class="text-blue-500 underline">ADMIN</span></h1>
                    <p id="role-display" class="text-[10px] font-black uppercase text-blue-400"></p>
                </div>
                <nav class="flex bg-slate-900 p-1 rounded-2xl border border-slate-700">
                    <button onclick="showTab('monitor')" id="tab-monitor" class="px-6 py-2 text-xs font-black active-tab">MONITORING</button>
                    <button onclick="showTab('inventory')" id="tab-inventory" class="px-6 py-2 text-xs font-black">PRODUK</button>
                    <button onclick="showTab('report')" id="tab-report" class="px-6 py-2 text-xs font-black">LAPORAN</button>
                </nav>
                <div class="flex gap-2">
                    <button id="enable-audio" onclick="activateAudio()" class="bg-yellow-500 text-slate-900 px-5 py-2 rounded-xl text-xs font-black animate-pulse">
                        <i class="fa fa-volume-up mr-2"></i> AKTIFKAN SUARA
                    </button>
                    <button onclick="location.reload()" class="bg-red-600 px-5 py-2 rounded-xl text-xs font-black uppercase">Logout</button>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto p-6">
            <div id="section-monitor" class="tab-content">
                <div class="mb-6 flex gap-2 overflow-x-auto pb-2">
                    <button onclick="filterMonitor('all')" class="bg-slate-800 border border-slate-700 px-4 py-2 rounded-xl text-[10px] font-black hover:bg-slate-700">SEMUA</button>
                    <button onclick="filterMonitor('Cabana')" class="bg-orange-600 px-4 py-2 rounded-xl text-[10px] font-black">CABANA</button>
                    <button onclick="filterMonitor('Delta')" class="bg-blue-600 px-4 py-2 rounded-xl text-[10px] font-black">DELTA</button>
                    <button onclick="filterMonitor('Lunox')" class="bg-purple-600 px-4 py-2 rounded-xl text-[10px] font-black">LUNOX</button>
                </div>
                <div id="order-feed" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </div>

            <div id="section-inventory" class="tab-content hidden">
                <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 bg-slate-800 p-6 rounded-3xl border border-slate-700">
                    <div class="flex gap-2 w-full md:w-auto">
                        <button onclick="downloadTemplate()" class="bg-emerald-600 px-4 py-3 rounded-xl text-[10px] font-black uppercase"><i class="fa fa-download mr-2"></i>Template</button>
                        <label class="bg-blue-600 px-4 py-3 rounded-xl text-[10px] font-black uppercase cursor-pointer">
                            <i class="fa fa-upload mr-2"></i>Import Excel
                            <input type="file" id="import-input" class="hidden" accept=".xlsx, .xls" onchange="importExcel(event)">
                        </label>
                    </div>
                    <select id="p-outlet-filter" onchange="loadProductTable()" class="bg-slate-900 p-3 rounded-xl border border-slate-700 text-xs font-black text-blue-400 outline-none">
                        <option value="Cabana">OUTLET: CABANA</option>
                        <option value="Delta">OUTLET: DELTA</option>
                        <option value="Lunox">OUTLET: LUNOX</option>
                    </select>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <div class="space-y-6">
                        <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700 shadow-xl">
                            <h2 class="text-xl font-black mb-6 uppercase text-blue-400 italic">Tambah Barang</h2>
                            <div class="space-y-4">
                                <input type="text" id="p-name" placeholder="Nama Barang" class="w-full p-4 bg-slate-900 rounded-xl font-bold outline-none border border-slate-700 text-white">
                                <div class="grid grid-cols-2 gap-2">
                                    <input type="number" id="p-price" placeholder="Harga" class="w-full p-4 bg-slate-900 rounded-xl font-bold outline-none border border-slate-700 text-white">
                                    <input type="number" id="p-stock" placeholder="Stok" class="w-full p-4 bg-slate-900 rounded-xl font-bold outline-none border border-slate-700 text-white">
                                </div>
                                <select id="p-cat" class="w-full p-4 bg-slate-900 rounded-xl font-bold outline-none border border-slate-700 text-slate-400">
                                    <option value="Makanan">Makanan</option>
                                    <option value="Minuman">Minuman</option>
                                    <option value="Snack">Snack</option>
                                </select>
                                <button onclick="saveProduct()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-black uppercase hover:bg-blue-700 transition">Simpan Produk</button>
                            </div>
                        </div>

                        <div class="bg-slate-800 p-6 rounded-3xl border border-slate-700 shadow-xl">
                            <h2 class="text-xl font-black mb-6 uppercase text-emerald-400 italic">Master Data</h2>
                            <div class="space-y-4">
                                <div>
                                    <label class="text-[10px] font-black text-slate-500 uppercase ml-1">Tambah Ruangan</label>
                                    <input type="text" id="r-name" placeholder="Contoh: VIP 01" class="w-full p-4 bg-slate-900 rounded-xl font-bold outline-none border border-slate-700 text-white mb-2">
                                    <button onclick="saveRoom()" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-black uppercase text-xs hover:bg-emerald-700 transition">Simpan Room</button>
                                </div>
                                <hr class="border-slate-700">
                                <div>
                                    <label class="text-[10px] font-black text-slate-500 uppercase ml-1">Tambah Staff Bar</label>
                                    <input type="text" id="s-name" placeholder="Nama Staff" class="w-full p-4 bg-slate-900 rounded-xl font-bold outline-none border border-slate-700 text-white mb-2">
                                    <button onclick="saveStaff()" class="w-full bg-blue-500 text-white py-3 rounded-xl font-black uppercase text-xs hover:bg-blue-600 transition">Simpan Staff</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="lg:col-span-2 bg-slate-800 rounded-3xl border border-slate-700 overflow-hidden shadow-xl h-fit">
                        <table class="w-full text-left">
                            <thead class="bg-slate-900 text-slate-500 text-[10px] uppercase font-black">
                                <tr><th class="p-4">Nama Produk</th><th class="p-4">Harga</th><th class="p-4">Stok</th><th class="p-4 text-center">Aksi</th></tr>
                            </thead>
                            <tbody id="product-list-body" class="text-sm"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="section-report" class="tab-content hidden">
                <div class="bg-slate-800 rounded-3xl p-6 border border-slate-700">
                    <h2 class="text-xl font-black uppercase mb-6 italic text-blue-400">Laporan Penjualan</h2>
                    <div class="grid grid-cols-1 md:grid-cols-5 gap-4 mb-8 bg-slate-900 p-4 rounded-2xl border border-slate-700">
                        <input type="date" id="f-start" class="bg-slate-800 text-[10px] p-2 rounded border border-slate-700 text-white">
                        <input type="date" id="f-end" class="bg-slate-800 text-[10px] p-2 rounded border border-slate-700 text-white">
                        <select id="f-outlet" class="bg-slate-800 text-[10px] p-2 rounded border border-slate-700 text-white">
                            <option value="all">Semua Outlet</option>
                            <option value="Cabana">Cabana</option>
                            <option value="Delta">Delta</option>
                            <option value="Lunox">Lunox</option>
                        </select>
                        <button onclick="loadReports()" class="bg-blue-600 p-2 rounded font-black text-[10px]">FILTER DATA</button>
                        <div class="flex gap-2">
                            <button onclick="exportToExcel()" class="flex-1 bg-emerald-600 p-2 rounded text-[10px] font-black"><i class="fa fa-file-excel"></i> EXCEL</button>
                            <button onclick="exportToPDF()" class="flex-1 bg-red-600 p-2 rounded text-[10px] font-black"><i class="fa fa-file-pdf"></i> PDF</button>
                        </div>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left" id="main-report-table">
                            <thead class="bg-slate-900 text-slate-500 text-[10px] uppercase font-black">
                                <tr><th class="p-4">Waktu</th><th class="p-4">Outlet</th><th class="p-4">Produk</th><th class="p-4 text-center">Qty</th><th class="p-4">Total</th><th class="p-4 text-center no-print">Aksi</th></tr>
                            </thead>
                            <tbody id="report-body" class="text-sm"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script>
        const SB_URL = "https://mbzoydcehhvjdqfefflo.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1iem95ZGNlaGh2amRxZmVmZmxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NzYzNjcsImV4cCI6MjA4ODQ1MjM2N30.q5Ok1HJEeUIh-93KoXuH0zYqRN4i3LcweRMG9pWJkRg";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let audioActive = false;
        let userRole = '';
        let currentMonitorFilter = 'all';

        // --- AUTH & INITIALIZATION ---
        async function handleLogin() {
            const user = document.getElementById('user-input').value;
            const pass = document.getElementById('pass-input').value;
            const { data, error } = await _supabase.from('users').select('*').eq('username', user).eq('password', pass).maybeSingle();
            
            if (data) {
                userRole = data.role;
                document.getElementById('login-overlay').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('role-display').innerText = `Login As: ${userRole}`;
                
                initRealtimeSubscription();
                loadActiveOrders();
            } else { 
                document.getElementById('login-error').classList.remove('hidden'); 
            }
        }

      function initRealtimeSubscription() {
    console.log("Memulai Koneksi Realtime...");
    
    // Hapus channel lama agar tidak double koneksi (penyebab WebSocket closed)
    _supabase.removeAllChannels();

    const channel = _supabase.channel('db-changes')
        .on('postgres_changes', 
            { 
                event: '*', // Dengarkan INSERT, UPDATE, dan DELETE
                schema: 'public', 
                table: 'orders' 
            }, 
            async (payload) => {
                console.log("Data Berubah:", payload);
                
                // Jika ada order baru masuk (INSERT)
                if (payload.eventType === 'INSERT') {
                    // Ambil detail data lengkap (termasuk join table)
                    const { data } = await _supabase
                        .from('orders')
                        .select('*, outlets(name), staff(name), rooms(name)')
                        .eq('id', payload.new.id)
                        .single();

                    if (data && data.status === 'pending') {
                        appendToFeed(data, true);
                    }
                } 
                
                // Jika ada order yang diupdate atau dihapus (misal dibatalkan)
                else {
                    loadActiveOrders(); // Refresh total agar sinkron
                }
            }
        )
        .subscribe((status) => {
            console.log("Status Koneksi Realtime:", status);
        });
}
        async function loadActiveOrders() {
            const { data } = await _supabase.from('orders').select('*, outlets(name), staff(name), rooms(name)').eq('status', 'pending').order('created_at', { ascending: false });
            const feed = document.getElementById('order-feed');
            feed.innerHTML = '';
            const filtered = currentMonitorFilter === 'all' ? data : data.filter(o => o.outlets?.name === currentMonitorFilter);
            filtered.forEach(o => appendToFeed(o, false));
        }

        function appendToFeed(order, isNew) {
            const feed = document.getElementById('order-feed');
            if (document.getElementById(`order-${order.id}`)) return;

            const namaOutlet = order.outlets?.name || 'OUTLET';
            if (currentMonitorFilter !== 'all' && namaOutlet !== currentMonitorFilter) return;

            let border = (namaOutlet === 'Cabana') ? "outlet-cabana" : (namaOutlet === 'Delta') ? "outlet-delta" : "outlet-lunox";
            
            const card = document.createElement('div');
            card.id = `order-${order.id}`;
            card.className = `bg-slate-800 p-5 rounded-3xl shadow-xl border-b-4 border-slate-700 ${border} ${isNew ? 'animate-new' : ''}`;
            card.innerHTML = `
                <div class="flex justify-between mb-2">
                    <span class="text-[10px] font-black text-blue-400 uppercase">${namaOutlet}</span>
                    <button onclick="completeOrder('${order.id}')" class="text-green-500 bg-green-500/10 p-2 rounded-xl hover:bg-green-500 hover:text-white transition">
                        <i class="fa fa-check"></i>
                    </button>
                </div>
                <h3 class="font-black text-white uppercase text-lg">${order.product_name} <span class="text-yellow-500">x${order.qty || 1}</span></h3>
                <div class="mt-4 text-[10px] text-slate-500 font-bold uppercase tracking-widest border-t border-slate-700/50 pt-2">
                    ${order.rooms?.name || '-'} | ${order.staff?.name || '-'}
                </div>
            `;
            
            isNew ? feed.prepend(card) : feed.appendChild(card);

            if(isNew && audioActive) { 
                const snd = document.getElementById('notif-sound');
                snd.currentTime = 0;
                snd.play().catch(e => console.log("Audio block:", e));
                speakNow(`Pesanan baru di ${namaOutlet}. ${order.product_name}.`);
            }
        }

        async function completeOrder(id) {
            const { error } = await _supabase.from('orders').update({ status: 'completed' }).eq('id', id);
            if(!error) document.getElementById(`order-${id}`)?.remove();
        }

        // --- INVENTORY & MASTER DATA ---
        async function loadProductTable() {
            const outlet = document.getElementById('p-outlet-filter').value;
            const { data } = await _supabase.from('products').select('*').eq('outlet_name', outlet).order('name');
            const tbody = document.getElementById('product-list-body');
            tbody.innerHTML = data.map(p => `
                <tr class="border-b border-slate-700 hover:bg-slate-900/50">
                    <td class="p-4 font-bold text-white uppercase">${p.name}</td>
                    <td class="p-4 text-blue-400 font-black">Rp ${p.price.toLocaleString()}</td>
                    <td class="p-4 font-black ${p.stock < 10 ? 'text-red-500' : 'text-green-500'}">${p.stock}</td>
                    <td class="p-4 text-center">
                        <button onclick="deleteProduct('${p.id}')" class="text-slate-600 hover:text-red-500 transition"><i class="fa fa-trash"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        async function saveProduct() {
            const outlet = document.getElementById('p-outlet-filter').value;
            const name = document.getElementById('p-name').value;
            const price = parseInt(document.getElementById('p-price').value);
            const stock = parseInt(document.getElementById('p-stock').value);
            const category = document.getElementById('p-cat').value;
            if(!name || !price) return alert("Nama & Harga wajib diisi!");
            await _supabase.from('products').insert([{ name, price, stock, category, outlet_name: outlet }]);
            document.getElementById('p-name').value = '';
            loadProductTable();
        }

        async function saveRoom() {
            const roomName = document.getElementById('r-name').value;
            const currentOutlet = document.getElementById('p-outlet-filter').value;
            if (!roomName) return alert("Isi nama ruangan!");

            try {
                const { data: outletData } = await _supabase.from('outlets').select('id').eq('name', currentOutlet).single();
                if (!outletData) throw new Error("Outlet tidak ditemukan");

                const { error } = await _supabase.from('rooms').insert([
                    { name: roomName, outlet_name: currentOutlet, outlet_id: outletData.id }
                ]);
                if (error) throw error;
                alert(`Room ${roomName} ditambahkan!`);
                document.getElementById('r-name').value = '';
            } catch (e) { alert(e.message); }
        }

        async function saveStaff() {
            const name = document.getElementById('s-name').value;
            if (!name) return alert("Isi nama staff!");
            const { error } = await _supabase.from('staff').insert([{ name: name }]);
            if (error) alert(error.message);
            else { alert("Staff berhasil ditambah!"); document.getElementById('s-name').value = ''; }
        }

        async function deleteProduct(id) {
            if(confirm('Hapus produk ini?')) {
                await _supabase.from('products').delete().eq('id', id);
                loadProductTable();
            }
        }

        async function importExcel(event) {
            const file = event.target.files[0];
            if (!file) return;
            const outlet = document.getElementById('p-outlet-filter').value;
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const json = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]]);
                    const formatted = json.map(row => ({
                        name: row["Nama Produk"] || row["name"],
                        price: parseInt(row["Harga"] || row["price"]) || 0,
                        stock: parseInt(row["Stok"] || row["stock"]) || 0,
                        category: row["Kategori"] || row["category"] || "Makanan",
                        outlet_name: outlet
                    })).filter(item => item.name);
                    const { error } = await _supabase.from('products').insert(formatted);
                    if (error) throw error;
                    alert("Berhasil Impor!");
                    loadProductTable();
                } catch (err) { alert("Gagal: " + err.message); }
            };
            reader.readAsArrayBuffer(file);
        }

        function downloadTemplate() {
            const data = [["Nama Produk", "Harga", "Stok", "Kategori"], ["Contoh A", 15000, 100, "Makanan"]];
            const ws = XLSX.utils.aoa_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Template");
            XLSX.writeFile(wb, "Template_Produk.xlsx");
        }

        // --- REPORTS ---
        async function loadReports() {
            const start = document.getElementById('f-start').value;
            const end = document.getElementById('f-end').value;
            const out = document.getElementById('f-outlet').value;
            let query = _supabase.from('orders').select('*, outlets(name)').order('created_at', { ascending: false });
            if (start) query = query.gte('created_at', start + 'T00:00:00');
            if (end) query = query.lte('created_at', end + 'T23:59:59');
            const { data } = await query;
            let filtered = out === 'all' ? data : data.filter(o => o.outlets?.name === out);
            document.getElementById('report-body').innerHTML = filtered.map(o => `
                <tr class="border-b border-slate-700 hover:bg-slate-900/50">
                    <td class="p-4 text-[10px] text-slate-400">${new Date(o.created_at).toLocaleString('id-ID')}</td>
                    <td class="p-4 font-black text-orange-400 uppercase text-[10px]">${o.outlets?.name || '-'}</td>
                    <td class="p-4 text-white font-bold uppercase">${o.product_name}</td>
                    <td class="p-4 text-center font-black text-yellow-500">${o.qty || 1}</td>
                    <td class="p-4 font-black text-blue-400">Rp ${(o.price * (o.qty || 1)).toLocaleString()}</td>
                    <td class="p-4 text-center no-print">
                        <button onclick="printOrder('${o.id}')" class="text-white bg-slate-700 p-2 rounded-lg hover:bg-blue-600 transition"><i class="fa fa-print"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function exportToExcel() {
            XLSX.writeFile(XLSX.utils.table_to_book(document.getElementById('main-report-table')), "Laporan_Lunox.xlsx");
        }

        function exportToPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("LAPORAN PENJUALAN LUNOX", 14, 20);
            doc.autoTable({ html: '#main-report-table', startY: 25 });
            doc.save("Laporan_Lunox.pdf");
        }

        async function printOrder(id) {
            const { data } = await _supabase.from('orders').select('*, outlets(name)').eq('id', id).single();
            const win = window.open('', '', 'width=300,height=450');
            win.document.write(`<div style="font-family:monospace;text-align:center;"><h3>LUNOX</h3><p>${data.outlets.name}</p><hr><p>${data.product_name} x${data.qty}</p><p>Total: Rp ${(data.price * data.qty).toLocaleString()}</p><hr></div>`);
            win.print(); win.close();
        }

        // --- UI & UTILS ---
        function showTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-tab'));
            document.getElementById(`section-${t}`).classList.remove('hidden');
            document.getElementById(`tab-${t}`).classList.add('active-tab');
            if(t === 'inventory') loadProductTable();
            if(t === 'report') loadReports();
        }

        function activateAudio() {
            audioActive = true;
            document.getElementById('enable-audio').classList.replace('bg-yellow-500', 'bg-green-600');
            document.getElementById('enable-audio').innerHTML = '<i class="fa fa-check-circle mr-2"></i> SUARA AKTIF';
            speakNow("Sistem pemantauan aktif");
        }

        function speakNow(text) {
            if (!audioActive) return;
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'id-ID';
            msg.rate = 1.0;
            window.speechSynthesis.speak(msg);
        }

    </script>
</body>
</html>

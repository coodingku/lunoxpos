<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUNOX ADMIN CENTRAL - PREMIUM V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        .outlet-cabana { border-left: 6px solid #f97316; }
        .outlet-delta { border-left: 6px solid #3b82f6; }
        .outlet-lunox { border-left: 6px solid #a855f7; }
        .active-tab { background-color: #3b82f6 !important; color: white !important; border-radius: 12px; }
        .animate-new { animation: slideIn 0.5s ease-out; border: 2px solid #fbbf24; background-color: rgba(59, 130, 246, 0.1); }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        .hidden { display: none !important; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">

    <div id="login-overlay" class="fixed inset-0 bg-slate-950 z-[100] flex items-center justify-center p-6">
        <div class="bg-slate-800 p-8 rounded-3xl w-full max-w-md border border-slate-700 shadow-2xl text-center">
            <h1 class="text-3xl font-black italic mb-8 uppercase text-white">Lunox <span class="text-blue-500">Auth</span></h1>
            <div class="space-y-4">
                <input type="text" id="user-input" placeholder="Username" class="w-full p-4 bg-slate-900 rounded-xl outline-none border border-slate-700 font-bold text-white">
                <input type="password" id="pass-input" placeholder="Password" class="w-full p-4 bg-slate-900 rounded-xl outline-none border border-slate-700 font-bold text-white">
                <button onclick="handleLogin()" class="w-full bg-blue-600 py-4 rounded-xl font-black uppercase hover:bg-blue-700 transition">Masuk</button>
                <p id="login-error" class="text-red-500 text-xs font-bold hidden">Akses Ditolak!</p>
            </div>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <header class="bg-slate-800 p-6 shadow-2xl sticky top-0 z-50 border-b border-slate-700 no-print">
            <div class="max-w-7xl mx-auto flex flex-col lg:flex-row justify-between items-center gap-6">
                <div>
                    <h1 class="text-2xl font-black tracking-tighter italic">LUNOX <span class="text-blue-500 underline">ADMIN</span></h1>
                    <p id="role-display" class="text-[10px] font-black uppercase text-blue-400"></p>
                </div>
                <nav class="flex bg-slate-900 p-1 rounded-2xl border border-slate-700">
                    <button onclick="showTab('monitor')" id="tab-monitor" class="px-6 py-2 text-xs font-black active-tab">MONITORING</button>
                    <button onclick="showTab('inventory')" id="tab-inventory" class="px-6 py-2 text-xs font-black">PRODUK</button>
                    <button onclick="showTab('report')" id="tab-report" class="px-6 py-2 text-xs font-black">LAPORAN</button>
                </nav>
                <div class="flex gap-2">
                    <button onclick="testSound()" class="bg-slate-700 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase border border-slate-600">
                        <i class="fa fa-vial mr-1"></i> TEST
                    </button>
                    <button id="enable-audio" onclick="activateAudio()" class="bg-yellow-500 text-slate-900 px-5 py-2 rounded-xl text-xs font-black animate-pulse">
                        <i class="fa fa-volume-up mr-2"></i> AKTIFKAN SUARA
                    </button>
                    <button onclick="location.reload()" class="bg-red-600 px-5 py-2 rounded-xl text-xs font-black uppercase">Logout</button>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto p-6">
            <div id="section-monitor" class="tab-content">
                <div class="mb-6 flex gap-2 overflow-x-auto pb-2">
                    <button onclick="filterMonitor('all')" class="bg-slate-800 border border-slate-700 px-4 py-2 rounded-xl text-[10px] font-black hover:bg-slate-700">SEMUA</button>
                    <button onclick="filterMonitor('Cabana')" class="bg-orange-600 px-4 py-2 rounded-xl text-[10px] font-black">CABANA</button>
                    <button onclick="filterMonitor('Delta')" class="bg-blue-600 px-4 py-2 rounded-xl text-[10px] font-black">DELTA</button>
                    <button onclick="filterMonitor('Lunox')" class="bg-purple-600 px-4 py-2 rounded-xl text-[10px] font-black">LUNOX</button>
                </div>
                <div id="order-feed" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            </div>

            <div id="section-inventory" class="tab-content hidden">
                <div class="bg-slate-800 p-8 rounded-3xl border border-slate-700 text-center">
                    <p class="text-slate-400 font-bold uppercase italic">Fitur Inventory Aktif. Silakan gunakan filter untuk memuat data.</p>
                    <button onclick="loadProductTable()" class="mt-4 bg-blue-600 px-6 py-2 rounded-xl font-black text-xs">MUAT DATA</button>
                </div>
            </div>

            <div id="section-report" class="tab-content hidden">
                <div class="bg-slate-800 p-8 rounded-3xl border border-slate-700 text-center">
                    <p class="text-slate-400 font-bold uppercase italic">Fitur Laporan Aktif.</p>
                    <button onclick="loadReports()" class="mt-4 bg-blue-600 px-6 py-2 rounded-xl font-black text-xs">TARIK LAPORAN</button>
                </div>
            </div>
        </main>
    </div>

    <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script>
        const SB_URL = "https://mbzoydcehhvjdqfefflo.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1iem95ZGNlaGh2amRxZmVmZmxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NzYzNjcsImV4cCI6MjA4ODQ1MjM2N30.q5Ok1HJEeUIh-93KoXuH0zYqRN4i3LcweRMG9pWJkRg";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let audioActive = false;
        let currentMonitorFilter = 'all';

        async function handleLogin() {
            const user = document.getElementById('user-input').value;
            const pass = document.getElementById('pass-input').value;
            const { data } = await _supabase.from('users').select('*').eq('username', user).eq('password', pass).single();
            
            if (data) {
                document.getElementById('login-overlay').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('role-display').innerText = `Admin: ${data.role}`;
                loadActiveOrders();
            } else { 
                document.getElementById('login-error').classList.remove('hidden'); 
            }
        }

        // --- AUDIO ENGINE ---
        function activateAudio() {
            audioActive = true;
            const btn = document.getElementById('enable-audio');
            btn.classList.replace('bg-yellow-500', 'bg-green-600');
            btn.classList.remove('animate-pulse');
            btn.innerHTML = '<i class="fa fa-check-circle mr-2"></i> SUARA AKTIF';
            speakNow("Sistem audio lunox diaktifkan");
        }

        function testSound() {
            if(!audioActive) return alert("Aktifkan suara dulu!");
            document.getElementById('notif-sound').play();
            setTimeout(() => speakNow("Percobaan suara berhasil"), 1000);
        }

        function speakNow(text) {
            if (!audioActive) return;
            window.speechSynthesis.cancel();
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'id-ID';
            msg.rate = 1.0;
            window.speechSynthesis.speak(msg);
        }

        // --- CORE MONITORING ---
        async function loadActiveOrders() {
            const { data } = await _supabase.from('orders').select('*, outlets(name), rooms(name)').eq('status', 'pending').order('created_at', { ascending: false });
            if (!data) return;
            const feed = document.getElementById('order-feed');
            feed.innerHTML = '';
            const filtered = currentMonitorFilter === 'all' ? data : data.filter(o => o.outlets?.name === currentMonitorFilter);
            filtered.forEach(o => appendToFeed(o, false));
        }

        function appendToFeed(order, isNew) {
            const feed = document.getElementById('order-feed');
            if (currentMonitorFilter !== 'all' && order.outlets?.name !== currentMonitorFilter) return;

            let border = order.outlets?.name === 'Cabana' ? "outlet-cabana" : order.outlets?.name === 'Delta' ? "outlet-delta" : "outlet-lunox";
            const card = document.createElement('div');
            card.id = `order-${order.id}`;
            card.className = `bg-slate-800 p-5 rounded-3xl shadow-xl border-b-4 border-slate-700 ${border} ${isNew ? 'animate-new' : ''}`;
            card.innerHTML = `
                <div class="flex justify-between mb-2">
                    <span class="text-[10px] font-black text-blue-400 uppercase">${order.outlets?.name || 'NEW ORDER'}</span>
                    <button onclick="completeOrder('${order.id}')" class="text-green-500 bg-green-500/10 p-2 rounded-xl hover:bg-green-500 hover:text-white transition"><i class="fa fa-check"></i></button>
                </div>
                <h3 class="font-black text-white uppercase text-lg">${order.product_name} <span class="text-yellow-500">x${order.qty || 1}</span></h3>
                <div class="mt-4 text-[10px] text-slate-500 font-bold uppercase">${order.rooms?.name || 'Umum'}</div>
            `;
            isNew ? feed.prepend(card) : feed.appendChild(card);
        }

        async function completeOrder(id) {
            const { error } = await _supabase.from('orders').update({ status: 'completed' }).eq('id', id);
            if (!error) document.getElementById(`order-${id}`)?.remove();
        }

        // --- STABLE REALTIME ---
        _supabase.channel('admin-pos-room').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'orders' }, async (p) => {
            const newOrder = p.new;
            if (newOrder.status !== 'pending') return;

            // Trigger Suara SEGERA (Tanpa menunggu join database)
            if (audioActive) {
                document.getElementById('notif-sound').play().catch(()=>{});
                speakNow(`Pesanan baru. ${newOrder.product_name}`);
            }

            // Ambil data lengkap untuk UI (Join data)
            const { data } = await _supabase.from('orders').select('*, outlets(name), rooms(name)').eq('id', newOrder.id).single();
            if (data) appendToFeed(data, true);
        }).subscribe();

        function showTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-tab'));
            document.getElementById(`section-${t}`).classList.remove('hidden');
            document.getElementById(`tab-${t}`).classList.add('active-tab');
        }

        function filterMonitor(outlet) {
            currentMonitorFilter = outlet;
            loadActiveOrders();
        }
    </script>
</body>
</html>

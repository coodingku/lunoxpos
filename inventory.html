<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory & Tax Settings</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
    </style>
</head>
<body class="p-8">

    <div class="max-w-6xl mx-auto">
        <header class="mb-10 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-black tracking-tighter text-slate-800 uppercase italic">Inventory <span class="text-blue-600">& Tax</span></h1>
                <p class="text-xs font-bold text-slate-400 tracking-widest uppercase">Manajemen Produk & Konfigurasi Pajak</p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="space-y-6">
                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100">
                    <div class="flex items-center gap-3 mb-6">
                        <div class="w-10 h-10 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center text-lg">
                            <i class="fa fa-percent"></i>
                        </div>
                        <h2 class="font-black text-slate-800 uppercase tracking-tight">Konfigurasi Biaya</h2>
                    </div>

                    <div class="space-y-4">
                        <div>
                            <label class="text-[10px] font-black text-slate-400 uppercase ml-2">PPN (%)</label>
                            <input type="number" id="input-ppn" value="0" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold outline-none focus:border-blue-500 transition">
                        </div>
                        <div>
                            <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Service Charge (%)</label>
                            <input type="number" id="input-service" value="0" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold outline-none focus:border-blue-500 transition">
                        </div>
                        <button onclick="saveTaxSettings()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black uppercase text-xs shadow-lg hover:bg-black transition mt-2">
                            Simpan Perubahan
                        </button>
                    </div>
                </div>

                <div class="bg-blue-600 p-8 rounded-[2.5rem] text-white shadow-xl shadow-blue-200">
                    <h3 class="font-black italic text-xl mb-2">INFO</h3>
                    <p class="text-xs font-medium opacity-80 leading-relaxed">Pengaturan pajak ini akan langsung berdampak pada perhitungan struk di kasir (POS).</p>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-6">
                <div class="bg-white p-8 rounded-[3rem] shadow-sm border border-slate-100">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="font-black text-slate-800 uppercase tracking-tight">Daftar Produk / F&B</h2>
                        <button onclick="showAddModal()" class="bg-blue-50 text-blue-600 px-5 py-2.5 rounded-xl font-black text-xs uppercase hover:bg-blue-600 hover:text-white transition">
                            + Tambah Produk
                        </button>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead>
                                <tr class="text-[10px] font-black text-slate-400 uppercase tracking-widest border-b">
                                    <th class="pb-4 px-2">Nama Produk</th>
                                    <th class="pb-4 px-2">Outlet</th>
                                    <th class="pb-4 px-2 text-right">Harga</th>
                                    <th class="pb-4 px-2 text-center">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="product-table-body" class="text-sm font-bold text-slate-700">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div id="product-modal" class="fixed inset-0 bg-slate-900/60 hidden z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl">
            <h3 class="text-xl font-black text-slate-800 mb-6 uppercase italic">Detail Produk</h3>
            <div class="space-y-4">
                <input type="text" id="p-name" placeholder="Nama Produk" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold outline-none">
                <select id="p-outlet" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold outline-none">
                    <option value="Delta">Delta Spa</option>
                    <option value="Cabana">Cabana Spa</option>
                </select>
                <input type="number" id="p-price" placeholder="Harga Jual" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold outline-none">
                
                <div class="flex gap-3 pt-4">
                    <button onclick="closeModal()" class="flex-1 py-4 font-black text-slate-400 uppercase text-xs">Batal</button>
                    <button onclick="saveProduct()" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-black uppercase text-xs shadow-lg">Simpan</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = "https://mbzoydcehhvjdqfefflo.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1iem95ZGNlaGh2amRxZmVmZmxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NzYzNjcsImV4cCI6MjA4ODQ1MjM2N30.q5Ok1HJEeUIh-93KoXuH0zYqRN4i3LcweRMG9pWJkRg";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        async function init() {
            await loadTax();
            await loadProducts();
        }

        // --- FUNGSI TAX (FIXED 406/409/UNDEFINED) ---
        async function loadTax() {
            const { data, error } = await _supabase
                .from('settings')
                .select('*')
                .eq('key', 'tax_config')
                .maybeSingle(); // Menggunakan maybeSingle agar tidak error jika kosong

            if (data) {
                // Fix "undefined" parsing error
                document.getElementById('input-ppn').value = data.ppn || 0;
                document.getElementById('input-service').value = data.service || 0;
            }
        }

        async function saveTaxSettings() {
            const valPPN = parseInt(document.getElementById('input-ppn').value) || 0;
            const valService = parseInt(document.getElementById('input-service').value) || 0;

            // Menggunakan UPSERT untuk menghindari 409 Conflict
            const { error } = await _supabase
                .from('settings')
                .upsert({ 
                    key: 'tax_config', 
                    ppn: valPPN, 
                    service: valService 
                }, { onConflict: 'key' });

            if (error) {
                alert("Gagal menyimpan: " + error.message);
            } else {
                alert("Pengaturan Pajak Berhasil Diperbarui!");
            }
        }

        // --- FUNGSI PRODUK ---
        async function loadProducts() {
            const { data, error } = await _supabase.from('produk').select('*').order('nama_produk');
            const tbody = document.getElementById('product-table-body');
            tbody.innerHTML = '';

            if(data) {
                data.forEach(p => {
                    tbody.innerHTML += `
                        <tr class="border-b hover:bg-slate-50 transition">
                            <td class="py-4 px-2 uppercase font-black text-xs">${p.nama_produk}</td>
                            <td class="py-4 px-2"><span class="bg-slate-100 px-2 py-1 rounded text-[10px]">${p.outlet_name}</span></td>
                            <td class="py-4 px-2 text-right font-mono font-bold text-blue-600">Rp ${p.harga.toLocaleString()}</td>
                            <td class="py-4 px-2 text-center">
                                <button onclick="deleteProduct(${p.id})" class="text-red-400 hover:text-red-600 transition">
                                    <i class="fa fa-trash-can"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                });
            }
        }

        async function saveProduct() {
            const name = document.getElementById('p-name').value;
            const outlet = document.getElementById('p-outlet').value;
            const price = parseInt(document.getElementById('p-price').value);

            if(!name || !price) return alert("Isi semua data!");

            await _supabase.from('produk').insert([{ 
                nama_produk: name, 
                outlet_name: outlet, 
                harga: price 
            }]);

            closeModal();
            loadProducts();
        }

        async function deleteProduct(id) {
            if(confirm('Hapus produk ini?')) {
                await _supabase.from('produk').delete().eq('id', id);
                loadProducts();
            }
        }

        function showAddModal() { document.getElementById('product-modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('product-modal').classList.add('hidden'); }

        init();
    </script>
</body>
</html>

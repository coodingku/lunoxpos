<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUNOX SPA - THERAPIST CONTROL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        /* Status Colors */
        .status-offline { background-color: #1e293b; border-color: #334155; opacity: 0.5; } 
        .status-standby { background-color: #1e40af; border-color: #3b82f6; } 
        .status-checkin { background-color: #065f46; border-color: #10b981; } 
        .status-progress { background-color: #991b1b; border-color: #ef4444; } 
        
        /* Animations */
        .warning-mode { animation: blink-warning 1s infinite; background-color: #b45309 !important; border-color: #f59e0b !important; }
        @keyframes blink-warning { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        
        .floor-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1.5rem;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans">

    <header class="bg-slate-900 p-5 border-b border-slate-800 sticky top-0 z-50 shadow-2xl">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-black italic tracking-tighter text-blue-500">SPA <span class="text-white underline">SYSTEM</span></h1>
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Therapist Floor Map & Timer</p>
            </div>
            <div class="flex items-center gap-3">
                <select id="active-outlet" onchange="fetchTherapists()" class="bg-slate-800 border border-slate-700 rounded-xl px-4 py-2 text-xs font-black outline-none text-blue-400">
                    <option value="Delta">DELTA SPA</option>
                    <option value="Cabana">CABANA SPA</option>
                </select>
                <button onclick="openModal()" class="bg-blue-600 hover:bg-blue-700 px-6 py-2 rounded-xl text-xs font-black transition shadow-lg shadow-blue-900/20">
                    <i class="fa fa-fingerprint mr-2"></i>ABSEN / UPDATE
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-6">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
            <div class="bg-slate-900 p-5 rounded-3xl border border-slate-800 border-b-4 border-b-blue-600">
                <p class="text-slate-500 text-[10px] font-black uppercase">Standby</p>
                <h2 id="count-standby" class="text-3xl font-black text-white">0</h2>
            </div>
            <div class="bg-slate-900 p-5 rounded-3xl border border-slate-800 border-b-4 border-b-red-600">
                <p class="text-slate-500 text-[10px] font-black uppercase">In Progress</p>
                <h2 id="count-progress" class="text-3xl font-black text-white">0</h2>
            </div>
        </div>

        <div id="therapist-grid" class="floor-grid">
            </div>
    </main>

    <div id="update-modal" class="fixed inset-0 bg-black/90 hidden z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-slate-900 border border-slate-800 p-8 rounded-[2rem] w-full max-w-md shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xl font-black uppercase italic">Therapist <span class="text-blue-500">Action</span></h3>
                <button onclick="closeModal()" class="text-slate-500 hover:text-white"><i class="fa fa-times"></i></button>
            </div>
            
            <div class="space-y-5">
                <div>
                    <label class="text-[10px] font-black text-slate-500 uppercase ml-1">ID Therapist</label>
                    <input type="text" id="target-tid" placeholder="Contoh: T-01" class="w-full p-4 bg-slate-950 rounded-2xl border border-slate-800 outline-none font-black text-blue-400 uppercase">
                </div>

                <div class="grid grid-cols-3 gap-2">
                    <button onclick="saveStatus('standby')" class="bg-blue-600 p-4 rounded-2xl font-black text-[10px] uppercase">Standby</button>
                    <button onclick="saveStatus('checkin')" class="bg-emerald-600 p-4 rounded-2xl font-black text-[10px] uppercase">Check In</button>
                    <button onclick="saveStatus('offline')" class="bg-slate-700 p-4 rounded-2xl font-black text-[10px] uppercase">Offline</button>
                </div>

                <div class="bg-slate-950 p-5 rounded-2xl border border-slate-800">
                    <label class="text-[10px] font-black text-slate-500 block mb-3 uppercase">Mulai Massage (Durasi)</label>
                    <div class="flex gap-3">
                        <select id="target-duration" class="flex-1 p-3 bg-slate-900 rounded-xl border border-slate-700 outline-none font-bold text-sm">
                            <option value="60">60 Menit</option>
                            <option value="90">90 Menit</option>
                            <option value="120">120 Menit</option>
                        </select>
                        <button onclick="startMassage()" class="bg-red-600 px-6 py-3 rounded-xl font-black text-xs uppercase hover:bg-red-700 transition">START</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // KONFIGURASI SUPABASE
        const SB_URL = "https://mbzoydcehhvjdqfefflo.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1iem95ZGNlaGh2amRxZmVmZmxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NzYzNjcsImV4cCI6MjA4ODQ1MjM2N30.q5Ok1HJEeUIh-93KoXuH0zYqRN4i3LcweRMG9pWJkRg";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let therapists = [];

        // AMBIL DATA DARI DATABASE
        async function fetchTherapists() {
            const outlet = document.getElementById('active-outlet').value;
            const { data, error } = await _supabase
                .from('therapists')
                .select('*')
                .eq('outlet_name', outlet)
                .order('t_id', { ascending: true });

            if (data) {
                therapists = data;
                renderFloorMap();
            }
        }

        // RENDER TAMPILAN MAP
        function renderFloorMap() {
            const grid = document.getElementById('therapist-grid');
            grid.innerHTML = '';
            
            let sCount = 0; let pCount = 0;

            therapists.forEach(t => {
                const now = new Date().getTime();
                const endTime = t.end_time ? new Date(t.end_time).getTime() : null;
                let isWarning = false;
                let timerText = t.status.toUpperCase();

                if (t.status === 'progress' && endTime) {
                    pCount++;
                    const diff = endTime - now;
                    if (diff > 0) {
                        const mins = Math.floor(diff / 60000);
                        const secs = Math.floor((diff % 60000) / 1000);
                        timerText = `${mins}:${secs < 10 ? '0'+secs : secs}`;
                        if (mins < 10) isWarning = true; // Peringatan 10 menit
                    } else {
                        timerText = "SELESAI";
                        autoFinish(t.t_id);
                    }
                } else if (t.status === 'standby') {
                    sCount++;
                }

                const card = document.createElement('div');
                card.className = `status-${t.status} ${isWarning ? 'warning-mode' : ''} p-5 rounded-[1.5rem] border-b-4 transition-all duration-500 text-center shadow-xl`;
                card.innerHTML = `
                    <p class="text-[9px] font-black opacity-50 uppercase tracking-tighter">${t.t_id}</p>
                    <h3 class="font-black text-sm uppercase truncate">${t.name}</h3>
                    <div class="mt-3 py-1 px-3 bg-black/20 rounded-full text-[12px] font-black">
                        ${timerText}
                    </div>
                `;
                grid.appendChild(card);
            });

            document.getElementById('count-standby').innerText = sCount;
            document.getElementById('count-progress').innerText = pCount;
        }

        // SIMPAN STATUS KE DATABASE
        async function saveStatus(status) {
            const tid = document.getElementById('target-tid').value.toUpperCase();
            if(!tid) return alert("Masukkan ID!");

            const { error } = await _supabase
                .from('therapists')
                .update({ status: status, end_time: null })
                .eq('t_id', tid);

            if(!error) { fetchTherapists(); closeModal(); }
            else { alert("ID tidak ditemukan!"); }
        }

        // MULAI MASSAGE (SET TIMER)
        async function startMassage() {
            const tid = document.getElementById('target-tid').value.toUpperCase();
            const duration = document.getElementById('target-duration').value;
            const finishTime = new Date(new Date().getTime() + duration * 60000).toISOString();

            const { error } = await _supabase
                .from('therapists')
                .update({ status: 'progress', end_time: finishTime })
                .eq('t_id', tid);

            if(!error) { fetchTherapists(); closeModal(); }
        }

        // AUTO FINISH JIKA WAKTU HABIS
        async function autoFinish(tid) {
            await _supabase.from('therapists').update({ status: 'standby', end_time: null }).eq('t_id', tid);
            fetchTherapists();
        }

        // REALTIME SUBSCRIPTION
        _supabase.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: 'therapists' }, () => {
            fetchTherapists();
        }).subscribe();

        // UI HELPERS
        function openModal() { document.getElementById('update-modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('update-modal').classList.add('hidden'); }
        
        // Loop Timer UI (Setiap 1 Detik)
        setInterval(renderFloorMap, 1000);
        
        // Load Awal
        fetchTherapists();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUNOX SPA - THERAPIST CONTROL V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }

        /* Status Colors */
        .status-offline { background: #0f172a; border-color: #1e293b; opacity: 0.4; } 
        .status-standby { background: linear-gradient(135deg, #1e40af 0%, #1e3a8a 100%); border-color: #3b82f6; } 
        .status-checkin { background: linear-gradient(135deg, #065f46 0%, #064e3b 100%); border-color: #10b981; } 
        .status-progress { background: linear-gradient(135deg, #991b1b 0%, #7f1d1d 100%); border-color: #ef4444; } 
        
        /* Pulse for Active Treatment */
        .status-progress { animation: pulse-red 3s infinite; }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0px rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0px rgba(239, 68, 68, 0); }
        }

        .warning-mode { animation: blink-warning 0.8s infinite; background: #b45309 !important; border-color: #f59e0b !important; }
        @keyframes blink-warning { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        
        .floor-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1.2rem;
        }
    </style>
</head>
<body class="bg-[#020617] text-slate-100 min-h-screen">

    <header class="bg-slate-900/50 backdrop-blur-md p-5 border-b border-slate-800 sticky top-0 z-50 shadow-2xl">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-black italic tracking-tighter text-blue-500">SPA <span class="text-white">CONTROL</span></h1>
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Therapist Real-time Monitoring</p>
            </div>
            <div class="flex items-center gap-3">
                <select id="active-outlet" onchange="fetchTherapists()" class="bg-slate-800 border border-slate-700 rounded-xl px-4 py-2 text-xs font-black outline-none text-blue-400">
                    <option value="Delta">DELTA SPA</option>
                    <option value="Cabana">CABANA SPA</option>
                </select>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-6">
        <div id="therapist-grid" class="floor-grid">
            </div>
    </main>

    <script>
        const SB_URL = "https://mbzoydcehhvjdqfefflo.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1iem95ZGNlaGh2amRxZmVmZmxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NzYzNjcsImV4cCI6MjA4ODQ1MjM2N30.q5Ok1HJEeUIh-93KoXuH0zYqRN4i3LcweRMG9pWJkRg";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let therapists = [];

        // 1. Fungsi Utama Mengambil Data
        async function fetchTherapists() {
            const outlet = document.getElementById('active-outlet').value;
            const { data, error } = await _supabase
                .from('therapists')
                .select('*')
                .eq('outlet_name', outlet)
                .order('t_id', { ascending: true });

            if (data) {
                therapists = data;
                renderFloorMap();
            }
        }

        // 2. Fungsi Render UI
        function renderFloorMap() {
            const grid = document.getElementById('therapist-grid');
            grid.innerHTML = '';
            
            therapists.forEach(t => {
                const now = new Date().getTime();
                const endTime = t.end_time ? new Date(t.end_time).getTime() : null;
                let isWarning = false;
                let timerDisplay = t.status.toUpperCase();

                if (t.status === 'progress' && endTime) {
                    const diff = endTime - now;
                    if (diff > 0) {
                        const mins = Math.floor(diff / 60000);
                        const secs = Math.floor((diff % 60000) / 1000);
                        timerDisplay = `${mins}:${secs < 10 ? '0'+secs : secs}`;
                        if (mins < 10) isWarning = true;
                    } else {
                        timerDisplay = "SELESAI";
                    }
                }

                const card = document.createElement('div');
                card.className = `status-${t.status} ${isWarning ? 'warning-mode' : ''} p-5 rounded-[2rem] border-b-4 shadow-xl text-center transition-all duration-500`;
                card.innerHTML = `
                    <p class="text-[9px] font-black opacity-40 uppercase mb-1">${t.t_id}</p>
                    <h3 class="font-extrabold text-sm uppercase truncate">${t.name}</h3>
                    <div class="mt-4 py-2 px-3 bg-black/30 rounded-2xl text-[12px] font-black font-mono">
                        ${timerDisplay}
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // 3. SINKRONISASI OTOMATIS (Mendengarkan Perubahan dari POS)
        _supabase
            .channel('db-changes')
            .on('postgres_changes', { 
                event: 'UPDATE', 
                schema: 'public', 
                table: 'therapists' 
            }, (payload) => {
                // Begitu ada update di tabel therapists (misal dari POS), langsung ambil data terbaru
                console.log("Update terdeteksi:", payload.new);
                fetchTherapists(); 
            })
            .subscribe();

        // 4. Timer Lokal (Hanya untuk mengupdate detik di layar)
        setInterval(renderFloorMap, 1000);

        // Load awal
        fetchTherapists();
    </script>
</body>
</html>

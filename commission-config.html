<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUNOX - Commission Setup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .tab-active { border-bottom: 4px solid #2563eb; color: #2563eb; }
    </style>
</head>
<body class="p-8">

    <div class="max-w-6xl mx-auto">
        <header class="mb-10 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-black italic tracking-tighter text-slate-800 uppercase">Staff <span class="text-blue-600">Commission</span></h1>
                <p class="text-[10px] font-bold text-slate-400 tracking-widest uppercase">Atur Bagi Hasil Per Produk & Layanan</p>
            </div>
            <div class="flex bg-white rounded-2xl shadow-sm border p-1">
                <button onclick="switchTab('service')" id="tab-service" class="px-6 py-3 rounded-xl font-black text-xs uppercase transition-all tab-active">Services</button>
                <button onclick="switchTab('product')" id="tab-product" class="px-6 py-3 rounded-xl font-black text-xs uppercase transition-all text-slate-400">Products / F&B</button>
            </div>
        </header>

        <div class="bg-white rounded-[3rem] shadow-sm border border-slate-100 overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-50 text-[10px] font-black text-slate-400 uppercase tracking-widest border-b">
                        <th class="p-6">Nama Item</th>
                        <th class="p-6">Harga Jual</th>
                        <th class="p-6">Tipe Komisi</th>
                        <th class="p-6">Nilai Komisi</th>
                        <th class="p-6 text-center">Aksi</th>
                    </tr>
                </thead>
                <tbody id="commission-table" class="font-bold text-slate-700 text-sm">
                    </tbody>
            </table>
        </div>
    </div>

    <div id="edit-modal" class="fixed inset-0 bg-slate-900/60 hidden z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-[3rem] p-10 shadow-2xl">
            <h3 class="text-2xl font-black text-slate-800 mb-2 uppercase italic">Set Commission</h3>
            <p id="edit-item-name" class="text-blue-600 font-bold mb-8 uppercase text-xs tracking-widest border-b pb-4"></p>
            
            <div class="space-y-6">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Metode Komisi</label>
                    <select id="com-type" class="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold outline-none focus:border-blue-500">
                        <option value="percentage">Persentase (%)</option>
                        <option value="fixed">Nominal Tetap (Rp)</option>
                    </select>
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Besar Komisi</label>
                    <input type="number" id="com-value" class="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-2xl font-black text-2xl outline-none focus:border-blue-500" placeholder="0">
                </div>
                
                <div class="flex gap-4 pt-4">
                    <button onclick="closeModal()" class="flex-1 py-5 font-black text-slate-400 uppercase text-xs">Batal</button>
                    <button onclick="updateCommission()" class="flex-1 bg-blue-600 text-white py-5 rounded-2xl font-black uppercase text-xs shadow-lg hover:bg-black transition-all">Simpan</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = "https://mbzoydcehhvjdqfefflo.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1iem95ZGNlaGh2amRxZmVmZmxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NzYzNjcsImV4cCI6MjA4ODQ1MjM2N30.q5Ok1HJEeUIh-93KoXuH0zYqRN4i3LcweRMG9pWJkRg";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let currentTab = 'service';
        let currentEditingId = null;

     async function loadData() {
    const table = document.getElementById('commission-table');
    table.innerHTML = '<tr><td colspan="5" class="p-10 text-center opacity-50">Memuat data...</td></tr>';

    // Penyesuaian Nama Tabel & Kolom
    const isService = (currentTab === 'service');
    const targetTable = isService ? 'services' : 'produk'; 
    // ^ GANTI 'services' di atas jika nama tabel anda berbeda (misal: 'master_services')
    
    const nameColumn = isService ? 'name' : 'nama_produk'; 
    // ^ GANTI sesuai kolom nama di tabel produk anda

    const { data, error } = await _supabase
        .from(targetTable)
        .select('*')
        .order(nameColumn, { ascending: true }); // Menggunakan kolom yang benar

    if (error) {
        console.error("Error Detail:", error);
        table.innerHTML = `<tr><td colspan="5" class="p-10 text-center text-red-500">Error: ${error.message}. <br> <small>Pastikan tabel '${targetTable}' dan kolom '${nameColumn}' ada di Supabase.</small></td></tr>`;
        return;
    }

    if (data) {
        table.innerHTML = data.map(item => {
            const displayName = isService ? item.name : item.nama_produk;
            const displayPrice = isService ? item.price : item.harga;
            
            return `
                <tr class="border-b hover:bg-slate-50 transition">
                    <td class="p-6 uppercase tracking-tight">${displayName || 'Tanpa Nama'}</td>
                    <td class="p-6 text-slate-400">Rp ${(displayPrice || 0).toLocaleString()}</td>
                    <td class="p-6">
                        <span class="px-3 py-1 rounded-full text-[10px] font-black uppercase ${item.commission_type === 'percentage' ? 'bg-purple-100 text-purple-600' : 'bg-orange-100 text-orange-600'}">
                            ${item.commission_type || 'Belum diatur'}
                        </span>
                    </td>
                    <td class="p-6 font-black text-blue-600">
                        ${item.commission_type === 'percentage' ? (item.commission_value || 0) + '%' : 'Rp ' + (item.commission_value || 0).toLocaleString()}
                    </td>
                    <td class="p-6 text-center">
                        <button onclick="openEditModal(${item.id}, '${displayName}', '${item.commission_type}', ${item.commission_value})" 
                            class="bg-slate-800 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase hover:bg-blue-600 transition">Set</button>
                    </td>
                </tr>
            `;
        }).join('');
    }
}
        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tab-service').className = `px-6 py-3 rounded-xl font-black text-xs uppercase transition-all ${tab === 'service' ? 'tab-active' : 'text-slate-400'}`;
            document.getElementById('tab-product').className = `px-6 py-3 rounded-xl font-black text-xs uppercase transition-all ${tab === 'product' ? 'tab-active' : 'text-slate-400'}`;
            loadData();
        }

        function openEditModal(id, name, type, value) {
            currentEditingId = id;
            document.getElementById('edit-item-name').innerText = name;
            document.getElementById('com-type').value = type || 'percentage';
            document.getElementById('com-value').value = value || 0;
            document.getElementById('edit-modal').classList.remove('hidden');
        }

        async function updateCommission() {
            const type = document.getElementById('com-type').value;
            const value = parseFloat(document.getElementById('com-value').value);
            const targetTable = (currentTab === 'service') ? 'services' : 'produk';

            await _supabase.from(targetTable)
                .update({ commission_type: type, commission_value: value })
                .eq('id', currentEditingId);

            closeModal();
            loadData();
        }

        function closeModal() { document.getElementById('edit-modal').classList.add('hidden'); }

        loadData();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUNOX POS - Multi Outlet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .selected-card { border-color: #2563eb !important; background-color: #eff6ff !important; border-width: 3px; }
        .active-menu { background-color: #1e293b; border-left: 4px solid #3b82f6; color: white; }
        .hide-scroll::-webkit-scrollbar { display: none; }

        /* --- CSS KHUSUS PRINT --- */
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area {
                position: absolute;
                left: 0;
                top: 0;
                width: 58mm; /* Lebar standar kertas thermal */
                font-family: 'Courier New', Courier, monospace;
                color: black;
                padding: 10px;
            }
            @page { margin: 0; }
        }
        #print-area { display: none; }
    </style>
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden">

    <div id="print-area">
        <div style="text-align: center; border-bottom: 1px dashed #000; padding-bottom: 5px; margin-bottom: 5px;">
            <strong id="p-outlet-title" style="font-size: 16px;">LUNOX POS</strong><br>
            <span id="p-date" style="font-size: 10px;"></span>
        </div>
        <div style="font-size: 12px; line-height: 1.3;">
            <p>Room : <span id="p-room" style="font-weight: bold;"></span></p>
            <p>Staff: <span id="p-staff"></span></p>
            <p>Meja : <span id="p-note"></span></p>
            <p style="border-bottom: 1px dashed #000; margin: 5px 0;"></p>
            <p style="font-size: 14px; font-weight: bold;">ORDER: <span id="p-product"></span></p>
            <p>Harga: Rp <span id="p-price"></span></p>
        </div>
        <div style="text-align: center; margin-top: 10px; font-size: 10px; border-top: 1px dashed #000; padding-top: 5px;">
            *** TIKET PESANAN ***
        </div>
    </div>

    <div id="outlet-selector" class="fixed inset-0 bg-slate-900 z-[100] flex items-center justify-center p-6">
        <div class="max-w-md w-full">
            <div class="text-center mb-10">
                <h1 class="text-4xl font-black text-white italic">LUNOX POS</h1>
                <p class="text-slate-400 mt-2">Pilih lokasi outlet anda bertugas</p>
            </div>
            <div id="outlet-list-btns" class="grid gap-4">
                <div class="p-4 bg-slate-800 animate-pulse rounded-2xl h-16"></div>
            </div>
        </div>
    </div>

    <aside class="w-64 bg-slate-900 text-slate-300 flex flex-col justify-between hidden md:flex" id="main-sidebar">
        <div>
            <div class="p-6 border-b border-slate-800">
                <div class="text-2xl font-black text-white">LUNOX POS</div>
                <div id="active-outlet-badge" class="mt-2 text-[10px] bg-blue-600 text-white px-2 py-1 rounded inline-block font-bold uppercase tracking-widest">Memuat...</div>
            </div>
            <nav class="mt-6 space-y-1">
                <a href="#" onclick="showPage('dashboard')" id="menu-dashboard" class="flex items-center px-6 py-4 hover:bg-slate-800 transition">
                    <i class="fa-solid fa-chart-line mr-3 text-sm"></i> Dashboard
                </a>
                <a href="#" onclick="showPage('bar')" id="menu-bar" class="flex items-center px-6 py-4 hover:bg-slate-800 transition active-menu">
                    <i class="fa-solid fa-utensils mr-3 text-sm"></i> Take Order
                </a>
            </nav>
        </div>
        <div class="p-4 border-t border-slate-800 text-center">
            <button onclick="location.reload()" class="text-xs font-bold text-slate-500 hover:text-white transition uppercase">
                <i class="fa-solid fa-rotate mr-1"></i> Ganti Outlet
            </button>
        </div>
    </aside>

    <main class="flex-1 overflow-y-auto p-4 md:p-8">
        <div id="page-bar" class="page-content">
            <div class="flex flex-col lg:flex-row gap-6">
                <div class="flex-1 space-y-6">
                    <div id="category-filters" class="flex gap-2 overflow-x-auto hide-scroll pb-2"></div>
                    <div id="product-grid" class="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>
                </div>

                <div class="w-full lg:w-80 space-y-4">
                    <div class="bg-white p-6 rounded-3xl shadow-xl border border-gray-100 sticky top-0">
                        <h3 class="font-black text-slate-800 mb-4 border-b pb-2">Detail Pesanan</h3>
                        <div class="space-y-3 mb-6">
                            <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest">Konfigurasi</label>
                            <select id="select-room" class="w-full p-3 bg-gray-50 rounded-xl border-none text-sm font-bold outline-none ring-1 ring-gray-200"></select>
                            <select id="select-staff" class="w-full p-3 bg-gray-50 rounded-xl border-none text-sm font-bold outline-none ring-1 ring-gray-200"></select>
                            <input type="text" id="note" class="w-full p-3 bg-gray-50 rounded-xl border-none text-sm font-bold outline-none ring-1 ring-gray-200" placeholder="No. Meja / Nama">
                        </div>

                        <div id="selected-info" class="p-4 bg-blue-50 rounded-2xl hidden border border-blue-100 mb-6">
                            <p class="text-[10px] text-blue-600 font-bold uppercase">Item:</p>
                            <p id="display-item" class="font-black text-slate-800 text-lg leading-tight"></p>
                        </div>

                        <button onclick="sendOrder()" id="btnSend" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-xl shadow-blue-200 hover:bg-blue-700 active:scale-95 transition-all uppercase tracking-widest">
                            Kirim Order & Print
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div id="page-dashboard" class="page-content hidden text-center py-20">
            <i class="fa-solid fa-chart-pie text-6xl text-slate-200 mb-4"></i>
            <h2 class="text-xl font-bold text-slate-400">Dashboard Statistik Segera Hadir</h2>
        </div>
    </main>

    <script>
        const SB_URL = "https://mbzoydcehhvjdqfefflo.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1iem95ZGNlaGh2amRxZmVmZmxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NzYzNjcsImV4cCI6MjA4ODQ1MjM2N30.q5Ok1HJEeUIh-93KoXuH0zYqRN4i3LcweRMG9pWJkRg";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let allProducts = [];
        let selectedOutlet = null;
        let currentOrder = { product: null };

        async function init() {
            const { data: outlets } = await _supabase.from('outlets').select('*');
            const listDiv = document.getElementById('outlet-list-btns');
            listDiv.innerHTML = outlets.map(o => `
                <button onclick="chooseOutlet('${o.id}', '${o.name}')" class="w-full p-5 bg-slate-800 hover:bg-blue-600 text-white rounded-2xl font-black flex justify-between items-center transition-all group">
                    ${o.name} <i class="fa-solid fa-chevron-right text-slate-600 group-hover:text-white"></i>
                </button>
            `).join('');
        }

        async function chooseOutlet(id, name) {
            selectedOutlet = { id, name };
            document.getElementById('outlet-selector').classList.add('hidden');
            document.getElementById('active-outlet-badge').innerText = name;
            
            const [r, s, p] = await Promise.all([
                _supabase.from('rooms').select('*'),
                _supabase.from('staff').select('*'),
                _supabase.from('products').select('*')
            ]);

            allProducts = p.data;
            document.getElementById('select-room').innerHTML = '<option value="">-- Pilih Room --</option>' + r.data.map(i => `<option value="${i.id}">${i.name}</option>`).join('');
            document.getElementById('select-staff').innerHTML = '<option value="">-- Pilih Staff --</option>' + s.data.map(i => `<option value="${i.id}">${i.name}</option>`).join('');

            const cats = ['All', ...new Set(p.data.map(i => i.category))];
            document.getElementById('category-filters').innerHTML = cats.map(c => `<button onclick="filterItems('${c}', this)" class="category-btn px-5 py-2 rounded-xl bg-white border text-xs font-bold hover:bg-slate-50 transition whitespace-nowrap">${c}</button>`).join('');

            renderProducts(allProducts);
        }

        function renderProducts(items) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = items.map(i => `
                <div onclick="selectProduct('${i.id}', '${i.name}', ${i.price}, this)" class="bg-white p-5 rounded-3xl border-2 border-transparent shadow-sm hover:border-blue-400 cursor-pointer transition-all group active:scale-95">
                    <div class="w-10 h-10 bg-slate-50 rounded-xl flex items-center justify-center text-blue-600 mb-4 group-hover:bg-blue-600 group-hover:text-white transition">
                        <i class="fa-solid fa-bowl-food"></i>
                    </div>
                    <p class="font-black text-slate-800 text-sm leading-tight h-10 overflow-hidden">${i.name}</p>
                    <p class="text-blue-600 font-black text-xs mt-2 uppercase italic">Rp ${i.price.toLocaleString()}</p>
                </div>
            `).join('');
        }

        function filterItems(cat, el) {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('bg-blue-600', 'text-white'));
            if(el) el.classList.add('bg-blue-600', 'text-white');
            const filtered = cat === 'All' ? allProducts : allProducts.filter(i => i.category === cat);
            renderProducts(filtered);
        }

        function selectProduct(id, name, price, el) {
            document.querySelectorAll('#product-grid div').forEach(d => d.classList.remove('selected-card'));
            el.classList.add('selected-card');
            currentOrder.product = { id, name, price };
            document.getElementById('selected-info').classList.remove('hidden');
            document.getElementById('display-item').innerText = name;
        }

        // FUNGSI PRINT TICKET
        function printTicket(roomName, staffName, note) {
            document.getElementById('p-outlet-title').innerText = selectedOutlet.name.toUpperCase();
            document.getElementById('p-date').innerText = new Date().toLocaleString('id-ID');
            document.getElementById('p-room').innerText = roomName;
            document.getElementById('p-staff').innerText = staffName;
            document.getElementById('p-note').innerText = note || '-';
            document.getElementById('p-product').innerText = currentOrder.product.name;
            document.getElementById('p-price').innerText = currentOrder.product.price.toLocaleString('id-ID');

            window.print();
        }

        async function sendOrder() {
            const roomEl = document.getElementById('select-room');
            const staffEl = document.getElementById('select-staff');
            const note = document.getElementById('note').value;

            if(!roomEl.value || !staffEl.value || !currentOrder.product) return alert("⚠️ Mohon lengkapi pilihan Menu, Room, dan Staff!");

            const roomName = roomEl.options[roomEl.selectedIndex].text;
            const staffName = staffEl.options[staffEl.selectedIndex].text;

            const btn = document.getElementById('btnSend');
            btn.disabled = true; btn.innerText = "MENGIRIM & PRINT...";

            const { error } = await _supabase.from('orders').insert([{
                product_name: currentOrder.product.name,
                price: currentOrder.product.price,
                room_id: roomEl.value,
                staff_id: staffEl.value,
                outlet_id: selectedOutlet.id,
                table_number: note,
                status: 'pending'
            }]);

            if(!error) {
                // EKSEKUSI PRINT
                printTicket(roomName, staffName, note);

                alert("✅ Berhasil! Pesanan " + selectedOutlet.name + " telah terkirim.");
                
                // Reset Selection
                currentOrder.product = null;
                document.getElementById('selected-info').classList.add('hidden');
                document.querySelectorAll('.selected-card').forEach(c => c.classList.remove('selected-card'));
                document.getElementById('note').value = "";
            } else { alert(error.message); }
            btn.disabled = false; btn.innerText = "KIRIM ORDER & PRINT";
        }

        function showPage(page) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('nav a').forEach(a => a.classList.remove('active-menu'));
            document.getElementById(`page-${page}`).classList.remove('hidden');
            document.getElementById(`menu-${page}`).classList.add('active-menu');
        }

        init();
    </script>
</body>
</html>

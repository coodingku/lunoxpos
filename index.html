<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUNOX POS - Open/Close Room</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        .selected-card { border-color: #2563eb !important; background-color: #eff6ff !important; border-width: 3px; }
        .active-menu { background-color: #1e293b; border-left: 4px solid #3b82f6; color: white; }
        
        /* PRINT CONFIG */
        #print-area { display: none; }
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible !important; display: block !important; color: black !important; }
            #print-area { position: absolute; left: 0; top: 0; width: 58mm; font-family: 'Courier New', monospace; padding: 5px; background: white; }
            @page { size: auto; margin: 0mm; }
        }

        .history-scroll { max-height: calc(100vh - 250px); overflow-y: auto; }
    </style>
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden text-slate-800">

    <div id="print-area">
        <div style="text-align: center; border-bottom: 1px dashed #000; padding-bottom: 8px; margin-bottom: 8px;">
            <strong id="p-outlet-title" style="font-size: 16px;">LUNOX POS</strong><br>
            <span id="p-date" style="font-size: 10px;"></span>
        </div>
        <div style="font-size: 12px; line-height: 1.4;">
            <p>Room : <span id="p-room" style="font-weight: bold;"></span></p>
            <p>Staff: <span id="p-staff"></span></p>
            <p>Note : <span id="p-note"></span></p>
            <p style="border-bottom: 1px dashed #000; margin: 8px 0;"></p>
            <div id="p-items-list" style="font-size: 12px;">
                </div>
            <p style="border-bottom: 1px dashed #000; margin: 8px 0;"></p>
            <p style="display: flex; justify-content: space-between; font-weight: bold; font-size: 14px;">
                <span>TOTAL:</span>
                <span>Rp <span id="p-total-price"></span></span>
            </p>
        </div>
        <div style="text-align: center; margin-top: 20px; font-size: 10px; border-top: 1px dashed #000; padding-top: 8px;">
            *** TERIMA KASIH ***
        </div>
    </div>

    <div id="outlet-selector" class="fixed inset-0 bg-slate-900 z-[100] flex items-center justify-center p-6">
        <div class="max-w-md w-full text-center">
            <h1 class="text-4xl font-black text-white italic mb-10 text-blue-500">LUNOX POS</h1>
            <div id="outlet-list-btns" class="grid gap-4 text-left"></div>
        </div>
    </div>

    <aside class="w-64 bg-slate-900 text-slate-300 flex flex-col hidden md:flex">
        <div class="p-6 border-b border-slate-800">
            <div class="text-2xl font-black text-white italic">LUNOX <span class="text-blue-500">POS</span></div>
            <div id="active-outlet-badge" class="mt-2 text-[10px] bg-blue-600 text-white px-2 py-1 rounded inline-block font-bold uppercase">Memuat...</div>
        </div>
        <nav class="mt-4 flex-1">
            <a href="#" onclick="showPage('bar')" id="menu-bar" class="flex items-center px-6 py-4 active-menu transition">
                <i class="fa-solid fa-cash-register mr-3 text-sm"></i> Take Order
            </a>
            <a href="#" onclick="showPage('dashboard')" id="menu-dashboard" class="flex items-center px-6 py-4 hover:bg-slate-800 transition">
                <i class="fa-solid fa-history mr-3 text-sm"></i> Riwayat Transaksi
            </a>
        </nav>
        <button onclick="location.reload()" class="p-6 text-xs font-bold text-slate-500 hover:text-white border-t border-slate-800 text-left uppercase">
            <i class="fa-solid fa-rotate mr-2"></i> Ganti Outlet
        </button>
    </aside>

    <main class="flex-1 overflow-y-auto p-4 md:p-8">
        
        <div id="page-bar" class="page-content">
            <div class="flex flex-col lg:flex-row gap-6">
                <div class="flex-1 space-y-6">
                    <div class="bg-white p-4 rounded-3xl shadow-sm border border-gray-100">
                        <div class="relative w-full">
                            <i class="fa fa-search absolute left-4 top-3.5 text-gray-400"></i>
                            <input type="text" id="search-input" oninput="filterBySearch()" placeholder="Cari nama menu..." class="w-full pl-12 pr-4 py-3 bg-gray-50 rounded-2xl border-none ring-1 ring-gray-200 focus:ring-2 focus:ring-blue-500 outline-none font-bold text-sm">
                        </div>
                    </div>
                    
                    <div id="product-grid" class="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>
                </div>

                <div class="w-full lg:w-80">
                    <div class="bg-white p-6 rounded-3xl shadow-xl border border-gray-100 sticky top-4">
                        <h3 class="font-black text-slate-800 mb-4 flex items-center tracking-tighter uppercase text-sm">
                            <i class="fa fa-door-open mr-2 text-blue-600"></i> Status Billing Room
                        </h3>
                        
                        <div class="space-y-3 mb-6">
                            <select id="select-room" onchange="checkRoomStatus()" class="w-full p-3 bg-gray-50 rounded-xl border-none text-xs font-bold outline-none ring-1 ring-gray-200"></select>
                            <select id="select-staff" class="w-full p-3 bg-gray-50 rounded-xl border-none text-xs font-bold outline-none ring-1 ring-gray-200"></select>
                            <input type="text" id="note" class="w-full p-3 bg-gray-50 rounded-xl border-none text-xs font-bold outline-none ring-1 ring-gray-200" placeholder="Nama Tamu">
                        </div>

                        <div id="active-bill-container" class="mb-6 hidden border-t border-dashed pt-4">
                            <p class="text-[10px] font-black text-gray-400 mb-2 uppercase">Order Aktif di Room:</p>
                            <div id="active-items-list" class="space-y-2 max-h-40 overflow-y-auto mb-3 pr-1"></div>
                            <div class="flex justify-between items-center bg-slate-900 text-white p-3 rounded-xl">
                                <span class="text-[10px] font-bold">TOTAL BILL:</span>
                                <span id="room-total-bill" class="font-black text-sm text-blue-400">Rp 0</span>
                            </div>
                        </div>

                        <div id="selected-info" class="p-4 bg-blue-50 rounded-2xl hidden border border-blue-200 mb-6 text-center">
                            <p id="display-item" class="font-black text-slate-800 text-[10px] uppercase mb-1"></p>
                            <p id="display-price" class="text-blue-700 font-black text-sm"></p>
                        </div>

                        <div class="space-y-2">
                            <button onclick="sendOrder()" id="btnSend" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black shadow-lg hover:bg-blue-700 active:scale-95 transition-all uppercase text-[10px] tracking-widest">
                                <i class="fa fa-plus-circle mr-1"></i> Add Item ke Room
                            </button>
                            <button onclick="closeRoom()" id="btnCloseRoom" class="w-full bg-red-600 text-white py-3 rounded-2xl font-black shadow-lg hover:bg-red-700 active:scale-95 transition-all uppercase text-[10px] tracking-widest hidden">
                                <i class="fa fa-receipt mr-1"></i> Close Room (Bayar)
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="page-dashboard" class="page-content hidden">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100 mb-6 flex flex-col md:flex-row justify-between items-center gap-4">
                <h2 class="text-xl font-black text-slate-800 uppercase italic">History Penjualan</h2>
                <div class="flex flex-wrap gap-2 w-full md:w-auto">
                    <button onclick="loadHistory()" class="bg-slate-800 text-white px-6 py-2 rounded-xl text-[10px] font-black uppercase hover:bg-blue-600 transition">
                        <i class="fa fa-sync mr-2"></i> Refresh
                    </button>
                </div>
            </div>

            <div class="bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden">
                <div class="history-scroll">
                    <table class="w-full text-left">
                        <thead class="bg-slate-900 text-slate-400 text-[10px] font-black uppercase sticky top-0 z-10">
                            <tr>
                                <th class="p-4">Waktu Close</th>
                                <th class="p-4">Item Menu</th>
                                <th class="p-4">Room & Staff</th>
                                <th class="p-4">Total</th>
                                <th class="p-4 text-center">Opsi</th>
                            </tr>
                        </thead>
                        <tbody id="history-body" class="text-xs font-bold divide-y divide-gray-50"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script>
        const SB_URL = "https://mbzoydcehhvjdqfefflo.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1iem95ZGNlaGh2amRxZmVmZmxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NzYzNjcsImV4cCI6MjA4ODQ1MjM2N30.q5Ok1HJEeUIh-93KoXuH0zYqRN4i3LcweRMG9pWJkRg";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let allProducts = [];
        let selectedOutlet = null;
        let currentOrderProduct = null;
        let activeRoomOrders = [];

        async function init() {
            const { data: outlets } = await _supabase.from('outlets').select('*');
            document.getElementById('outlet-list-btns').innerHTML = outlets.map(o => `
                <button onclick="chooseOutlet('${o.id}', '${o.name}')" class="w-full p-5 bg-slate-800 hover:bg-blue-600 text-white rounded-2xl font-black flex justify-between items-center transition-all group uppercase text-sm italic">
                    ${o.name} <i class="fa fa-chevron-right text-slate-600 group-hover:text-white"></i>
                </button>
            `).join('');
        }

        async function chooseOutlet(id, name) {
            selectedOutlet = { id, name };
            document.getElementById('outlet-selector').classList.add('hidden');
            document.getElementById('active-outlet-badge').innerText = name;
            
            const [r, s, p] = await Promise.all([
                _supabase.from('rooms').select('*'),
                _supabase.from('staff').select('*'),
                _supabase.from('products').select('*').eq('outlet_name', name)
            ]);

            allProducts = p.data || [];
            document.getElementById('select-room').innerHTML = '<option value="">-- PILIH ROOM --</option>' + r.data.map(i => `<option value="${i.id}">${i.name}</option>`).join('');
            document.getElementById('select-staff').innerHTML = '<option value="">-- PILIH STAFF --</option>' + s.data.map(i => `<option value="${i.id}">${i.name}</option>`).join('');
            
            renderProducts(allProducts);
        }

        async function checkRoomStatus() {
            const roomId = document.getElementById('select-room').value;
            const container = document.getElementById('active-bill-container');
            const listEl = document.getElementById('active-items-list');
            const btnClose = document.getElementById('btnCloseRoom');

            if (!roomId) {
                container.classList.add('hidden');
                btnClose.classList.add('hidden');
                return;
            }

            // Ambil order dengan status 'pending' (Open Bill)
            const { data } = await _supabase.from('orders').select('*').eq('room_id', roomId).eq('status', 'pending');
            activeRoomOrders = data || [];

            if (activeRoomOrders.length > 0) {
                container.classList.remove('hidden');
                btnClose.classList.remove('hidden');
                let total = 0;
                listEl.innerHTML = activeRoomOrders.map(item => {
                    total += item.price;
                    return `<div class="flex justify-between text-[10px] bg-gray-50 p-2 rounded-lg border-l-2 border-blue-500">
                        <span class="uppercase font-bold text-slate-600">${item.product_name}</span>
                        <span class="font-black">Rp ${item.price.toLocaleString()}</span>
                    </div>`;
                }).join('');
                document.getElementById('room-total-bill').innerText = `Rp ${total.toLocaleString()}`;
            } else {
                container.classList.add('hidden');
                btnClose.classList.add('hidden');
            }
        }

        function renderProducts(items) {
            const grid = document.getElementById('product-grid');
            const keyword = document.getElementById('search-input').value.trim();
            const displayItems = keyword === "" ? items.slice(0, 8) : items;

            grid.innerHTML = displayItems.map(i => `
                <div onclick="selectProduct('${i.id}', '${i.name}', ${i.price}, this)" class="bg-white p-4 rounded-3xl border-2 border-transparent shadow-sm hover:border-blue-400 cursor-pointer transition-all active:scale-95 group">
                    <div class="w-8 h-8 bg-blue-50 text-blue-600 rounded-lg flex items-center justify-center mb-3 group-hover:bg-blue-600 group-hover:text-white transition"><i class="fa-solid fa-mug-hot text-xs"></i></div>
                    <p class="font-black text-slate-800 text-[10px] leading-tight h-8 overflow-hidden uppercase">${i.name}</p>
                    <p class="text-blue-600 font-black text-[10px] mt-2 italic">Rp ${i.price.toLocaleString()}</p>
                </div>
            `).join('');
        }

        function selectProduct(id, name, price, el) {
            document.querySelectorAll('#product-grid div').forEach(d => d.classList.remove('selected-card'));
            el.classList.add('selected-card');
            currentOrderProduct = { id, name, price };
            document.getElementById('selected-info').classList.remove('hidden');
            document.getElementById('display-item').innerText = name;
            document.getElementById('display-price').innerText = "Rp " + price.toLocaleString();
        }

        async function sendOrder() {
            const roomEl = document.getElementById('select-room');
            const staffEl = document.getElementById('select-staff');
            const note = document.getElementById('note').value;

            if(!roomEl.value || !staffEl.value || !currentOrderProduct) return alert("⚠️ Pilih Menu, Room, dan Staff!");

            const btn = document.getElementById('btnSend');
            btn.disabled = true;

            const { error } = await _supabase.from('orders').insert([{
                product_name: currentOrderProduct.name,
                price: currentOrderProduct.price,
                room_id: roomEl.value,
                staff_id: staffEl.value,
                outlet_id: selectedOutlet.id,
                table_number: note,
                status: 'pending' // Status pending berarti Open Bill
            }]);

            if(!error) {
                alert("Item Berhasil Ditambahkan!");
                await checkRoomStatus();
                resetForm();
            }
            btn.disabled = false;
        }

        async function closeRoom() {
            const roomEl = document.getElementById('select-room');
            const roomId = roomEl.value;
            const roomName = roomEl.options[roomEl.selectedIndex].text;
            const staffName = document.getElementById('select-staff').options[document.getElementById('select-staff').selectedIndex].text;
            const note = document.getElementById('note').value;

            if(!confirm(`Close Room ${roomName} dan cetak bill final?`)) return;

            // 1. Ambil data terakhir untuk diprint
            const { data: bills } = await _supabase.from('orders').select('*').eq('room_id', roomId).eq('status', 'pending');
            
            // 2. Update status jadi 'paid'
            const { error } = await _supabase.from('orders').update({ status: 'paid' }).eq('room_id', roomId).eq('status', 'pending');

            if(!error) {
                // Siapkan Print
                document.getElementById('p-outlet-title').innerText = selectedOutlet.name.toUpperCase();
                document.getElementById('p-date').innerText = new Date().toLocaleString('id-ID');
                document.getElementById('p-room').innerText = roomName;
                document.getElementById('p-staff').innerText = staffName;
                document.getElementById('p-note').innerText = note || '-';
                
                let total = 0;
                document.getElementById('p-items-list').innerHTML = bills.map(b => {
                    total += b.price;
                    return `<div style="display:flex; justify-content:space-between; margin-bottom:4px;">
                        <span>${b.product_name}</span>
                        <span>${b.price.toLocaleString()}</span>
                    </div>`;
                }).join('');
                document.getElementById('p-total-price').innerText = total.toLocaleString('id-ID');

                setTimeout(() => {
                    window.print();
                    checkRoomStatus();
                    resetForm();
                }, 500);
            }
        }

        function resetForm() {
            currentOrderProduct = null;
            document.getElementById('selected-info').classList.add('hidden');
            document.querySelectorAll('.selected-card').forEach(c => c.classList.remove('selected-card'));
            document.getElementById('search-input').value = "";
            renderProducts(allProducts);
        }

        async function loadHistory() {
            const tbody = document.getElementById('history-body');
            tbody.innerHTML = '<tr><td colspan="5" class="p-10 text-center opacity-50">Memuat...</td></tr>';

            const { data } = await _supabase.from('orders')
                .select('*, rooms(name), staff(name)')
                .eq('outlet_id', selectedOutlet.id)
                .eq('status', 'paid')
                .order('created_at', { ascending: false }).limit(50);

            tbody.innerHTML = data.map(o => `
                <tr class="hover:bg-slate-50 transition">
                    <td class="p-4 text-[10px] text-slate-400">${new Date(o.created_at).toLocaleString()}</td>
                    <td class="p-4 uppercase text-slate-800">${o.product_name}</td>
                    <td class="p-4"><span class="bg-blue-50 text-blue-600 px-2 py-0.5 rounded text-[9px] uppercase">${o.rooms?.name}</span></td>
                    <td class="p-4 text-blue-600 font-black italic">Rp ${o.price.toLocaleString()}</td>
                    <td class="p-4 text-center"><i class="fa fa-check-circle text-green-500"></i></td>
                </tr>`).join('');
        }

        function showPage(page) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('nav a').forEach(a => a.classList.remove('active-menu'));
            document.getElementById(`page-${page}`).classList.remove('hidden');
            document.getElementById(`menu-${page}`).classList.add('active-menu');
            if(page === 'dashboard') loadHistory();
        }

        function filterBySearch() {
            const keyword = document.getElementById('search-input').value.toLowerCase();
            const filtered = allProducts.filter(p => p.name.toLowerCase().includes(keyword));
            renderProducts(filtered);
        }

        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUNOX POS - Auto-Print Order</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        .selected-card { border-color: #3b82f6 !important; background-color: #eff6ff !important; border-width: 3px; }
        .active-menu { background-color: #1e293b; border-left: 4px solid #3b82f6; color: white; }
        
        #print-area { display: none; }
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible !important; display: block !important; color: black !important; }
            #print-area { position: absolute; left: 0; top: 0; width: 58mm; font-family: 'Courier New', monospace; padding: 5px; background: white; }
            @page { size: auto; margin: 0mm; }
        }
    </style>
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden text-slate-800">

    <div id="print-area">
        <div style="text-align: center; border-bottom: 1px dashed #000; padding-bottom: 8px; margin-bottom: 8px;">
            <strong id="p-title" style="font-size: 16px;">ORDER SLIP</strong><br>
            <span id="p-outlet-title" style="font-size: 10px;"></span><br>
            <span id="p-date" style="font-size: 10px;"></span>
        </div>
        <div style="font-size: 12px; line-height: 1.4;">
            <p>Room : <span id="p-room" style="font-weight: bold;"></span></p>
            <p>Staff: <span id="p-staff"></span></p>
            <p style="border-bottom: 1px dashed #000; margin: 8px 0;"></p>
            <div id="p-items-list" style="font-size: 13px;"></div>
            <div id="p-total-section">
                <p style="border-bottom: 1px dashed #000; margin: 8px 0;"></p>
                <p style="display: flex; justify-content: space-between; font-weight: bold; font-size: 14px;">
                    <span>TOTAL:</span>
                    <span>Rp <span id="p-total-price"></span></span>
                </p>
            </div>
        </div>
        <div style="text-align: center; margin-top: 20px; font-size: 10px; border-top: 1px dashed #000; padding-top: 8px;">
            <span id="p-footer">*** LUNOX POS ***</span>
        </div>
    </div>

    <div id="outlet-selector" class="fixed inset-0 bg-slate-900 z-[100] flex items-center justify-center p-6">
        <div class="max-w-md w-full text-center">
            <h1 class="text-4xl font-black text-white italic mb-10 text-blue-500 uppercase">Lunox POS</h1>
            <div id="outlet-list-btns" class="grid gap-4"></div>
        </div>
    </div>

    <aside class="w-64 bg-slate-900 text-slate-300 flex flex-col hidden md:flex border-r border-slate-800">
        <div class="p-6 border-b border-slate-800">
            <div class="text-2xl font-black text-white italic uppercase">LUNOX <span class="text-blue-500">POS</span></div>
            <div id="active-outlet-badge" class="mt-2 text-[10px] bg-blue-600 text-white px-2 py-1 rounded inline-block font-bold">OUTLET</div>
        </div>
        <nav class="mt-4 flex-1">
            <a href="#" onclick="showPage('rooms')" id="menu-rooms" class="flex items-center px-6 py-4 active-menu transition">
                <i class="fa-solid fa-door-closed mr-3"></i> Daftar Room
            </a>
            <a href="#" onclick="showPage('dashboard')" id="menu-dashboard" class="flex items-center px-6 py-4 hover:bg-slate-800 transition">
                <i class="fa-solid fa-history mr-3"></i> Riwayat Paid
            </a>
        </nav>
        <button onclick="location.reload()" class="p-6 text-xs font-bold text-slate-500 hover:text-white border-t border-slate-800 text-left uppercase">
            <i class="fa-solid fa-rotate mr-2"></i> Ganti Outlet
        </button>
    </aside>

    <main class="flex-1 overflow-y-auto">
        
        <div id="page-rooms" class="p-8 page-content">
            <h2 class="text-2xl font-black mb-6 uppercase italic tracking-tighter">Pilih Room</h2>
            <div id="room-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4"></div>
        </div>

        <div id="page-order" class="p-8 page-content hidden">
            <div class="flex items-center gap-4 mb-6">
                <button onclick="showPage('rooms')" class="bg-white p-3 rounded-2xl shadow-sm hover:bg-gray-100 transition">
                    <i class="fa fa-arrow-left"></i>
                </button>
                <h2 id="current-room-title" class="text-2xl font-black uppercase italic text-blue-600">ROOM NAME</h2>
            </div>

            <div class="flex flex-col lg:flex-row gap-6">
                <div class="flex-1 space-y-6">
                    <div class="bg-white p-4 rounded-3xl shadow-sm border border-gray-100">
                        <input type="text" id="search-input" oninput="filterBySearch()" placeholder="Cari menu..." class="w-full px-6 py-3 bg-gray-50 rounded-2xl border-none ring-1 ring-gray-200 outline-none font-bold text-sm">
                    </div>
                    <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-4"></div>
                </div>

                <div class="w-full lg:w-96">
                    <div class="bg-white p-6 rounded-3xl shadow-xl border border-gray-100 sticky top-4">
                        <div class="mb-4">
                            <label class="text-[10px] font-black text-gray-400 uppercase">Staff In-Charge</label>
                            <select id="select-staff" class="w-full p-3 bg-gray-50 rounded-xl border-none text-xs font-bold outline-none ring-1 ring-gray-200 mt-1"></select>
                        </div>

                        <div id="bill-section" class="border-t border-dashed pt-4 mb-6">
                            <p class="text-[10px] font-black text-gray-400 mb-3 uppercase italic">Bill Terdaftar:</p>
                            <div id="active-items-list" class="space-y-2 mb-4 max-h-60 overflow-y-auto"></div>
                            <div class="flex justify-between items-center bg-slate-900 text-white p-4 rounded-2xl">
                                <span class="text-xs font-bold">TOTAL:</span>
                                <span id="room-total-bill" class="font-black text-lg text-blue-400">Rp 0</span>
                            </div>
                        </div>

                        <div id="new-item-selected" class="hidden p-4 bg-blue-50 rounded-2xl border border-blue-200 mb-6 text-center animate-pulse">
                            <p id="display-item" class="font-black text-slate-800 text-[10px] uppercase"></p>
                            <p id="display-price" class="text-blue-700 font-black text-sm"></p>
                        </div>

                        <div class="grid grid-cols-1 gap-2">
                            <button onclick="saveAndPrintOrder()" id="btnSend" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black hover:bg-blue-700 active:scale-95 transition-all uppercase text-xs">
                                <i class="fa fa-print mr-1"></i> Tambah & Print Slip
                            </button>
                            <button onclick="closeRoom()" id="btnCloseRoom" class="w-full bg-red-600 text-white py-3 rounded-2xl font-black hover:bg-red-700 active:scale-95 transition-all uppercase text-xs hidden">
                                <i class="fa fa-receipt mr-1"></i> Close & Print Final
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="page-dashboard" class="p-8 page-content hidden">
             <h2 class="text-2xl font-black mb-6 uppercase italic">Riwayat Selesai</h2>
             <div class="bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-900 text-slate-400 text-[10px] font-black uppercase">
                        <tr>
                            <th class="p-4">Waktu</th>
                            <th class="p-4">Item</th>
                            <th class="p-4">Room</th>
                            <th class="p-4 text-right">Harga</th>
                        </tr>
                    </thead>
                    <tbody id="history-body" class="text-xs font-bold divide-y divide-gray-50"></tbody>
                </table>
             </div>
        </div>

    </main>

    <script>
        const SB_URL = "https://mbzoydcehhvjdqfefflo.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1iem95ZGNlaGh2amRxZmVmZmxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NzYzNjcsImV4cCI6MjA4ODQ1MjM2N30.q5Ok1HJEeUIh-93KoXuH0zYqRN4i3LcweRMG9pWJkRg";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let allProducts = [], allRooms = [], selectedOutlet = null, activeRoom = null, currentOrderProduct = null;

        async function init() {
            const { data: outlets } = await _supabase.from('outlets').select('*');
            document.getElementById('outlet-list-btns').innerHTML = outlets.map(o => `
                <button onclick="chooseOutlet('${o.id}', '${o.name}')" class="w-full p-6 bg-slate-800 hover:bg-blue-600 text-white rounded-3xl font-black flex justify-between items-center transition-all group uppercase italic text-sm">
                    ${o.name} <i class="fa fa-chevron-right opacity-30 group-hover:opacity-100"></i>
                </button>
            `).join('');
        }

        async function chooseOutlet(id, name) {
            selectedOutlet = { id, name };
            document.getElementById('outlet-selector').classList.add('hidden');
            document.getElementById('active-outlet-badge').innerText = name;
            const [r, s, p] = await Promise.all([
                _supabase.from('rooms').select('*'),
                _supabase.from('staff').select('*'),
                _supabase.from('products').select('*').eq('outlet_name', name)
            ]);
            allRooms = r.data || [];
            allProducts = p.data || [];
            document.getElementById('select-staff').innerHTML = s.data.map(i => `<option value="${i.id}">${i.name}</option>`).join('');
            renderRooms();
            renderProducts(allProducts);
        }

        async function renderRooms() {
            const grid = document.getElementById('room-grid');
            const { data: activeOrders } = await _supabase.from('orders').select('room_id').eq('status', 'pending');
            const occupiedRoomIds = [...new Set(activeOrders.map(o => o.room_id))];

            grid.innerHTML = allRooms.map(room => {
                const isOccupied = occupiedRoomIds.includes(room.id);
                return `
                <div onclick="openRoom('${room.id}', '${room.name}')" class="cursor-pointer transition-all active:scale-95">
                    <div class="${isOccupied ? 'bg-blue-600 text-white shadow-blue-200' : 'bg-white text-slate-400 border border-gray-200'} p-6 rounded-3xl shadow-lg text-center h-32 flex flex-col justify-center items-center">
                        <i class="fa ${isOccupied ? 'fa-door-open' : 'fa-door-closed'} text-2xl mb-2"></i>
                        <span class="font-black text-[10px] uppercase">${room.name}</span>
                    </div>
                </div>`;
            }).join('');
        }

        async function openRoom(id, name) {
            activeRoom = { id, name };
            document.getElementById('current-room-title').innerText = name;
            showPage('order');
            await refreshRoomBill();
        }

        async function refreshRoomBill() {
            const { data: bills } = await _supabase.from('orders').select('*').eq('room_id', activeRoom.id).eq('status', 'pending');
            const listEl = document.getElementById('active-items-list');
            const btnClose = document.getElementById('btnCloseRoom');
            
            if (bills && bills.length > 0) {
                btnClose.classList.remove('hidden');
                let total = 0;
                listEl.innerHTML = bills.map(b => {
                    total += b.price;
                    return `<div class="flex justify-between text-[10px] bg-gray-50 p-3 rounded-xl border-l-4 border-blue-500 font-bold">
                        <span class="uppercase">${b.product_name}</span><span>Rp ${b.price.toLocaleString()}</span>
                    </div>`;
                }).join('');
                document.getElementById('room-total-bill').innerText = `Rp ${total.toLocaleString()}`;
            } else {
                listEl.innerHTML = '<div class="text-center py-4 text-gray-300 text-[10px] italic">Belum ada pesanan...</div>';
                document.getElementById('room-total-bill').innerText = "Rp 0";
                btnClose.classList.add('hidden');
            }
        }

        function renderProducts(items) {
            const grid = document.getElementById('product-grid');
            const keyword = document.getElementById('search-input').value.trim();
            const displayItems = keyword === "" ? items.slice(0, 8) : items;
            grid.innerHTML = displayItems.map(i => `
                <div onclick="selectProduct('${i.id}', '${i.name}', ${i.price}, this)" class="bg-white p-4 rounded-3xl border-2 border-transparent shadow-sm hover:border-blue-400 cursor-pointer transition-all active:scale-95">
                    <p class="font-black text-slate-800 text-[10px] leading-tight uppercase h-8 overflow-hidden">${i.name}</p>
                    <p class="text-blue-600 font-black text-[10px] mt-2 italic">Rp ${i.price.toLocaleString()}</p>
                </div>`).join('');
        }

        function selectProduct(id, name, price, el) {
            document.querySelectorAll('#product-grid div').forEach(d => d.classList.remove('selected-card'));
            el.classList.add('selected-card');
            currentOrderProduct = { id, name, price };
            document.getElementById('new-item-selected').classList.remove('hidden');
            document.getElementById('display-item').innerText = name;
            document.getElementById('display-price').innerText = "Rp " + price.toLocaleString();
        }

        // FUNGSI BARU: TAMBAH + AUTO PRINT SLIP
        async function saveAndPrintOrder() {
            if(!currentOrderProduct) return alert("Pilih menu dulu!");
            const staffName = document.getElementById('select-staff').options[document.getElementById('select-staff').selectedIndex].text;
            const staffId = document.getElementById('select-staff').value;

            const { error } = await _supabase.from('orders').insert([{
                product_name: currentOrderProduct.name, price: currentOrderProduct.price,
                room_id: activeRoom.id, staff_id: staffId, outlet_id: selectedOutlet.id, status: 'pending'
            }]);

            if(!error) {
                // Set Data untuk Print Slip Order
                document.getElementById('p-title').innerText = "ORDER SLIP";
                document.getElementById('p-outlet-title').innerText = selectedOutlet.name;
                document.getElementById('p-date').innerText = new Date().toLocaleString();
                document.getElementById('p-room').innerText = activeRoom.name;
                document.getElementById('p-staff').innerText = staffName;
                document.getElementById('p-items-list').innerHTML = `<div style="display:flex; justify-content:space-between; font-weight:bold; font-size:16px;">
                    <span>${currentOrderProduct.name}</span><span>(1)</span>
                </div>`;
                document.getElementById('p-total-section').style.display = "none";
                document.getElementById('p-footer').innerText = "*** ORDER BERHASIL DIKIRIM ***";

                // Print
                setTimeout(() => {
                    window.print();
                    currentOrderProduct = null;
                    document.getElementById('new-item-selected').classList.add('hidden');
                    document.querySelectorAll('.selected-card').forEach(c => c.classList.remove('selected-card'));
                    refreshRoomBill();
                }, 300);
            }
        }

        async function closeRoom() {
            if(!confirm("Close room dan print bill final?")) return;
            const staffName = document.getElementById('select-staff').options[document.getElementById('select-staff').selectedIndex].text;
            const { data: bills } = await _supabase.from('orders').select('*').eq('room_id', activeRoom.id).eq('status', 'pending');
            const { error } = await _supabase.from('orders').update({ status: 'paid' }).eq('room_id', activeRoom.id).eq('status', 'pending');

            if(!error) {
                document.getElementById('p-title').innerText = "FINAL BILL";
                document.getElementById('p-outlet-title').innerText = selectedOutlet.name;
                document.getElementById('p-date').innerText = new Date().toLocaleString();
                document.getElementById('p-room').innerText = activeRoom.name;
                document.getElementById('p-staff').innerText = staffName;
                document.getElementById('p-total-section').style.display = "block";
                
                let total = 0;
                document.getElementById('p-items-list').innerHTML = bills.map(b => {
                    total += b.price;
                    return `<div style="display:flex; justify-content:space-between; margin-bottom:4px;">
                        <span>${b.product_name}</span><span>${b.price.toLocaleString()}</span>
                    </div>`;
                }).join('');
                document.getElementById('p-total-price').innerText = total.toLocaleString();
                document.getElementById('p-footer').innerText = "*** TERIMA KASIH ***";

                setTimeout(() => {
                    window.print();
                    showPage('rooms');
                }, 500);
            }
        }

        async function loadHistory() {
            const tbody = document.getElementById('history-body');
            tbody.innerHTML = '<tr><td colspan="4" class="p-10 text-center opacity-30 italic">Memuat...</td></tr>';
            const { data } = await _supabase.from('orders').select('*, rooms(name)').eq('outlet_id', selectedOutlet.id).eq('status', 'paid').order('created_at', { ascending: false }).limit(50);
            tbody.innerHTML = data.map(o => `<tr class="hover:bg-slate-50 transition"><td class="p-4 text-slate-400">${new Date(o.created_at).toLocaleTimeString()}</td><td class="p-4 uppercase">${o.product_name}</td><td class="p-4"><span class="bg-blue-50 text-blue-600 px-2 py-0.5 rounded uppercase text-[9px]">${o.rooms?.name}</span></td><td class="p-4 text-right text-blue-600 font-black italic">Rp ${o.price.toLocaleString()}</td></tr>`).join('');
        }

        function filterBySearch() {
            const keyword = document.getElementById('search-input').value.toLowerCase();
            const filtered = allProducts.filter(p => p.name.toLowerCase().includes(keyword));
            renderProducts(filtered);
        }

        function showPage(page) {
            document.querySelectorAll('.page-content').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('nav a').forEach(a => a.classList.remove('active-menu'));
            document.getElementById(`page-${page}`).classList.remove('hidden');
            const menuBtn = document.getElementById(`menu-${page}`);
            if(menuBtn) menuBtn.classList.add('active-menu');
            if(page === 'rooms') renderRooms();
            if(page === 'dashboard') loadHistory();
        }

        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUNOX POS - FINAL STABLE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden text-slate-800">

    <div id="outlet-selector" class="fixed inset-0 bg-slate-900 z-[100] flex items-center justify-center p-6">
        <div class="max-w-md w-full text-center">
            <h1 class="text-3xl font-bold text-white mb-8 uppercase tracking-widest">Pilih Outlet</h1>
            <div id="outlet-list-btns" class="grid gap-4">
                <p class="text-white animate-pulse">Memuat data...</p>
            </div>
        </div>
    </div>

    <aside class="w-64 bg-slate-900 text-slate-400 flex flex-col border-r border-slate-800">
        <div class="p-6 border-b border-slate-800 text-xl font-bold text-white italic">LUNOX <span class="text-blue-500">POS</span></div>
        <nav class="mt-4 flex-1">
            <button onclick="showPage('rooms')" class="w-full flex items-center px-6 py-4 hover:bg-slate-800 transition"><i class="fa fa-table-cells mr-3"></i>Floor Map</button>
        </nav>
        <div class="p-4"><button onclick="location.reload()" class="w-full py-3 bg-slate-800 rounded-lg text-xs font-bold uppercase">Logout</button></div>
    </aside>

    <main class="flex-1 overflow-y-auto p-8">
        <div id="page-rooms" class="page-content">
            <h2 class="text-2xl font-bold mb-6 uppercase italic">Floor Map</h2>
            <div id="room-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6"></div>
        </div>

        <div id="page-order" class="page-content hidden">
            <div class="flex gap-8">
                <div class="flex-1">
                    <div class="flex items-center gap-4 mb-6">
                        <button onclick="showPage('rooms')" class="bg-white p-3 rounded-lg shadow"><i class="fa fa-arrow-left"></i></button>
                        <h2 id="current-room-title" class="text-2xl font-bold text-blue-600 uppercase">ROOM</h2>
                    </div>
                    <div id="product-grid" class="grid grid-cols-2 md:grid-cols-3 gap-4"></div>
                </div>

                <div class="w-96 bg-white p-6 rounded-3xl shadow-xl h-fit">
                    <label class="text-[10px] font-bold text-gray-400 uppercase">Staff Bertugas</label>
                    <select id="select-staff" class="w-full p-3 bg-gray-50 rounded-xl border-none ring-1 ring-gray-200 mt-1 mb-6 font-bold"></select>
                    
                    <div id="active-items-list" class="space-y-2 mb-6 max-h-64 overflow-y-auto"></div>
                    
                    <div class="bg-slate-900 p-4 rounded-2xl text-white flex justify-between mb-4">
                        <span class="text-xs opacity-60">TOTAL BILL</span>
                        <span id="room-total-bill" class="font-bold text-lg text-blue-400">Rp 0</span>
                    </div>
                    <button onclick="checkout()" id="btnCheckout" class="w-full bg-emerald-600 text-white py-4 rounded-xl font-bold uppercase text-xs hidden">Selesaikan Pembayaran</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const SB_URL = "https://mbzoydcehhvjdqfefflo.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1iem95ZGNlaGh2amRxZmVmZmxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NzYzNjcsImV4cCI6MjA4ODQ1MjM2N30.q5Ok1HJEeUIh-93KoXuH0zYqRN4i3LcweRMG9pWJkRg";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let selectedOutlet = null, activeRoom = null, allProducts = [], allRooms = [];

        async function init() {
            // LISTENER REALTIME (Karena di database sudah AKTIF)
            _supabase.channel('custom-all-channel')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'orders' }, (payload) => {
                    console.log('Realtime update:', payload);
                    renderRooms(); 
                    if(activeRoom) fetchBill();
                }).subscribe();

            const { data: outlets } = await _supabase.from('outlets').select('*').order('name');
            document.getElementById('outlet-list-btns').innerHTML = outlets.map(o => `
                <button onclick="setOutlet('${o.id}', '${o.name}')" class="w-full p-4 bg-slate-800 text-white rounded-xl font-bold hover:bg-blue-600 transition uppercase">${o.name}</button>
            `).join('');
        }

        async function setOutlet(id, name) {
            selectedOutlet = { id, name };
            document.getElementById('outlet-selector').classList.add('hidden');
            const [r, s, p] = await Promise.all([
                _supabase.from('rooms').select('*').eq('outlet_name', name),
                _supabase.from('staff').select('*'),
                _supabase.from('products').select('*').eq('outlet_name', name)
            ]);
            allRooms = r.data || [];
            allProducts = p.data || [];
            document.getElementById('select-staff').innerHTML = (s.data || []).map(st => `<option value="${st.id}">${st.name}</option>`).join('');
            renderRooms();
            renderProducts();
        }

        async function renderRooms() {
            const { data: activeOrders } = await _supabase.from('orders').select('room_id').neq('status', 'paid');
            const busyIds = activeOrders ? [...new Set(activeOrders.map(o => o.room_id))] : [];
            
            document.getElementById('room-grid').innerHTML = allRooms.map(room => {
                const isBusy = busyIds.includes(room.id);
                return `
                <div onclick="openRoom('${room.id}', '${room.name}')" class="p-6 rounded-2xl shadow-lg cursor-pointer transition ${isBusy ? 'bg-yellow-500 text-slate-900' : 'bg-blue-600 text-white'}">
                    <p class="font-bold uppercase text-center text-xs">${room.name}</p>
                    <p class="text-[10px] text-center mt-1 opacity-70">${isBusy ? 'TERISI' : 'KOSONG'}</p>
                </div>`;
            }).join('');
        }

        async function openRoom(id, name) {
            activeRoom = { id, name };
            document.getElementById('current-room-title').innerText = name;
            showPage('order');
            fetchBill();
        }

        async function fetchBill() {
            if(!activeRoom) return;
            const { data } = await _supabase.from('orders').select('*').eq('room_id', activeRoom.id).neq('status', 'paid');
            const listEl = document.getElementById('active-items-list');
            let total = 0;

            if(data && data.length > 0) {
                document.getElementById('btnCheckout').classList.remove('hidden');
                listEl.innerHTML = data.map(i => {
                    total += i.price;
                    return `<div class="flex justify-between p-3 bg-gray-50 rounded-xl text-[11px] font-bold border border-gray-100">
                        <span>${i.product_name}</span><span>Rp ${i.price.toLocaleString()}</span>
                    </div>`;
                }).join('');
            } else {
                document.getElementById('btnCheckout').classList.add('hidden');
                listEl.innerHTML = '<p class="text-center py-10 opacity-30 text-xs">Belum ada pesanan</p>';
            }
            document.getElementById('room-total-bill').innerText = `Rp ${total.toLocaleString()}`;
        }

        function renderProducts() {
            document.getElementById('product-grid').innerHTML = allProducts.map(p => `
                <div onclick="addOrder('${p.name}', ${p.price})" class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 cursor-pointer hover:shadow-md transition">
                    <p class="font-bold text-xs uppercase">${p.name}</p>
                    <p class="text-blue-600 font-bold text-[10px] mt-1">Rp ${p.price.toLocaleString()}</p>
                </div>
            `).join('');
        }

        async function addOrder(name, price) {
            await _supabase.from('orders').insert([{
                product_name: name,
                price: price,
                room_id: activeRoom.id,
                outlet_id: selectedOutlet.id,
                staff_id: document.getElementById('select-staff').value,
                status: 'pending'
            }]);
            // refresh otomatis via realtime
        }

        async function checkout() {
            if(!confirm("Selesaikan pembayaran meja ini?")) return;
            await _supabase.from('orders').update({ status: 'paid' }).eq('room_id', activeRoom.id).neq('status', 'paid');
            showPage('rooms');
        }

        function showPage(p) {
            document.querySelectorAll('.page-content').forEach(el => el.classList.add('hidden'));
            document.getElementById('page-' + p).classList.remove('hidden');
        }

        init();
    </script>
</body>
</html>

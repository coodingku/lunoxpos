<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS SPA ROOM MAP - LUNOX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .room-available { border: 2px solid #e2e8f0; background: white; color: #64748b; }
        .room-occupied { border: 2px solid #ef4444; background: #fef2f2; color: #991b1b; }
        .room-cleaning { border: 2px solid #eab308; background: #fefce8; color: #854d0e; }
        
        .modal-animate { animation: zoomIn 0.2s ease-out; }
        @keyframes zoomIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <header class="bg-white p-4 shadow-sm flex justify-between items-center border-b sticky top-0 z-40">
        <div>
            <h1 class="text-xl font-black text-slate-800 italic uppercase">Spa <span class="text-blue-600">Floor Map</span></h1>
            <p id="outlet-label" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Loading...</p>
        </div>
        <div class="flex gap-4 items-center">
            <select id="active-outlet" onchange="loadRoomMap()" class="bg-slate-100 border-none rounded-lg px-3 py-1 text-xs font-bold outline-none">
                <option value="Delta">DELTA SPA</option>
                <option value="Cabana">CABANA SPA</option>
            </select>
            <div id="clock" class="text-sm font-mono font-bold text-blue-600">00:00:00</div>
        </div>
    </header>

    <main class="p-6">
        <div id="room-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6">
            </div>
    </main>

    <div id="pos-modal" class="fixed inset-0 bg-black/60 hidden z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-2xl rounded-[2.5rem] shadow-2xl overflow-hidden modal-animate">
            <div class="bg-slate-900 p-6 text-white flex justify-between items-center">
                <div>
                    <h2 id="modal-room-name" class="text-2xl font-black italic">ROOM 01</h2>
                    <p class="text-[10px] font-bold text-blue-400 uppercase tracking-widest">Input New Transaction</p>
                </div>
                <button onclick="closeModal()" class="text-2xl hover:text-red-500 transition">&times;</button>
            </div>

            <div class="p-8 grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="space-y-5">
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase mb-2">Pilih Therapist</label>
                        <select id="input-therapist" class="w-full p-4 bg-slate-100 rounded-2xl border-none font-bold text-blue-600 outline-none">
                            <option value="">-- Loading Therapist --</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase mb-2">Service Utama</label>
                        <select id="input-service" class="w-full p-4 bg-slate-100 rounded-2xl border-none font-bold outline-none">
                            <option value="Massage VIP" data-dur="60">Massage VIP (60m)</option>
                            <option value="Luxury Spa" data-dur="90">Luxury Spa (90m)</option>
                            <option value="Royal Treatment" data-dur="120">Royal Treatment (120m)</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase mb-2">Additional Service</label>
                        <div class="space-y-2">
                            <label class="flex items-center gap-2 text-sm font-bold text-slate-600">
                                <input type="checkbox" name="extra" value="Scrub" class="w-4 h-4"> Body Scrub
                            </label>
                            <label class="flex items-center gap-2 text-sm font-bold text-slate-600">
                                <input type="checkbox" name="extra" value="Ear Candle" class="w-4 h-4"> Ear Candle
                            </label>
                        </div>
                    </div>
                </div>

                <div class="space-y-5">
                    <div>
                        <label class="block text-[10px] font-black text-slate-400 uppercase mb-2">F&B Order</label>
                        <textarea id="input-fnb" placeholder="Contoh: Wedang Jahe, Jus Jeruk..." class="w-full p-4 bg-slate-100 rounded-2xl border-none font-bold text-sm h-32 outline-none resize-none"></textarea>
                    </div>

                    <div class="pt-4">
                        <button onclick="submitOrder()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-5 rounded-3xl font-black shadow-lg shadow-blue-200 transition-all flex justify-center items-center gap-3 uppercase italic">
                            <i class="fa fa-play"></i> Start Session
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = "https://mbzoydcehhvjdqfefflo.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1iem95ZGNlaGh2amRxZmVmZmxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NzYzNjcsImV4cCI6MjA4ODQ1MjM2N30.q5Ok1HJEeUIh-93KoXuH0zYqRN4i3LcweRMG9pWJkRg";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let activeRoomId = null;

        // LOAD MAP BERDASARKAN RUANGAN
        async function loadRoomMap() {
            const outlet = document.getElementById('active-outlet').value;
            document.getElementById('outlet-label').innerText = `${outlet} Management`;
            
            const { data: rooms } = await _supabase.from('rooms').select('*').eq('outlet_name', outlet).order('name');
            const grid = document.getElementById('room-grid');
            grid.innerHTML = '';

            rooms.forEach(room => {
                const isOccupied = room.status === 'occupied';
                const card = document.createElement('div');
                card.className = `room-${room.status} p-8 rounded-[2rem] shadow-sm cursor-pointer hover:shadow-xl transition-all flex flex-col items-center justify-center text-center relative overflow-hidden`;
                card.onclick = () => isOccupied ? null : openModal(room);

                card.innerHTML = `
                    <i class="fa ${isOccupied ? 'fa-user-lock' : 'fa-door-open'} text-2xl mb-3 opacity-20"></i>
                    <h3 class="font-black text-lg uppercase italic tracking-tighter">${room.name}</h3>
                    <p class="text-[9px] font-black uppercase mt-1 opacity-60">${room.status}</p>
                    ${isOccupied ? '<div class="absolute inset-0 bg-red-600/10 backdrop-blur-[1px]"></div>' : ''}
                `;
                grid.appendChild(card);
            });
        }

        // AMBIL DATA THERAPIST STANDBY
        async function loadTherapistDropdown() {
            const outlet = document.getElementById('active-outlet').value;
            const { data } = await _supabase.from('therapists').select('t_id, name').eq('outlet_name', outlet).eq('status', 'standby');
            
            const select = document.getElementById('input-therapist');
            select.innerHTML = '<option value="">-- Pilih Therapist --</option>';
            data.forEach(t => {
                select.innerHTML += `<option value="${t.t_id}">${t.t_id} - ${t.name}</option>`;
            });
        }

        // MODAL CONTROL
        function openModal(room) {
            activeRoomId = room.id;
            document.getElementById('modal-room-name').innerText = room.name;
            document.getElementById('pos-modal').classList.remove('hidden');
            loadTherapistDropdown();
        }

        function closeModal() {
            document.getElementById('pos-modal').classList.add('hidden');
            document.getElementById('input-fnb').value = '';
        }

        // SUBMIT TRANSAKSI
        async function submitOrder() {
            const tid = document.getElementById('input-therapist').value;
            const serviceSelect = document.getElementById('input-service');
            const duration = parseInt(serviceSelect.options[serviceSelect.selectedIndex].dataset.dur);
            const outlet = document.getElementById('active-outlet').value;
            
            if (!tid) return alert("Pilih Therapist!");

            const finishTime = new Date(new Date().getTime() + duration * 60000).toISOString();

            // 1. Update Ruangan jadi Occupied
            await _supabase.from('rooms').update({ 
                status: 'occupied', 
                therapist_id: tid,
                end_time: finishTime 
            }).eq('id', activeRoomId);

            // 2. Update Therapist jadi Progress
            await _supabase.from('therapists').update({ 
                status: 'progress', 
                end_time: finishTime 
            }).eq('t_id', tid);

            // 3. Simpan Pesanan (Log Reports)
            await _supabase.from('orders').insert([{
                product_name: `SPA: ${serviceSelect.value} (Room: ${document.getElementById('modal-room-name').innerText})`,
                qty: 1,
                status: 'completed',
                outlet_name: outlet,
                staff_id: tid
            }]);

            alert("Transaksi Berhasil! Room & Therapist Terkunci.");
            closeModal();
            loadRoomMap();
        }

        // REALTIME & CLOCK
        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID');
        }, 1000);

        _supabase.channel('room_sync').on('postgres_changes', { event: '*', schema: 'public', table: 'rooms' }, () => {
            loadRoomMap();
        }).subscribe();

        loadRoomMap();
    </script>
</body>
</html>

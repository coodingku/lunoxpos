<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUNOX POS - FULL SYSTEM V6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .room-available { background: white; border: 2px solid #e2e8f0; color: #64748b; }
        .room-pending { background: #fffbeb; border: 2px solid #fbbf24; color: #92400e; animation: pulse-y 2s infinite; }
        .room-occupied { background: #fef2f2; border: 2px solid #ef4444; color: #991b1b; }
        @keyframes pulse-y { 0% { box-shadow: 0 0 0 0px rgba(251, 191, 36, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(251, 191, 36, 0); } 100% { box-shadow: 0 0 0 0px rgba(251, 191, 36, 0); } }
    </style>
</head>
<body class="min-h-screen">

    <header class="bg-white p-5 shadow-sm flex justify-between items-center border-b sticky top-0 z-40">
        <div>
            <h1 class="text-2xl font-black italic tracking-tighter text-slate-800">LUNOX <span class="text-blue-600">POS</span></h1>
            <p id="outlet-display" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Loading Floor Map...</p>
        </div>
        <div class="flex gap-4 items-center">
            <button onclick="openAttendanceModal()" class="bg-slate-800 text-white px-4 py-2 rounded-xl text-xs font-black hover:bg-black transition flex items-center gap-2">
                <i class="fa fa-fingerprint"></i> ABSENSI STAFF
            </button>
            <select id="active-outlet" onchange="init()" class="bg-slate-100 rounded-xl px-4 py-2 text-xs font-black text-blue-600 outline-none">
                <option value="Delta">DELTA SPA</option>
                <option value="Cabana">CABANA SPA</option>
            </select>
            <div id="clock" class="text-sm font-mono font-black bg-blue-600 text-white px-3 py-1 rounded-lg">00:00:00</div>
        </div>
    </header>

    <main class="p-6 max-w-[1600px] mx-auto">
        <div id="room-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6"></div>
    </main>

    <div id="pos-modal" class="fixed inset-0 bg-slate-900/60 hidden z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-6xl rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col md:flex-row h-[90vh]">
            
            <div class="flex-1 p-8 overflow-y-auto border-r">
                <div class="flex justify-between items-start mb-8">
                    <div>
                        <h2 id="modal-room-name" class="text-4xl font-black italic uppercase tracking-tighter text-slate-800">ROOM --</h2>
                        <div id="room-status-tag" class="mt-2 text-[10px] font-black uppercase px-3 py-1 rounded-full inline-block">STATUS</div>
                    </div>
                    <button onclick="closeModal()" class="text-slate-300 hover:text-red-500 text-4xl">&times;</button>
                </div>

                <div id="form-massage" class="bg-blue-50/50 p-6 rounded-[2rem] border border-blue-100 mb-8 space-y-4">
                    <h3 class="text-xs font-black text-blue-600 uppercase tracking-widest ml-1">Treatment Sesi</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <select id="input-therapist" class="p-4 rounded-2xl border font-bold text-blue-600 outline-none"></select>
                        <select id="input-service" class="p-4 rounded-2xl border font-bold outline-none">
                            <option value="Trad. Massage" data-price="250000" data-dur="60">Trad. Massage (60m)</option>
                            <option value="Shiatsu" data-price="350000" data-dur="90">Shiatsu (90m)</option>
                        </select>
                    </div>
                    <button onclick="startSession()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black uppercase italic shadow-lg">Mulai Massage</button>
                </div>

                <div class="space-y-4">
                    <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest ml-1">F&B / Tambahan</h3>
                    <div class="flex gap-3">
                        <select id="input-product" class="flex-1 p-4 bg-slate-50 rounded-2xl border font-bold outline-none"></select>
                        <input type="number" id="input-qty" value="1" min="1" class="w-24 p-4 bg-slate-50 rounded-2xl border font-bold text-center">
                        <button onclick="addToBill()" class="bg-emerald-500 text-white px-8 rounded-2xl font-black"><i class="fa fa-plus"></i></button>
                    </div>
                </div>
            </div>

            <div class="w-full md:w-[400px] bg-slate-50 p-8 flex flex-col">
                <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4">Ringkasan Bill</h3>
                <div id="bill-items" class="flex-1 overflow-y-auto space-y-3 pr-2"></div>
                
                <div class="border-t border-slate-200 pt-4 mt-4 space-y-3">
                    <div class="flex justify-between text-sm font-bold text-slate-500"><span>Subtotal</span><span id="txt-subtotal">Rp 0</span></div>
                    
                    <div class="space-y-1">
                        <label class="text-[10px] font-black text-slate-400 uppercase">Diskon Promo</label>
                        <select id="db-discount" onchange="calculateTotal()" class="w-full p-3 bg-white border rounded-xl font-bold text-red-500 outline-none"></select>
                    </div>

                    <div class="flex justify-between text-sm font-bold text-slate-500">
                        <span>PPN (<span id="txt-ppn-rate">0</span>%)</span>
                        <span id="txt-tax">Rp 0</span>
                    </div>

                    <div class="flex justify-between text-xl font-black text-slate-800 pt-2 border-t">
                        <span>GRAND TOTAL</span>
                        <span id="txt-grand-total" class="text-blue-600">Rp 0</span>
                    </div>

                    <div class="space-y-1 pt-2">
                        <label class="text-[10px] font-black text-slate-400 uppercase">Metode Pembayaran</label>
                        <select id="db-payment-method" class="w-full p-4 bg-slate-900 text-white rounded-2xl font-bold outline-none"></select>
                    </div>

                    <button onclick="checkout()" class="w-full bg-blue-600 text-white py-5 rounded-3xl font-black uppercase tracking-widest shadow-xl hover:bg-blue-700">Checkout</button>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-auth" class="fixed inset-0 bg-black/90 hidden z-[100] flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 text-center">
            <div class="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl"><i class="fa fa-lock"></i></div>
            <h2 class="text-xl font-black uppercase mb-1">Otorisasi Manager</h2>
            <p class="text-xs text-slate-400 mb-6 font-bold">PENGHAPUSAN ITEM MEMERLUKAN IZIN</p>
            <input type="password" id="manager-id-input" placeholder="INPUT PIN MANAGER" class="w-full p-5 bg-slate-100 rounded-2xl text-center font-black text-2xl mb-4 border-2 border-transparent focus:border-red-500 outline-none">
            <div class="flex gap-2">
                <button onclick="closeAuthModal()" class="flex-1 py-4 font-bold text-slate-400">Batal</button>
                <button onclick="verifyManagerAuth()" class="flex-1 bg-red-600 text-white py-4 rounded-2xl font-black uppercase shadow-lg">Hapus</button>
            </div>
        </div>
    </div>

    <div id="modal-attendance" class="fixed inset-0 bg-black/80 hidden z-[60] flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-black uppercase">Staff Attendance</h2>
                <button onclick="closeAttendanceModal()" class="text-slate-300 hover:text-red-500 text-3xl">&times;</button>
            </div>
            <div id="id-input-section" class="space-y-4">
                <input type="text" id="manual-tid" placeholder="INPUT ID THERAPIST" class="w-full p-5 bg-slate-100 rounded-2xl border-none font-black text-2xl uppercase outline-none">
                <button onclick="searchTherapist()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black uppercase shadow-lg">Verifikasi ID</button>
            </div>
            <div id="staff-info-section" class="hidden space-y-6 mt-4 pt-6 border-t border-dashed">
                <div class="bg-blue-50 p-6 rounded-3xl text-center">
                    <h3 id="found-name" class="text-2xl font-black text-slate-800 uppercase">---</h3>
                    <p id="found-id" class="text-sm font-bold text-blue-600">---</p>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="updateAbsensi('standby')" class="bg-emerald-500 text-white py-5 rounded-3xl font-black uppercase text-xs">Absen Masuk</button>
                    <button onclick="updateAbsensi('offline')" class="bg-slate-200 text-slate-600 py-5 rounded-3xl font-black uppercase text-xs">Absen Pulang</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = "https://mbzoydcehhvjdqfefflo.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1iem95ZGNlaGh2amRxZmVmZmxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NzYzNjcsImV4cCI6MjA4ODQ1MjM2N30.q5Ok1HJEeUIh-93KoXuH0zYqRN4i3LcweRMG9pWJkRg";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let currentRoom = null, activeOrders = [], ppnRate = 0, pendingDeleteId = null, selectedStaffId = null;

        // --- CORE DATABASE FETCH ---
        async function fetchSettings() {
            const { data: st } = await _supabase.from('settings').select('*');
            ppnRate = parseFloat(st?.find(s => s.key === 'ppn_rate')?.value || 0);
            document.getElementById('txt-ppn-rate').innerText = ppnRate;

            const { data: ds } = await _supabase.from('discounts').select('*').eq('active', true);
            document.getElementById('db-discount').innerHTML = '<option value="0">No Discount (0%)</option>' + ds.map(d => `<option value="${d.value}">${d.name} (${d.value}%)</option>`).join('');

            const { data: bk } = await _supabase.from('banks').select('*').eq('is_active', true);
            document.getElementById('db-payment-method').innerHTML = '<option value="CASH">CASH</option>' + bk.map(b => `<option value="${b.name}">${b.name}</option>`).join('');
        }

        async function loadRoomMap() {
            const outlet = document.getElementById('active-outlet').value;
            const { data: rooms } = await _supabase.from('rooms').select('*').eq('outlet_name', outlet).order('name');
            const { data: trans } = await _supabase.from('transaksi_spa').select('room_id').eq('status_bayar', 'pending').eq('outlet_name', outlet);
            
            const grid = document.getElementById('room-grid');
            grid.innerHTML = '';
            rooms.forEach(r => {
                const hasTrans = trans.some(t => t.room_id === r.id);
                const isOcc = r.status === 'occupied';
                const card = document.createElement('div');
                card.className = `${isOcc ? 'room-occupied' : (hasTrans ? 'room-pending' : 'room-available')} p-6 rounded-[2rem] text-center cursor-pointer hover:scale-105 transition-all`;
                card.onclick = () => openModal(r);
                card.innerHTML = `<div class="text-[9px] font-black uppercase opacity-40">${isOcc ? 'Massage' : (hasTrans ? 'Pending' : 'Standby')}</div><h3 class="font-black text-xl italic">${r.name}</h3>`;
                grid.appendChild(card);
            });
            loadMasterData();
        }

        async function loadMasterData() {
            const out = document.getElementById('active-outlet').value;
            const { data: tps } = await _supabase.from('therapists').select('*').eq('outlet_name', out).eq('status', 'standby');
            document.getElementById('input-therapist').innerHTML = tps.map(t => `<option value="${t.t_id}">${t.t_id} - ${t.name}</option>`).join('');
            const { data: pd } = await _supabase.from('produk').select('*').eq('outlet_name', out);
            document.getElementById('input-product').innerHTML = pd.map(i => `<option value="${i.id}" data-nama="${i.nama_produk}" data-harga="${i.harga}">${i.nama_produk}</option>`).join('');
        }

        // --- TRANSACTION LOGIC ---
        function calculateTotal() {
            const sub = activeOrders.reduce((a, b) => a + (b.harga_satuan * b.qty), 0);
            const disc = parseFloat(document.getElementById('db-discount').value) || 0;
            const afterDisc = sub - (sub * disc / 100);
            const tax = afterDisc * (ppnRate / 100);
            const grand = afterDisc + tax;
            document.getElementById('txt-subtotal').innerText = `Rp ${sub.toLocaleString()}`;
            document.getElementById('txt-tax').innerText = `Rp ${tax.toLocaleString()}`;
            document.getElementById('txt-grand-total').innerText = `Rp ${grand.toLocaleString()}`;
            return { sub, disc, tax, grand };
        }

        async function checkout() {
            if(!activeOrders.length) return;
            const calc = calculateTotal();
            const { data: rData } = await _supabase.from('rooms').select('therapist_id').eq('id', currentRoom.id).single();
            
            await _supabase.from('transaksi_spa').update({ 
                status_bayar: 'completed', discount_pct: calc.disc, tax_amount: calc.tax, total_bayar: calc.grand,
                payment_method: document.getElementById('db-payment-method').value, ppn_rate: ppnRate, checkout_at: new Date()
            }).eq('room_id', currentRoom.id).eq('status_bayar', 'pending');

            if(rData.therapist_id) await _supabase.from('therapists').update({ status: 'standby', end_time: null }).eq('t_id', rData.therapist_id);
            await _supabase.from('rooms').update({ status: 'available', therapist_id: null, end_time: null }).eq('id', currentRoom.id);
            
            closeModal(); loadRoomMap(); alert("Checkout Berhasil!");
        }

        // --- AUTH & VOID LOGIC ---
        function confirmDelete(id) { pendingDeleteId = id; document.getElementById('modal-auth').classList.remove('hidden'); }
        async function verifyManagerAuth() {
            const pin = document.getElementById('manager-id-input').value;
            const { data: mgr } = await _supabase.from('user').select('name').eq('password_id', pin).eq('role', 'manager').eq('is_active', true).single();
            if(mgr) {
                await _supabase.from('transaksi_spa').delete().eq('id', pendingDeleteId);
                alert("Dihapus oleh: " + mgr.name); closeAuthModal(); fetchActiveBill(currentRoom.id); loadRoomMap();
            } else { alert("PIN MANAGER SALAH!"); }
        }

        // --- ATTENDANCE ---
        async function searchTherapist() {
            const id = document.getElementById('manual-tid').value.toUpperCase();
            const { data } = await _supabase.from('therapists').select('*').eq('t_id', id).single();
            if(data) { selectedStaffId = id; document.getElementById('found-name').innerText = data.name; document.getElementById('found-id').innerText = `ID: ${data.t_id} (${data.status})`; document.getElementById('staff-info-section').classList.remove('hidden'); }
            else alert("ID Tidak Ditemukan!");
        }
        async function updateAbsensi(s) {
            await _supabase.from('therapists').update({ status: s }).eq('t_id', selectedStaffId);
            closeAttendanceModal(); loadRoomMap();
        }

        // --- UI HELPERS ---
        async function startSession() {
            const tid = document.getElementById('input-therapist').value;
            const s = document.getElementById('input-service');
            const opt = s.options[s.selectedIndex];
            const end = new Date(Date.now() + parseInt(opt.dataset.dur || 60) * 60000).toISOString();
            await _supabase.from('rooms').update({ status: 'occupied', therapist_id: tid, end_time: end }).eq('id', currentRoom.id);
            await _supabase.from('therapists').update({ status: 'progress', end_time: end }).eq('t_id', tid);
            await _supabase.from('transaksi_spa').insert([{ room_id: currentRoom.id, nama_item: opt.value, harga_satuan: parseInt(opt.dataset.price), qty: 1, status_bayar: 'pending', outlet_name: document.getElementById('active-outlet').value, therapist_id: tid }]);
            closeModal(); loadRoomMap();
        }

        async function addToBill() {
            const p = document.getElementById('input-product'); const opt = p.options[p.selectedIndex];
            await _supabase.from('transaksi_spa').insert([{ room_id: currentRoom.id, nama_item: opt.dataset.nama, harga_satuan: parseInt(opt.dataset.harga), qty: parseInt(document.getElementById('input-qty').value), status_bayar: 'pending', outlet_name: document.getElementById('active-outlet').value }]);
            fetchActiveBill(currentRoom.id); loadRoomMap();
        }

        function openModal(r) { currentRoom = r; document.getElementById('modal-room-name').innerText = r.name; document.getElementById('pos-modal').classList.remove('hidden'); fetchActiveBill(r.id); document.getElementById('form-massage').classList.toggle('hidden', r.status === 'occupied'); }
        async function fetchActiveBill(id) {
            const { data } = await _supabase.from('transaksi_spa').select('*').eq('room_id', id).eq('status_bayar', 'pending');
            activeOrders = data || [];
            document.getElementById('bill-items').innerHTML = activeOrders.map(i => `
                <div class="bg-white p-4 rounded-2xl border flex justify-between items-center group">
                    <div class="text-xs font-bold uppercase">${i.nama_item}<br><span class="text-slate-400">${i.qty}x</span></div>
                    <div class="flex items-center gap-3"><b>Rp ${(i.harga_satuan*i.qty).toLocaleString()}</b>
                    <button onclick="confirmDelete('${i.id}')" class="text-red-300 hover:text-red-600 opacity-0 group-hover:opacity-100 transition"><i class="fa fa-trash"></i></button></div>
                </div>`).join('');
            calculateTotal();
        }

        function closeModal() { document.getElementById('pos-modal').classList.add('hidden'); }
        function closeAuthModal() { document.getElementById('modal-auth').classList.add('hidden'); document.getElementById('manager-id-input').value = ""; }
        function openAttendanceModal() { document.getElementById('modal-attendance').classList.remove('hidden'); document.getElementById('staff-info-section').classList.add('hidden'); document.getElementById('manual-tid').value = ""; }
        function closeAttendanceModal() { document.getElementById('modal-attendance').classList.add('hidden'); }

        async function init() { await fetchSettings(); loadRoomMap(); }
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID'); }, 1000);
        init();
        _supabase.channel('pos_db').on('postgres_changes', { event: '*', schema: 'public' }, loadRoomMap).subscribe();
    </script>
</body>
</html>

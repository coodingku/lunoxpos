<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUNOX POS - PREMIUM SPA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #cbd5e1; }
        .room-standby { background: #2563eb; color: white; }
        .room-progress { background: #dc2626; color: white; animation: pulse-red 2s infinite; }
        .room-pending { background: #eab308; color: white; }
        @keyframes pulse-red { 0% { box-shadow: 0 0 0 0px rgba(220, 38, 38, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(220, 38, 38, 0); } 100% { box-shadow: 0 0 0 0px rgba(220, 38, 38, 0); } }
        @media print { body * { visibility: hidden; } #thermal-receipt, #thermal-receipt * { visibility: visible; } #thermal-receipt { position: absolute; left: 0; top: 0; width: 100%; display: block !important; } }
    </style>
</head>
<body class="min-h-screen">

    <header class="bg-white/90 backdrop-blur-md p-5 shadow-sm flex justify-between items-center sticky top-0 z-40 border-b">
        <div>
            <h1 class="text-2xl font-black italic tracking-tighter text-slate-800">LUNOX <span class="text-blue-600">POS</span></h1>
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">ADVANCED SPA SYSTEM</p>
        </div>
        <div class="flex gap-4 items-center">
            <button onclick="openAttendanceModal()" class="bg-slate-800 text-white px-5 py-2.5 rounded-2xl text-xs font-black hover:bg-black transition">ABSENSI</button>
            <select id="active-outlet" onchange="init()" class="bg-white border-2 border-slate-200 rounded-2xl px-4 py-2 text-xs font-black text-blue-600 outline-none">
                <option value="Delta">DELTA SPA</option>
                <option value="Cabana">CABANA SPA</option>
            </select>
            <div id="clock" class="text-sm font-mono font-black bg-slate-800 text-white px-4 py-1.5 rounded-xl shadow-lg">00:00:00</div>
        </div>
    </header>

    <main class="p-8 max-w-[1600px] mx-auto">
        <div id="room-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6"></div>
    </main>

    <div id="pos-modal" class="fixed inset-0 bg-slate-900/80 hidden z-50 flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white w-full max-w-5xl rounded-[3rem] shadow-2xl overflow-hidden flex flex-col md:flex-row h-[85vh]">
            <div class="flex-1 p-10 overflow-y-auto border-r border-slate-100">
                <div class="flex justify-between items-start mb-8 text-slate-800">
                    <h2 id="modal-room-name" class="text-5xl font-black italic uppercase tracking-tighter">ROOM --</h2>
                    <button onclick="closeModal()" class="text-slate-300 hover:text-red-500 text-5xl">&times;</button>
                </div>

                <div class="space-y-6">
                    <div id="form-massage" class="bg-slate-50 p-6 rounded-[2rem] border-2 border-dashed border-slate-200">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Therapist & Service</label>
                        <div class="grid grid-cols-2 gap-4 mt-2">
                            <button onclick="openPicker('therapist')" class="w-full p-4 bg-white border-2 rounded-2xl font-bold text-blue-600 text-left flex justify-between items-center">
                                <span id="label-therapist">Pilih Therapist...</span>
                                <i class="fa fa-user-plus text-xs"></i>
                            </button>
                            <button onclick="openPicker('service')" class="w-full p-4 bg-white border-2 rounded-2xl font-bold text-slate-700 text-left flex justify-between items-center">
                                <span id="label-service">Pilih Layanan...</span>
                                <i class="fa fa-spa text-xs"></i>
                            </button>
                        </div>
                        <button onclick="startSession()" class="w-full bg-blue-600 text-white py-4 mt-4 rounded-2xl font-black uppercase italic shadow-lg hover:bg-blue-700 transition">Mulai Massage</button>
                    </div>

                    <div class="bg-slate-50 p-6 rounded-[2rem] border-2 border-dashed border-slate-200">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Tambahan F&B / Produk</label>
                        <div class="flex gap-3 mt-2">
                            <button onclick="openPicker('product')" class="flex-1 p-4 bg-white border-2 rounded-2xl font-bold text-left flex justify-between items-center">
                                <span id="label-product">Cari Produk...</span>
                                <i class="fa fa-search text-xs text-slate-300"></i>
                            </button>
                            <input type="number" id="input-qty" value="1" min="1" class="w-20 p-4 bg-white border-2 rounded-2xl font-black text-center outline-none">
                            <button onclick="addToBill()" class="bg-emerald-500 text-white px-8 rounded-2xl font-black hover:bg-emerald-600 transition shadow-lg"><i class="fa fa-plus"></i></button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="w-full md:w-[400px] bg-slate-50 p-10 flex flex-col">
                <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-6">Current Bill</h3>
                <div id="bill-items" class="flex-1 overflow-y-auto space-y-4 pr-2"></div>
                <div class="border-t pt-6 mt-6">
                    <button onclick="openPaymentModal()" class="w-full bg-slate-900 text-white py-6 rounded-[2rem] font-black uppercase tracking-widest shadow-2xl">BAYAR SEKARANG</button>
                </div>
            </div>
        </div>
    </div>

    <div id="picker-modal" class="fixed inset-0 bg-black/60 hidden z-[70] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-2xl rounded-[2.5rem] shadow-2xl flex flex-col h-[75vh]">
            <div class="p-6 border-b flex justify-between items-center">
                <h3 id="picker-title" class="text-xl font-black uppercase">Pilih Data</h3>
                <button onclick="closePicker()" class="text-slate-300 hover:text-red-500 text-3xl">&times;</button>
            </div>
            <div class="p-4 bg-slate-50 flex flex-col gap-3">
                <input type="text" id="picker-search" onkeyup="filterPicker()" placeholder="Cari..." class="w-full p-4 rounded-2xl border-none ring-2 ring-slate-100 outline-none font-bold">
                <div id="picker-categories" class="flex gap-2 overflow-x-auto pb-2 hidden">
                    <button onclick="filterCategory('')" class="bg-slate-800 text-white px-4 py-1.5 rounded-full text-[10px] font-black uppercase">Semua</button>
                    <button onclick="filterCategory('Makanan')" class="bg-white border px-4 py-1.5 rounded-full text-[10px] font-black uppercase">Makanan</button>
                    <button onclick="filterCategory('Minuman')" class="bg-white border px-4 py-1.5 rounded-full text-[10px] font-black uppercase">Minuman</button>
                </div>
            </div>
            <div class="flex-1 overflow-y-auto p-4">
                <table class="w-full text-left"><tbody id="picker-table-body" class="font-bold text-slate-700"></tbody></table>
            </div>
        </div>
    </div>

    <div id="payment-modal" class="fixed inset-0 bg-blue-900/90 hidden z-[60] flex items-center justify-center p-4 backdrop-blur-xl">
        <div class="bg-white w-full max-w-md rounded-[3rem] p-10 shadow-2xl">
            <h2 class="text-2xl font-black text-center uppercase text-slate-800 mb-6 italic">Checkout</h2>
            <div id="pay-summary" class="space-y-3 mb-8">
                <div class="flex justify-between text-slate-500 font-bold text-xs"><span>SUBTOTAL</span><span id="p-subtotal">0</span></div>
                <div class="flex justify-between items-center text-red-500 font-bold text-xs">
                    <span>DISKON</span>
                    <select id="db-discount" onchange="calculateTotal()" class="bg-red-50 rounded-lg px-2 py-1 font-black"></select>
                </div>
                <div class="pt-4 border-t-2 border-dashed flex justify-between items-center">
                    <span class="font-black text-slate-800 text-lg">TOTAL</span>
                    <span id="p-grand-total" class="text-3xl font-black text-blue-600">0</span>
                </div>
            </div>
            <div class="space-y-4">
                <select id="db-payment-method" class="w-full p-5 bg-slate-100 rounded-2xl font-black outline-none"></select>
                <div class="grid grid-cols-2 gap-3 pt-4">
                    <button onclick="closePaymentModal()" class="py-5 font-black text-slate-400 uppercase text-xs">Batal</button>
                    <button onclick="processCheckout()" class="bg-blue-600 text-white py-5 rounded-2xl font-black uppercase text-xs">Print & Bayar</button>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-attendance" class="fixed inset-0 bg-black/80 hidden z-[60] flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-black uppercase">Staff Attendance</h2>
                <button onclick="closeAttendanceModal()" class="text-slate-300 text-3xl">&times;</button>
            </div>
            <input type="text" id="att-id" placeholder="INPUT ID STAFF" class="w-full p-5 bg-slate-100 rounded-2xl text-center font-black text-2xl uppercase mb-4 outline-none">
            <button onclick="processAbsensi()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black uppercase">Clock In / Out</button>
        </div>
    </div>

    <div id="thermal-receipt" class="hidden font-mono text-[10px] w-[58mm] bg-white text-black p-2">
        <div class="text-center font-bold text-xs">LUNOX SPA</div>
        <div id="r-outlet" class="text-center mb-2 uppercase text-[8px]">---</div>
        <div class="border-b border-dashed mb-2"></div>
        <div id="r-items-list" class="space-y-1 mb-2"></div>
        <div class="border-t border-dashed pt-2 flex justify-between font-bold"><span>TOTAL</span><span id="r-total"></span></div>
    </div>

    <script>
        const SB_URL = "https://mbzoydcehhvjdqfefflo.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1iem95ZGNlaGh2amRxZmVmZmxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NzYzNjcsImV4cCI6MjA4ODQ1MjM2N30.q5Ok1HJEeUIh-93KoXuH0zYqRN4i3LcweRMG9pWJkRg";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let currentRoom = null, activeOrders = [], ppnRate = 0;
        let masterTherapists = [], masterServices = [], masterProducts = [];
        let selectedPicker = {};

        async function init() {
            await fetchSettings();
            await loadMasterData();
            loadRoomMap();
        }

        async function fetchSettings() {
            const { data: st } = await _supabase.from('settings').select('*');
            ppnRate = parseFloat(st?.find(s => s.key === 'ppn_rate')?.value || 0);
            const { data: ds } = await _supabase.from('discounts').select('*').eq('active', true);
            document.getElementById('db-discount').innerHTML = '<option value="0">0%</option>' + (ds || []).map(d => `<option value="${d.value}">${d.name} (${d.value}%)</option>`).join('');
            const { data: bk } = await _supabase.from('banks').select('*').eq('is_active', true);
            document.getElementById('db-payment-method').innerHTML = '<option value="CASH">CASH</option>' + (bk || []).map(b => `<option value="${b.name}">${b.name}</option>`).join('');
        }

        async function loadMasterData() {
            const out = document.getElementById('active-outlet').value;
            const { data: tps } = await _supabase.from('therapists').select('*').eq('outlet_name', out).eq('status', 'standby');
            masterTherapists = tps || [];
            masterServices = [
                { id: 'S1', name: 'Traditional Massage', price: 250000, cat: 'Treatment' },
                { id: 'S2', name: 'Shiatsu Massage', price: 350000, cat: 'Treatment' }
            ];
            const { data: pd } = await _supabase.from('produk').select('*').eq('outlet_name', out);
            masterProducts = pd || [];
        }

        // --- CALCULATION (GLOBAL FIX) ---
        function calculateTotal() {
            const sub = activeOrders.reduce((a, b) => a + (b.harga_satuan * b.qty), 0);
            const disc = parseFloat(document.getElementById('db-discount').value) || 0;
            const afterDisc = sub - (sub * disc / 100);
            const tax = afterDisc * (ppnRate / 100);
            const grand = afterDisc + tax;

            document.getElementById('p-subtotal').innerText = `Rp ${sub.toLocaleString()}`;
            document.getElementById('p-grand-total').innerText = `Rp ${grand.toLocaleString()}`;
            return { sub, disc, tax, grand };
        }

        // --- PICKER SYSTEM ---
        function openPicker(type) {
            selectedPicker.type = type;
            const body = document.getElementById('picker-table-body');
            body.innerHTML = '';
            document.getElementById('picker-categories').classList.toggle('hidden', type !== 'product');
            
            let data = [];
            if(type === 'therapist') data = masterTherapists.map(t => ({ id: t.t_id, name: t.name, detail: 'READY', price: 0 }));
            if(type === 'service') data = masterServices.map(s => ({ id: s.id, name: s.name, detail: s.price, price: s.price }));
            if(type === 'product') data = masterProducts.map(p => ({ id: p.id, name: p.nama_produk, detail: p.harga, price: p.harga, cat: p.kategori || 'Lain-lain' }));

            data.forEach(item => {
                const row = document.createElement('tr');
                row.className = "border-b hover:bg-blue-50 cursor-pointer";
                row.dataset.cat = item.cat || '';
                row.onclick = () => {
                    if(type==='therapist') { selectedPicker.tId = item.id; document.getElementById('label-therapist').innerText = item.name; }
                    if(type==='service') { selectedPicker.sName = item.name; selectedPicker.sPrice = item.price; document.getElementById('label-service').innerText = item.name; }
                    if(type==='product') { selectedPicker.pName = item.name; selectedPicker.pPrice = item.price; document.getElementById('label-product').innerText = item.name; }
                    closePicker();
                };
                row.innerHTML = `<td class="p-4 uppercase">${item.name}</td><td class="p-4 text-right text-blue-600">${item.detail.toLocaleString()}</td>`;
                body.appendChild(row);
            });
            document.getElementById('picker-modal').classList.remove('hidden');
        }

        function filterPicker() {
            const val = document.getElementById('picker-search').value.toLowerCase();
            const rows = document.querySelectorAll('#picker-table-body tr');
            rows.forEach(r => r.style.display = r.innerText.toLowerCase().includes(val) ? '' : 'none');
        }

        function filterCategory(cat) {
            const rows = document.querySelectorAll('#picker-table-body tr');
            rows.forEach(r => r.style.display = (cat === '' || r.dataset.cat === cat) ? '' : 'none');
        }

        // --- ROOMS & ACTIONS ---
        async function loadRoomMap() {
            const out = document.getElementById('active-outlet').value;
            const { data: rooms } = await _supabase.from('rooms').select('*').eq('outlet_name', out).order('name');
            const { data: trans } = await _supabase.from('transaksi_spa').select('room_id').eq('status_bayar', 'pending').eq('outlet_name', out);
            const grid = document.getElementById('room-grid'); grid.innerHTML = '';
            (rooms || []).forEach(r => {
                const hasTrans = (trans || []).some(t => t.room_id === r.id);
                const isOcc = r.status === 'occupied';
                let style = isOcc ? 'room-progress' : (hasTrans ? 'room-pending' : 'room-standby');
                const card = document.createElement('div');
                card.className = `${style} p-10 rounded-[2.5rem] text-center shadow-lg transition-all cursor-pointer`;
                card.onclick = () => openModal(r);
                card.innerHTML = `<div class="text-[8px] font-black uppercase opacity-60 mb-1">${isOcc ? 'Massage' : (hasTrans ? 'Bill' : 'Ready')}</div><h3 class="font-black text-2xl italic">${r.name}</h3>`;
                grid.appendChild(card);
            });
        }

        async function openModal(r) {
            currentRoom = r;
            document.getElementById('modal-room-name').innerText = r.name;
            document.getElementById('pos-modal').classList.remove('hidden');
            fetchActiveBill(r.id);
            document.getElementById('label-therapist').innerText = "Pilih Therapist...";
            document.getElementById('label-service').innerText = "Pilih Layanan...";
            selectedPicker = {};
        }

        async function fetchActiveBill(id) {
            const { data } = await _supabase.from('transaksi_spa').select('*').eq('room_id', id).eq('status_bayar', 'pending');
            activeOrders = data || [];
            document.getElementById('bill-items').innerHTML = activeOrders.map(i => `
                <div class="bg-white p-4 rounded-2xl border flex justify-between items-center group">
                    <div class="text-xs font-bold uppercase">${i.nama_item} x${i.qty}</div>
                    <b>Rp ${(i.harga_satuan*i.qty).toLocaleString()}</b>
                </div>`).join('');
        }

        async function startSession() {
            if(!selectedPicker.tId || !selectedPicker.sName) return alert("Lengkapi data!");
            const end = new Date(Date.now() + 60*60000).toISOString();
            await _supabase.from('rooms').update({ status: 'occupied', therapist_id: selectedPicker.tId, end_time: end }).eq('id', currentRoom.id);
            await _supabase.from('therapists').update({ status: 'progress', end_time: end }).eq('t_id', selectedPicker.tId);
            await _supabase.from('transaksi_spa').insert([{ room_id: currentRoom.id, nama_item: selectedPicker.sName, harga_satuan: selectedPicker.sPrice, qty: 1, status_bayar: 'pending', outlet_name: document.getElementById('active-outlet').value, therapist_id: selectedPicker.tId }]);
            closeModal(); init();
        }

        async function addToBill() {
            if(!selectedPicker.pName) return alert("Pilih Produk!");
            await _supabase.from('transaksi_spa').insert([{ room_id: currentRoom.id, nama_item: selectedPicker.pName, harga_satuan: selectedPicker.pPrice, qty: parseInt(document.getElementById('input-qty').value), status_bayar: 'pending', outlet_name: document.getElementById('active-outlet').value }]);
            fetchActiveBill(currentRoom.id);
        }

        // --- CHECKOUT & ABSENSI ---
        async function processCheckout() {
            const calc = calculateTotal();
            const pay = document.getElementById('db-payment-method').value;
            await _supabase.from('transaksi_spa').update({ status_bayar: 'completed', total_bayar: calc.grand, payment_method: pay, checkout_at: new Date() }).eq('room_id', currentRoom.id).eq('status_bayar', 'pending');
            await _supabase.from('rooms').update({ status: 'available', therapist_id: null }).eq('id', currentRoom.id);
            
            document.getElementById('r-outlet').innerText = document.getElementById('active-outlet').value;
            document.getElementById('r-items-list').innerHTML = activeOrders.map(i => `<div>${i.nama_item} x${i.qty} - ${(i.harga_satuan*i.qty).toLocaleString()}</div>`).join('');
            document.getElementById('r-total').innerText = calc.grand.toLocaleString();
            
            window.print();
            closePaymentModal(); closeModal(); init();
        }

        function openAttendanceModal() { document.getElementById('modal-attendance').classList.remove('hidden'); }
        function closeAttendanceModal() { document.getElementById('modal-attendance').classList.add('hidden'); }
        function closeModal() { document.getElementById('pos-modal').classList.add('hidden'); }
        function openPaymentModal() { document.getElementById('payment-modal').classList.remove('hidden'); calculateTotal(); }
        function closePaymentModal() { document.getElementById('payment-modal').classList.add('hidden'); }
        function closePicker() { document.getElementById('picker-modal').classList.add('hidden'); }

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID'); }, 1000);
        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUNOX POS - PREMIUM SPA SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #cbd5e1; overflow-x: hidden; }
        .room-standby { background: #2563eb; color: white; }
        .room-progress { background: #dc2626; color: white; animation: pulse-red 2s infinite; }
        .room-pending { background: #eab308; color: white; }
        @keyframes pulse-red { 
            0% { box-shadow: 0 0 0 0px rgba(220, 38, 38, 0.4); } 
            70% { box-shadow: 0 0 0 15px rgba(220, 38, 38, 0); } 
            100% { box-shadow: 0 0 0 0px rgba(220, 38, 38, 0); } 
        }
        @media print {
            body * { visibility: hidden; }
            #thermal-receipt, #thermal-receipt * { visibility: visible; }
            #thermal-receipt { position: absolute; left: 0; top: 0; width: 58mm; display: block !important; }
        }
    </style>
</head>
<body class="min-h-screen">

    <header class="bg-white/90 backdrop-blur-md p-5 shadow-sm flex justify-between items-center sticky top-0 z-40 border-b">
        <div>
            <h1 class="text-2xl font-black italic tracking-tighter text-slate-800">LUNOX <span class="text-blue-600">POS</span></h1>
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">ADVANCED SPA SYSTEM</p>
        </div>
        <div class="flex gap-4 items-center">
            <button onclick="openAttendanceModal()" class="bg-slate-800 text-white px-5 py-2.5 rounded-2xl text-xs font-black hover:bg-black transition uppercase">Absensi Staff</button>
            <select id="active-outlet" onchange="init()" class="bg-white border-2 border-slate-200 rounded-2xl px-4 py-2 text-xs font-black text-blue-600 outline-none cursor-pointer">
                <option value="Delta">DELTA SPA</option>
                <option value="Cabana">CABANA SPA</option>
            </select>
            <div id="clock" class="text-sm font-mono font-black bg-slate-800 text-white px-4 py-1.5 rounded-xl shadow-lg">00:00:00</div>
        </div>
    </header>

    <main class="p-8 max-w-[1600px] mx-auto">
        <div id="room-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6"></div>
    </main>

    <div id="pos-modal" class="fixed inset-0 bg-slate-900/80 hidden z-50 flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white w-full max-w-6xl rounded-[3rem] shadow-2xl overflow-hidden flex flex-col md:flex-row h-[90vh]">
            <div class="flex-1 p-10 overflow-y-auto border-r border-slate-100">
                <div class="flex justify-between items-start mb-6 text-slate-800">
                    <div>
                        <h2 id="modal-room-name" class="text-5xl font-black italic uppercase tracking-tighter text-blue-600">ROOM --</h2>
                        <span id="room-status-badge" class="text-[10px] font-bold bg-blue-100 text-blue-600 px-3 py-1 rounded-full uppercase">Ready</span>
                    </div>
                    <button onclick="closeModal()" class="text-slate-300 hover:text-red-500 text-5xl transition">&times;</button>
                </div>

                <div class="space-y-6">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-slate-50 p-4 rounded-2xl border-2 border-slate-200">
                            <label class="text-[10px] font-black text-slate-400 uppercase">Nama Tamu</label>
                            <input type="text" id="input-guest-name" placeholder="Input Nama..." class="w-full bg-transparent font-bold text-slate-800 outline-none">
                        </div>
                        <button onclick="openPicker('gro')" class="bg-slate-50 p-4 rounded-2xl border-2 border-slate-200 text-left">
                            <label class="text-[10px] font-black text-slate-400 uppercase">Staff / GRO Handle</label>
                            <div id="label-gro" class="font-bold text-slate-800">Pilih GRO...</div>
                        </button>
                    </div>

                    <div class="bg-slate-50 p-6 rounded-[2.5rem] border-2 border-dashed border-slate-200">
                        <div class="flex justify-between items-center mb-4">
                            <label class="text-[10px] font-black text-slate-400 uppercase">Layanan Utama</label>
                            <button onclick="openPicker('extra_service')" id="btn-extra-time" class="hidden bg-orange-500 text-white text-[10px] px-4 py-1 rounded-full font-black uppercase"> + Add Extra Time</button>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <button onclick="openPicker('therapist')" class="w-full p-5 bg-white border-2 rounded-2xl font-bold text-blue-600 text-left flex justify-between items-center">
                                <span id="label-therapist">Pilih Therapist...</span>
                                <i class="fa fa-user-plus opacity-30"></i>
                            </button>
                            <button onclick="openPicker('service')" class="w-full p-5 bg-white border-2 rounded-2xl font-bold text-slate-700 text-left flex justify-between items-center">
                                <span id="label-service">Pilih Layanan...</span>
                                <i class="fa fa-spa opacity-30"></i>
                            </button>
                        </div>
                        <button id="btn-start-massage" onclick="startSession()" class="w-full bg-blue-600 text-white py-5 mt-4 rounded-2xl font-black uppercase shadow-lg hover:bg-blue-700">Mulai Massage</button>
                    </div>

                    <div class="bg-slate-50 p-6 rounded-[2.5rem] border-2 border-dashed border-slate-200">
                        <label class="text-[10px] font-black text-slate-400 uppercase">Tambahan Produk / F&B</label>
                        <div class="grid grid-cols-1 gap-3 mt-2">
                            <button onclick="openPicker('therapist_seller')" class="w-full p-4 bg-white border-2 rounded-2xl font-bold text-xs text-emerald-600 text-left flex justify-between items-center">
                                <span id="label-seller">Pilih Penjual...</span>
                                <i class="fa fa-tag opacity-30"></i>
                            </button>
                            <div class="flex gap-3">
                                <button onclick="openPicker('product')" class="flex-1 p-5 bg-white border-2 rounded-2xl font-bold text-left flex justify-between items-center">
                                    <span id="label-product">Cari Item...</span>
                                    <i class="fa fa-search opacity-30"></i>
                                </button>
                                <input type="number" id="input-qty" value="1" min="1" class="w-20 p-5 bg-white border-2 rounded-2xl font-black text-center outline-none">
                                <button onclick="addToBill()" class="bg-emerald-500 text-white px-8 rounded-2xl font-black shadow-lg"><i class="fa fa-plus"></i></button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="w-full md:w-[450px] bg-slate-50 p-10 flex flex-col">
                <div class="flex justify-between items-end mb-6">
                    <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest">Current Bill</h3>
                    <div class="text-right">
                        <p class="text-[10px] font-bold text-slate-400 uppercase">Subtotal</p>
                        <p id="bill-total-display" class="text-2xl font-black text-blue-600 tracking-tighter">Rp 0</p>
                    </div>
                </div>
                <div id="bill-items" class="flex-1 overflow-y-auto space-y-4 pr-2"></div>
                <div class="border-t pt-6 mt-6 grid grid-cols-2 gap-4">
                    <button onclick="checkoutRoom()" id="btn-checkout-room" class="bg-red-600 text-white py-6 rounded-[2rem] font-black uppercase text-xs tracking-widest shadow-xl">Checkout Room</button>
                    <button onclick="openPaymentModal()" class="bg-slate-900 text-white py-6 rounded-[2rem] font-black uppercase text-xs tracking-widest shadow-xl">Bayar Bill</button>
                </div>
            </div>
        </div>
    </div>

    <div id="picker-modal" class="fixed inset-0 bg-black/60 hidden z-[70] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-2xl rounded-[3rem] shadow-2xl flex flex-col h-[75vh]">
            <div class="p-8 border-b flex justify-between items-center">
                <h3 id="picker-title" class="text-xl font-black uppercase">Pilih Data</h3>
                <button onclick="closePicker()" class="text-slate-300 hover:text-red-500 text-4xl">&times;</button>
            </div>
            <div class="p-6 bg-slate-50">
                <input type="text" id="picker-search" onkeyup="filterPicker()" placeholder="Cari..." class="w-full p-5 rounded-2xl border-none ring-2 ring-slate-100 focus:ring-blue-500 outline-none font-bold">
            </div>
            <div class="flex-1 overflow-y-auto px-6 pb-6">
                <table class="w-full text-left">
                    <tbody id="picker-table-body" class="font-bold text-slate-700"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = "https://mbzoydcehhvjdqfefflo.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1iem95ZGNlaGh2amRxZmVmZmxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NzYzNjcsImV4cCI6MjA4ODQ1MjM2N30.q5Ok1HJEeUIh-93KoXuH0zYqRN4i3LcweRMG9pWJkRg";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let currentRoom = null, activeOrders = [];
        let masterAllStaff = [], masterServices = [], masterProducts = [];
        let selectedPicker = {}, selectedSellerId = null, selectedGroName = null;

        async function init() {
            await fetchSettings();
            await loadMasterData();
            loadRoomMap();
        }

        // --- FETCH MASTER DATA ---
        async function loadMasterData() {
            const out = document.getElementById('active-outlet').value;
            const { data: staff } = await _supabase.from('therapists').select('*').eq('outlet_name', out);
            masterAllStaff = staff || [];

            // Pastikan kolom 'handle_type' diambil di sini
            const { data: svc } = await _supabase.from('services').select('*').eq('outlet_name', out);
            masterServices = svc || [];
            
            const { data: pd } = await _supabase.from('produk').select('*').eq('outlet_name', out);
            masterProducts = pd || [];
        }

        // --- PICKER LOGIC DENGAN HANDLE TYPE ---
        function openPicker(type) {
            selectedPicker.type = type;
            const body = document.getElementById('picker-table-body'); 
            body.innerHTML = '';
            let data = [];

            if (type === 'gro') {
                data = masterAllStaff.filter(s => s.category?.toLowerCase() === 'staff');
            } 
            else if (type === 'therapist') {
                data = masterAllStaff.filter(s => s.category?.toLowerCase() === 'therapist');
                // Filter standby jika ada
                const standby = data.filter(s => s.status?.toLowerCase() === 'standby');
                if(standby.length > 0) data = standby;
            } 
            else if (type === 'extra_therapist') {
                // Logika Filter Berdasarkan handle_type dari service yang dipilih sebelumnya
                const handleLimit = selectedPicker.exHandleType?.toLowerCase(); // 'therapist', 'staff', atau 'all'
                
                if (handleLimit === 'therapist') {
                    data = masterAllStaff.filter(s => s.category?.toLowerCase() === 'therapist');
                } else if (handleLimit === 'staff') {
                    data = masterAllStaff.filter(s => s.category?.toLowerCase() === 'staff');
                } else {
                    data = masterAllStaff; // 'all' atau tidak diset
                }
            }
            else if (type === 'therapist_seller') {
                data = masterAllStaff; // Semua bisa jual produk
            } 
            else if (['service', 'extra_service'].includes(type)) {
                data = masterServices;
            } 
            else {
                data = masterProducts;
            }

            if (data.length === 0) {
                body.innerHTML = `<tr><td colspan="2" class="p-10 text-center text-slate-400 font-bold uppercase text-[10px] italic">Data tidak ditemukan</td></tr>`;
            }

            data.forEach(item => {
                const name = item.name || item.nama_produk;
                const price = item.price || item.harga || 0;
                const handleType = item.handle_type || 'all'; // Default jika null di db

                const tr = document.createElement('tr');
                tr.className = "border-b hover:bg-blue-50 cursor-pointer";
                tr.onclick = () => {
                    if (type === 'gro') { selectedGroName = name; document.getElementById('label-gro').innerText = name; }
                    if (type === 'therapist') { selectedPicker.tId = item.t_id; document.getElementById('label-therapist').innerText = name; }
                    if (type === 'therapist_seller') { selectedSellerId = item.t_id; document.getElementById('label-seller').innerText = "Oleh: " + name; }
                    
                    if (type === 'service') { 
                        selectedPicker.sName = name; selectedPicker.sPrice = price; 
                        selectedPicker.sDur = item.dur || 60; document.getElementById('label-service').innerText = name; 
                    }
                    if (type === 'product') { selectedPicker.pName = name; selectedPicker.pPrice = price; document.getElementById('label-product').innerText = name; }
                    
                    // --- FLOW EXTRA SERVICE ---
                    if (type === 'extra_service') { 
                        selectedPicker.exSvc = name; 
                        selectedPicker.exPrice = price; 
                        selectedPicker.exHandleType = handleType; // Simpan handle_type untuk filter berikutnya
                        openPicker('extra_therapist'); 
                        return; 
                    }
                    
                    if (type === 'extra_therapist') { addExtraToBill(item.t_id, name); }
                    
                    closePicker();
                };
                
                tr.innerHTML = `
                    <td class="p-5">
                        <div class="uppercase font-black text-slate-700">${name}</div>
                        <div class="text-[9px] text-slate-400 font-bold uppercase">
                            ${item.category || ''} ${handleType !== 'all' ? '• Limit to: ' + handleType : ''}
                        </div>
                    </td>
                    <td class="p-5 text-right text-blue-600 font-black">
                        ${price > 0 ? 'Rp '+price.toLocaleString() : '-'}
                    </td>`;
                body.appendChild(tr);
            });

            document.getElementById('picker-title').innerText = type.replace('_', ' ').toUpperCase();
            document.getElementById('picker-modal').classList.remove('hidden');
        }

        // Fungsi bantu lainnya tetap sama (startSession, addToBill, dll)
        // ... [FUNGSI LAINNYA DIBAWAH INI SAMA DENGAN VERSI SEBELUMNYA] ...

        async function fetchSettings() { /* Sesuai kode awal */ }
        async function loadRoomMap() { /* Sesuai kode awal */ }
        function closePicker() { document.getElementById('picker-modal').classList.add('hidden'); }
        function closeModal() { document.getElementById('pos-modal').classList.add('hidden'); }
        function filterPicker() { /* Sesuai kode awal */ }

        init();
    </script>
</body>
</html>

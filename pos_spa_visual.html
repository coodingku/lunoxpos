<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUNOX POS - PREMIUM SPA SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; overflow-x: hidden; }
        
        /* Room Status Colors */
        .room-standby { background: #2563eb; color: white; } /* Blue */
        .room-progress { background: #ef4444; color: white; } /* Red */
        .room-warning { background: #facc15; color: #854d0e; animation: blink 1s infinite; } /* Yellow */
        .room-overtime { background: #000000; color: #ff0000; } /* Black-Red */
        .room-checkedout { background: #a855f7; color: white; } /* Purple (Sudah keluar room tapi belum bayar) */

        @keyframes blink { 
            0%, 100% { opacity: 1; } 
            50% { opacity: 0.7; } 
        }

        @media print {
            body * { visibility: hidden; }
            #thermal-receipt, #thermal-receipt * { visibility: visible; }
            #thermal-receipt { position: absolute; left: 0; top: 0; width: 58mm; display: block !important; }
        }
    </style>
</head>
<body class="min-h-screen">

    <header class="bg-white/90 backdrop-blur-md p-5 shadow-sm flex justify-between items-center sticky top-0 z-40 border-b">
        <div>
            <h1 class="text-2xl font-black italic tracking-tighter text-slate-800 uppercase">Lunox <span class="text-blue-600">POS</span></h1>
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Management System v2.0</p>
        </div>
        <div class="flex gap-4 items-center">
            <button onclick="openAttendanceModal()" class="bg-slate-800 text-white px-5 py-2.5 rounded-2xl text-xs font-black hover:bg-black transition uppercase">Absensi</button>
            <select id="active-outlet" onchange="init()" class="bg-white border-2 border-slate-200 rounded-2xl px-4 py-2 text-xs font-black text-blue-600 outline-none cursor-pointer">
                <option value="Delta">DELTA SPA</option>
                <option value="Cabana">CABANA SPA</option>
            </select>
            <div id="clock" class="text-sm font-mono font-black bg-slate-800 text-white px-4 py-1.5 rounded-xl shadow-lg">00:00:00</div>
        </div>
    </header>

    <main class="p-8 max-w-[1600px] mx-auto">
        <div id="room-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6">
            </div>
    </main>

    <div id="pos-modal" class="fixed inset-0 bg-slate-900/80 hidden z-50 flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white w-full max-w-6xl rounded-[3rem] shadow-2xl overflow-hidden flex flex-col md:flex-row h-[90vh]">
            
            <div class="flex-1 p-10 overflow-y-auto border-r border-slate-100">
                <div class="flex justify-between items-start mb-8 text-slate-800">
                    <div>
                        <h2 id="modal-room-name" class="text-5xl font-black italic uppercase tracking-tighter text-blue-600">ROOM --</h2>
                        <p id="timer-display" class="text-lg font-black text-slate-400 mt-1 font-mono"></p>
                    </div>
                    <button onclick="closeModal()" class="text-slate-300 hover:text-red-500 text-5xl transition">&times;</button>
                </div>
                
                <div class="space-y-6">
                    <div class="bg-blue-50 p-6 rounded-[2.5rem] border-2 border-blue-100">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <input type="text" id="input-guest-name" placeholder="NAMA TAMU..." class="w-full p-4 rounded-2xl border-2 font-bold outline-none uppercase">
                            <button onclick="openPicker('staff_handle')" class="p-4 bg-white border-2 rounded-2xl font-bold text-blue-600 text-left flex justify-between items-center">
                                <span id="label-staff-handle" class="truncate">Staff Handle...</span>
                                <i class="fa fa-user-tie opacity-30"></i>
                            </button>
                        </div>
                    </div>

                    <div class="bg-slate-50 p-6 rounded-[2.5rem] border-2 border-slate-200">
                        <div class="grid grid-cols-2 gap-4">
                            <button onclick="openPicker('therapist')" class="p-5 bg-white border-2 rounded-2xl font-bold text-blue-600 text-left flex justify-between items-center">
                                <span id="label-therapist">Pilih Therapist...</span>
                                <i class="fa fa-user-plus opacity-30"></i>
                            </button>
                            <button onclick="openPicker('service')" class="p-5 bg-white border-2 rounded-2xl font-bold text-slate-700 text-left flex justify-between items-center">
                                <span id="label-service">Pilih Layanan...</span>
                                <i class="fa fa-spa opacity-30"></i>
                            </button>
                        </div>
                        
                        <div id="service-control-area" class="mt-4 flex gap-4">
                            <button id="btn-start-massage" onclick="startSession()" class="flex-1 bg-blue-600 text-white py-5 rounded-2xl font-black uppercase italic shadow-lg hover:bg-blue-700">Mulai Massage</button>
                            <button id="btn-checkout-room" onclick="checkoutRoom()" class="hidden flex-1 bg-purple-600 text-white py-5 rounded-2xl font-black uppercase italic shadow-lg">Checkout Room</button>
                            <button id="btn-extra-time" onclick="openExtraTimeModal()" class="hidden bg-yellow-500 text-white px-8 rounded-2xl font-black uppercase italic shadow-lg">+ Extra Time</button>
                        </div>
                    </div>

                    <div class="bg-slate-50 p-6 rounded-[2.5rem] border-2 border-dashed border-slate-200">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Produk / F&B</label>
                        <div class="grid grid-cols-1 gap-3 mt-2">
                             <button onclick="openPicker('therapist_seller')" class="w-full p-4 bg-white border-2 rounded-2xl font-bold text-xs text-emerald-600 text-left flex justify-between items-center">
                                <span id="label-seller">Staff Penjual Item...</span>
                                <i class="fa fa-tag opacity-30"></i>
                            </button>
                            <div class="flex gap-3">
                                <button onclick="openPicker('product')" class="flex-1 p-5 bg-white border-2 rounded-2xl font-bold text-left flex justify-between items-center">
                                    <span id="label-product">Cari Item...</span>
                                    <i class="fa fa-search opacity-30"></i>
                                </button>
                                <input type="number" id="input-qty" value="1" min="1" class="w-20 p-5 bg-white border-2 rounded-2xl font-black text-center outline-none">
                                <button onclick="addToBill()" class="bg-emerald-500 text-white px-8 rounded-2xl font-black hover:bg-emerald-600"><i class="fa fa-plus"></i></button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="w-full md:w-[400px] bg-slate-100 p-10 flex flex-col">
                <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-6 italic">Current Bill</h3>
                <div id="bill-items" class="flex-1 overflow-y-auto space-y-4 pr-2"></div>
                <div class="border-t-2 border-slate-200 pt-6 mt-6">
                    <button onclick="openPaymentModal()" class="w-full bg-slate-900 text-white py-6 rounded-[2rem] font-black uppercase tracking-widest shadow-2xl hover:bg-black transition">Bayar & Print</button>
                </div>
            </div>
        </div>
    </div>

    <div id="extra-time-modal" class="fixed inset-0 bg-black/80 hidden z-[80] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-sm rounded-[3rem] p-10 text-center">
            <h3 class="text-2xl font-black uppercase italic mb-6 text-yellow-600">Extra Time</h3>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="processExtraTime(15)" class="p-6 bg-slate-100 rounded-2xl font-black text-xl hover:bg-yellow-100">+15m</button>
                <button onclick="processExtraTime(30)" class="p-6 bg-slate-100 rounded-2xl font-black text-xl hover:bg-yellow-100">+30m</button>
                <button onclick="processExtraTime(60)" class="p-6 bg-slate-100 rounded-2xl font-black text-xl hover:bg-yellow-100">+60m</button>
                <button onclick="document.getElementById('extra-time-modal').classList.add('hidden')" class="p-6 bg-red-50 text-red-500 rounded-2xl font-black text-xl">Batal</button>
            </div>
        </div>
    </div>

    <div id="picker-modal" class="fixed inset-0 bg-black/60 hidden z-[70] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-2xl rounded-[3rem] shadow-2xl flex flex-col h-[75vh]">
            <div class="p-8 border-b flex justify-between items-center">
                <h3 id="picker-title" class="text-xl font-black uppercase tracking-tighter italic">Pilih Data</h3>
                <button onclick="closePicker()" class="text-slate-300 hover:text-red-500 text-4xl">&times;</button>
            </div>
            <div class="p-6 bg-slate-50">
                <input type="text" id="picker-search" onkeyup="filterPicker()" placeholder="Cari..." class="w-full p-5 rounded-2xl border-none ring-2 ring-slate-100 focus:ring-blue-500 outline-none font-bold">
            </div>
            <div class="flex-1 overflow-y-auto px-6 pb-6">
                <table class="w-full text-left">
                    <tbody id="picker-table-body" class="font-bold text-slate-700"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="modal-attendance" class="fixed inset-0 bg-slate-900/95 hidden z-[100] flex items-center justify-center p-4 backdrop-blur-xl">
        <div class="bg-white w-full max-w-md rounded-[3rem] p-10 shadow-2xl text-center">
            <div id="pin-icon" class="w-20 h-20 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl"><i class="fa fa-fingerprint"></i></div>
            <h2 id="pin-title" class="text-2xl font-black uppercase italic tracking-tighter">Otoritas Manager</h2>
            <input type="password" id="staff-id-input" placeholder="••••" class="w-full p-6 bg-slate-100 rounded-[2rem] text-center text-4xl font-black tracking-[1rem] outline-none my-6">
            <div class="grid grid-cols-2 gap-4">
                <button onclick="closeAttendanceModal()" class="py-5 font-black text-slate-400 uppercase text-xs">Batal</button>
                <button id="btn-pin-confirm" class="bg-blue-600 text-white py-5 rounded-2xl font-black uppercase text-xs shadow-lg">Konfirmasi</button>
            </div>
        </div>
    </div>

    <div id="payment-modal" class="fixed inset-0 bg-blue-900/90 hidden z-[60] flex items-center justify-center p-4 backdrop-blur-xl">
        <div class="bg-white w-full max-w-md rounded-[3rem] p-10 shadow-2xl">
            <h2 class="text-2xl font-black text-center uppercase mb-8 italic text-blue-600">Payment Settle</h2>
            <div class="space-y-4 mb-8">
                <div class="flex justify-between text-slate-500 font-bold text-xs uppercase"><span>Subtotal</span><span id="p-subtotal">0</span></div>
                <div class="flex justify-between items-center text-red-500 font-bold text-xs uppercase">
                    <span>Diskon</span>
                    <select id="db-discount" onchange="calculateTotal()" class="bg-red-50 rounded-lg px-2 py-1 font-black outline-none cursor-pointer"></select>
                </div>
                <div class="pt-6 border-t-2 border-dashed flex justify-between items-center font-black">
                    <span class="text-slate-800 text-lg uppercase">Total Akhir</span>
                    <span id="p-grand-total" class="text-4xl text-blue-600 tracking-tighter">0</span>
                </div>
            </div>
            <div class="space-y-4">
                <select id="db-payment-method" class="w-full p-5 bg-slate-100 rounded-2xl font-black outline-none text-center text-lg"></select>
                <div class="grid grid-cols-2 gap-4 pt-4">
                    <button onclick="closePaymentModal()" class="py-5 font-black text-slate-400 uppercase text-xs">Batal</button>
                    <button onclick="processCheckout()" class="bg-blue-600 text-white py-5 rounded-2xl font-black uppercase text-xs shadow-lg italic">Selesaikan Transaksi</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = "https://mbzoydcehhvjdqfefflo.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1iem95ZGNlaGh2amRxZmVmZmxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NzYzNjcsImV4cCI6MjA4ODQ1MjM2N30.q5Ok1HJEeUIh-93KoXuH0zYqRN4i3LcweRMG9pWJkRg";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let currentRoom = null, activeOrders = [], masterRoomsData = [];
        let masterTherapists = [], masterServices = [], masterProducts = [];
        let selectedPicker = {};
        let selectedSellerId = null, selectedStaffHandleId = null;
        let globalTimer = null;

        // --- CORE INIT ---
        async function init() {
            await loadMasterData();
            loadRoomMap();
            fetchSettings();
            if(!globalTimer) globalTimer = setInterval(refreshUIMinutely, 1000); // Timer per detik
        }

        async function loadMasterData() {
            const out = document.getElementById('active-outlet').value;
            const { data: tps } = await _supabase.from('therapists').select('*').eq('outlet_name', out);
            masterTherapists = tps || [];
            const { data: svc } = await _supabase.from('services').select('*').eq('outlet_name', out).order('name');
            masterServices = svc || [];
            const { data: pd } = await _supabase.from('produk').select('*').eq('outlet_name', out);
            masterProducts = pd || [];
        }

        async function fetchSettings() {
            const { data: ds } = await _supabase.from('discounts').select('*').eq('active', true);
            if(ds) document.getElementById('db-discount').innerHTML = '<option value="0">0%</option>' + ds.map(d => `<option value="${d.value}">${d.name} (${d.value}%)</option>`).join('');
            const { data: bk } = await _supabase.from('banks').select('*').eq('is_active', true);
            if(bk) document.getElementById('db-payment-method').innerHTML = '<option value="CASH">CASH</option>' + bk.map(b => `<option value="${b.name}">${b.name}</option>`).join('');
        }

        // --- ROOM MAP LOGIC ---
        async function loadRoomMap() {
            const out = document.getElementById('active-outlet').value;
            const { data: rooms } = await _supabase.from('rooms').select('*').eq('outlet_name', out).order('name');
            const { data: trans } = await _supabase.from('transaksi_spa').select('*').eq('status_bayar', 'pending').eq('outlet_name', out);
            
            masterRoomsData = rooms || [];
            const grid = document.getElementById('room-grid'); 
            grid.innerHTML = '';
            
            masterRoomsData.forEach(r => {
                const roomTrans = (trans || []).filter(t => t.room_id === r.id);
                const hasTrans = roomTrans.length > 0;
                const isOcc = r.status === 'occupied';
                const isCheckedOut = r.status === 'checked_out';

                // Hitung Timer
                let timeLabel = '';
                let statusClass = 'room-standby';
                
                if (isOcc && r.end_time) {
                    const now = new Date();
                    const end = new Date(r.end_time);
                    const diff = Math.floor((end - now) / 60000);
                    
                    if (diff <= 0) {
                        statusClass = 'room-overtime';
                        timeLabel = 'TIME OVER';
                    } else if (diff <= 10) {
                        statusClass = 'room-warning';
                        timeLabel = diff + 'm Left';
                    } else {
                        statusClass = 'room-progress';
                        timeLabel = diff + 'm Remaining';
                    }
                } else if (isCheckedOut) {
                    statusClass = 'room-checkedout';
                    timeLabel = 'WAITING PAYMENT';
                } else if (hasTrans) {
                    statusClass = 'room-standby';
                    timeLabel = 'ORDERED';
                } else {
                    timeLabel = 'READY';
                }

                const card = document.createElement('div');
                card.className = `${statusClass} p-8 rounded-[2rem] text-center shadow-lg transition-all cursor-pointer border-4 border-white/20`;
                card.onclick = () => openModal(r);
                card.innerHTML = `
                    <div class="text-[10px] font-black uppercase opacity-60 mb-1 tracking-widest">${timeLabel}</div>
                    <h3 class="font-black text-2xl italic tracking-tighter">${r.name}</h3>
                `;
                grid.appendChild(card);
            });
        }

        function refreshUIMinutely() {
            loadRoomMap();
            updateClock();
        }

        function updateClock() {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID');
        }

        // --- MODAL & PICKER ---
        async function openModal(r) { 
            currentRoom = r; 
            selectedSellerId = null; selectedStaffHandleId = null; selectedPicker = {};
            document.getElementById('modal-room-name').innerText = r.name; 
            document.getElementById('pos-modal').classList.remove('hidden'); 
            
            const btnStart = document.getElementById('btn-start-massage');
            const btnFinish = document.getElementById('btn-checkout-room');
            const btnExtra = document.getElementById('btn-extra-time');

            if(r.status === 'occupied') {
                btnStart.classList.add('hidden');
                btnFinish.classList.remove('hidden');
                btnExtra.classList.remove('hidden');
            } else {
                btnStart.classList.remove('hidden');
                btnFinish.classList.add('hidden');
                btnExtra.classList.add('hidden');
            }
            fetchActiveBill(r.id);
        }

        function closeModal() { document.getElementById('pos-modal').classList.add('hidden'); }

        async function fetchActiveBill(id) {
            const { data } = await _supabase.from('transaksi_spa').select('*').eq('room_id', id).eq('status_bayar', 'pending');
            activeOrders = data || [];
            const billCont = document.getElementById('bill-items');
            billCont.innerHTML = activeOrders.map(i => `
                <div class="bg-white p-4 rounded-2xl border-2 flex justify-between items-center shadow-sm">
                    <div class="text-[10px] font-black uppercase">
                        ${i.nama_item} <br> <span class="text-blue-600">${i.qty}x</span>
                    </div>
                    <div class="text-right">
                        <b class="text-sm block">Rp ${(i.harga_satuan * i.qty).toLocaleString()}</b>
                        <button onclick="requestDelete(${i.id})" class="text-[9px] text-red-500 font-bold uppercase">Hapus</button>
                    </div>
                </div>
            `).join('');
        }

        // --- MASSAGE SESSION LOGIC ---
        async function startSession() {
            if(!selectedStaffHandleId || !selectedPicker.tId || !selectedPicker.sName) return alert("Lengkapi Data!");
            
            const dur = selectedPicker.sDur || 60;
            const endTime = new Date(Date.now() + dur * 60000).toISOString();
            
            // Update Room
            await _supabase.from('rooms').update({ status: 'occupied', therapist_id: selectedPicker.tId, end_time: endTime }).eq('id', currentRoom.id);
            // Update Therapist
            await _supabase.from('therapists').update({ status: 'progress' }).eq('t_id', selectedPicker.tId);
            // Insert Transaksi
            await _supabase.from('transaksi_spa').insert([{ 
                room_id: currentRoom.id, 
                nama_item: selectedPicker.sName, 
                harga_satuan: selectedPicker.sPrice, 
                qty: 1, 
                status_bayar: 'pending', 
                therapist_id: selectedPicker.tId,
                staff_handle_id: selectedStaffHandleId,
                total_duration_target: dur,
                outlet_name: document.getElementById('active-outlet').value,
                created_at: new Date().toISOString()
            }]);

            closeModal(); init();
        }

        async function checkoutRoom() {
            if(!confirm("Yakin ingin menyelesaikan massage (Checkout Room)?")) return;
            
            // Cari therapist di room ini
            const { data: room } = await _supabase.from('rooms').select('therapist_id').eq('id', currentRoom.id).single();
            
            // Bebaskan Therapist
            if(room.therapist_id) {
                await _supabase.from('therapists').update({ status: 'standby' }).eq('t_id', room.therapist_id);
            }
            
            // Update Room Status ke checked_out (Menunggu Bayar)
            await _supabase.from('rooms').update({ status: 'checked_out', end_time: null }).eq('id', currentRoom.id);
            // Record checkout_at di transaksi
            await _supabase.from('transaksi_spa').update({ checkout_at: new Date().toISOString() }).eq('room_id', currentRoom.id).eq('status_bayar', 'pending');

            closeModal(); init();
        }

        // --- EXTRA TIME LOGIC ---
        function openExtraTimeModal() {
            document.getElementById('extra-time-modal').classList.remove('hidden');
        }

        async function processExtraTime(minutes) {
            const { data: trans } = await _supabase.from('transaksi_spa').select('*').eq('room_id', currentRoom.id).eq('status_bayar', 'pending').filter('nama_item', 'not.ilike', '%extra%').limit(1).single();
            const { data: room } = await _supabase.from('rooms').select('end_time').eq('id', currentRoom.id).single();
            
            const newEndTime = new Date(new Date(room.end_time).getTime() + minutes * 60000).toISOString();
            const newTotalDur = (trans.total_duration_target || 60) + minutes;

            // Update Room End Time
            await _supabase.from('rooms').update({ end_time: newEndTime }).eq('id', currentRoom.id);
            // Update Transaksi Target
            await _supabase.from('transaksi_spa').update({ total_duration_target: newTotalDur }).eq('id', trans.id);
            
            // Tambahkan Biaya Extra Time (Opsional, jika extra time berbayar)
            // Silahkan tambah insert ke transaksi_spa untuk item "Extra Time" di sini.

            document.getElementById('extra-time-modal').classList.add('hidden');
            alert(`Waktu bertambah ${minutes} menit!`);
            init();
        }

        // --- PICKER CORE ---
        function openPicker(type) {
            selectedPicker.type = type;
            const body = document.getElementById('picker-table-body'); body.innerHTML = '';
            let data = (type === 'therapist') ? masterTherapists.filter(t => t.status === 'standby') : 
                       (type === 'service') ? masterServices : masterProducts;
            if(type === 'staff_handle' || type === 'therapist_seller') data = masterTherapists;

            data.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = "border-b hover:bg-blue-50 cursor-pointer";
                tr.onclick = () => selectItem(type, item);
                tr.innerHTML = `<td class="p-5 uppercase font-bold text-sm">${item.name || item.nama_produk}</td><td class="p-5 text-right font-black">Rp ${(item.price || item.harga || 0).toLocaleString()}</td>`;
                body.appendChild(tr);
            });
            document.getElementById('picker-modal').classList.remove('hidden');
        }

        function selectItem(type, item) {
            if(type === 'staff_handle') { selectedStaffHandleId = item.t_id; document.getElementById('label-staff-handle').innerText = item.name; }
            if(type === 'therapist') { selectedPicker.tId = item.t_id; document.getElementById('label-therapist').innerText = item.name; }
            if(type === 'service') { 
                selectedPicker.sName = item.name; selectedPicker.sPrice = item.price; 
                selectedPicker.sDur = item.duration_minutes || 60; // Menggunakan kolom baru SQL
                document.getElementById('label-service').innerText = item.name; 
            }
            if(type === 'product') { selectedPicker.pName = item.nama_produk; selectedPicker.pPrice = item.harga; document.getElementById('label-product').innerText = item.nama_produk; }
            if(type === 'therapist_seller') { selectedSellerId = item.t_id; document.getElementById('label-seller').innerText = item.name; }
            closePicker();
        }

        function closePicker() { document.getElementById('picker-modal').classList.add('hidden'); }

        // --- PAYMENT & FINAL ---
        async function processCheckout() {
            const out = document.getElementById('active-outlet').value;
            const totals = await calculateTotal();
            const pay = document.getElementById('db-payment-method').value;

            // Selesaikan Semua Transaksi Room Ini
            await _supabase.from('transaksi_spa').update({ 
                status_bayar: 'completed', 
                total_bayar: totals.grandTotal, 
                payment_method: pay,
                checkout_at: new Date().toISOString() 
            }).eq('room_id', currentRoom.id).eq('status_bayar', 'pending');

            // Reset Room
            await _supabase.from('rooms').update({ status: 'available', therapist_id: null, end_time: null }).eq('id', currentRoom.id);

            alert("Pembayaran Berhasil!");
            closePaymentModal(); closeModal(); init();
        }

        async function calculateTotal() {
            const sub = activeOrders.reduce((a, b) => a + (b.harga_satuan * b.qty), 0);
            const disc = parseFloat(document.getElementById('db-discount').value) || 0;
            const grandTotal = sub - (sub * (disc/100));
            document.getElementById('p-subtotal').innerText = `Rp ${sub.toLocaleString()}`;
            document.getElementById('p-grand-total').innerText = `Rp ${grandTotal.toLocaleString()}`;
            return { grandTotal };
        }

        function openPaymentModal() { 
            if(activeOrders.length === 0) return alert("Bill Kosong!");
            document.getElementById('payment-modal').classList.remove('hidden');
            calculateTotal();
        }
        function closePaymentModal() { document.getElementById('payment-modal').classList.add('hidden'); }

        init();
    </script>
</body>
</html>

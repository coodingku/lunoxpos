<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS SPA PREMIUM - ROOM CONTROL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .room-available { border: 2px solid #e2e8f0; background: white; }
        .room-occupied { border: 2px solid #ef4444; background: #fff1f2; box-shadow: 0 10px 15px -3px rgba(239, 68, 68, 0.1); }
        .room-cleaning { border: 2px solid #eab308; background: #fefce8; }
        .modal-animate { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <header class="bg-white p-4 shadow-sm flex justify-between items-center border-b sticky top-0 z-40">
        <div>
            <h1 class="text-xl font-black text-slate-800 italic uppercase">LUNOX <span class="text-blue-600">SPA POS</span></h1>
            <p id="outlet-label" class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Digital Floor Map</p>
        </div>
        <div class="flex gap-4 items-center">
            <select id="active-outlet" onchange="loadRoomMap()" class="bg-slate-100 border-none rounded-xl px-4 py-2 text-xs font-black outline-none text-blue-600">
                <option value="Delta">DELTA SPA</option>
                <option value="Cabana">CABANA SPA</option>
            </select>
            <div id="clock" class="text-sm font-mono font-bold text-slate-400">00:00:00</div>
        </div>
    </header>

    <main class="p-6">
        <div id="room-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6">
            </div>
    </main>

    <div id="pos-modal" class="fixed inset-0 bg-slate-900/80 hidden z-50 flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white w-full max-w-4xl rounded-[2.5rem] shadow-2xl overflow-hidden modal-animate flex flex-col md:flex-row h-[90vh]">
            
            <div class="flex-1 p-8 overflow-y-auto border-r">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <h2 id="modal-room-name" class="text-3xl font-black italic uppercase">ROOM 01</h2>
                        <span id="room-status-badge" class="px-3 py-1 rounded-full text-[10px] font-black uppercase">Available</span>
                    </div>
                    <button onclick="closeModal()" class="text-slate-400 hover:text-red-500 text-2xl">&times;</button>
                </div>

                <div id="form-massage" class="space-y-4">
                    <h3 class="text-xs font-black text-blue-600 uppercase tracking-widest border-b pb-2">Main Service</h3>
                    <select id="input-therapist" class="w-full p-4 bg-slate-100 rounded-2xl border-none font-bold outline-none text-blue-600"></select>
                    <select id="input-service" class="w-full p-4 bg-slate-100 rounded-2xl border-none font-bold outline-none">
                        <option value="Massage VIP" data-price="350000" data-dur="60">Massage VIP (60m) - 350k</option>
                        <option value="Luxury Spa" data-price="500000" data-dur="90">Luxury Spa (90m) - 500k</option>
                    </select>
                    <button onclick="startSession()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black uppercase italic shadow-lg shadow-blue-200">Start Massage</button>
                </div>

                <div id="form-fnb" class="mt-8 space-y-4">
                    <h3 class="text-xs font-black text-emerald-600 uppercase tracking-widest border-b pb-2">Add FnB / Products</h3>
                    <div class="flex gap-2">
                        <select id="input-product" class="flex-1 p-4 bg-slate-100 rounded-2xl border-none font-bold outline-none"></select>
                        <input type="number" id="input-qty" value="1" class="w-20 p-4 bg-slate-100 rounded-2xl border-none font-bold text-center outline-none">
                        <button onclick="addToBill()" class="bg-emerald-500 text-white px-6 rounded-2xl font-black"><i class="fa fa-plus"></i></button>
                    </div>
                </div>
            </div>

            <div class="w-full md:w-80 bg-slate-50 p-8 flex flex-col">
                <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-6">Current Bill</h3>
                <div id="bill-items" class="flex-1 overflow-y-auto space-y-3">
                    </div>
                <div class="border-t pt-4 mt-4">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-xs font-bold text-slate-500">TOTAL</span>
                        <span id="bill-total" class="text-xl font-black text-blue-600">Rp 0</span>
                    </div>
                    <button id="btn-checkout" onclick="checkout()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black uppercase tracking-widest disabled:opacity-20" disabled>Checkout & Print</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        const SB_URL = "https://mbzoydcehhvjdqfefflo.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1iem95ZGNlaGh2amRxZmVmZmxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NzYzNjcsImV4cCI6MjA4ODQ1MjM2N30.q5Ok1HJEeUIh-93KoXuH0zYqRN4i3LcweRMG9pWJkRg";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let currentRoom = null;
        let activeOrders = [];

        async function loadRoomMap() {
            const outlet = document.getElementById('active-outlet').value;
            const { data: rooms } = await _supabase.from('rooms').select('*').eq('outlet_name', outlet).order('name');
            const grid = document.getElementById('room-grid');
            grid.innerHTML = '';

            rooms.forEach(room => {
                const card = document.createElement('div');
                card.className = `room-${room.status} p-6 rounded-[2.5rem] shadow-sm cursor-pointer hover:shadow-xl transition-all flex flex-col items-center justify-center text-center relative`;
                card.onclick = () => openModal(room);
                card.innerHTML = `
                    <div class="text-[9px] font-black uppercase mb-1 opacity-40">${room.status}</div>
                    <h3 class="font-black text-lg italic tracking-tighter">${room.name}</h3>
                    <div id="timer-${room.id}" class="text-[10px] font-mono mt-2 font-bold text-red-500"></div>
                `;
                grid.appendChild(card);
            });
            loadGlobalData();
        }

        async function loadGlobalData() {
            // Load Product (FnB)
            const { data: products } = await _supabase.from('products').select('*');
            const pSelect = document.getElementById('input-product');
            pSelect.innerHTML = products.map(p => `<option value="${p.id}" data-name="${p.name}" data-price="${p.price}">${p.name} - ${p.price/1000}k</option>`).join('');

            // Load Therapist Standby
            const outlet = document.getElementById('active-outlet').value;
            const { data: tps } = await _supabase.from('therapists').select('*').eq('outlet_name', outlet).eq('status', 'standby');
            document.getElementById('input-therapist').innerHTML = tps.map(t => `<option value="${t.t_id}">${t.t_id} - ${t.name}</option>`).join('');
        }

        async function openModal(room) {
            currentRoom = room;
            document.getElementById('modal-room-name').innerText = room.name;
            document.getElementById('pos-modal').classList.remove('hidden');
            
            const badge = document.getElementById('room-status-badge');
            badge.innerText = room.status;
            badge.className = `px-3 py-1 rounded-full text-[10px] font-black uppercase ${room.status === 'occupied' ? 'bg-red-100 text-red-600' : 'bg-blue-100 text-blue-600'}`;

            // Jika Occupied, sembunyikan form massage awal, aktifkan FnB & Checkout
            if(room.status === 'occupied') {
                document.getElementById('form-massage').classList.add('hidden');
                document.getElementById('btn-checkout').disabled = false;
                fetchRoomOrders(room.id);
            } else {
                document.getElementById('form-massage').classList.remove('hidden');
                document.getElementById('btn-checkout').disabled = true;
                document.getElementById('bill-items').innerHTML = '';
                document.getElementById('bill-total').innerText = 'Rp 0';
            }
        }

        // Ambil Item FnB yang sudah dipesan di room ini
        async function fetchRoomOrders(roomId) {
            const { data } = await _supabase.from('orders').select('*').eq('room_id', roomId).eq('status', 'pending');
            activeOrders = data || [];
            renderBill();
        }

        function renderBill() {
            const container = document.getElementById('bill-items');
            let total = 0;
            container.innerHTML = activeOrders.map(item => {
                total += (item.price * item.qty);
                return `
                    <div class="flex justify-between items-center bg-white p-3 rounded-xl border border-slate-100">
                        <div>
                            <div class="text-[10px] font-black uppercase">${item.product_name}</div>
                            <div class="text-[9px] text-slate-400">Qty: ${item.qty}</div>
                        </div>
                        <div class="text-xs font-black">Rp ${(item.price * item.qty).toLocaleString()}</div>
                    </div>
                `;
            }).join('');
            document.getElementById('bill-total').innerText = `Rp ${total.toLocaleString()}`;
        }

        async function addToBill() {
            if(!currentRoom) return;
            const p = document.getElementById('input-product');
            const opt = p.options[p.selectedIndex];
            const name = opt.dataset.name;
            const price = parseInt(opt.dataset.price);
            const qty = parseInt(document.getElementById('input-qty').value);

            const { data, error } = await _supabase.from('orders').insert([{
                room_id: currentRoom.id,
                product_name: name,
                price: price,
                qty: qty,
                status: 'pending',
                outlet_name: document.getElementById('active-outlet').value
            }]).select();

            if(!error) {
                // Jika room masih available, otomatis ubah jadi occupied saat ada pesanan masuk
                if(currentRoom.status === 'available') {
                    await _supabase.from('rooms').update({ status: 'occupied' }).eq('id', currentRoom.id);
                    currentRoom.status = 'occupied';
                    document.getElementById('form-massage').classList.add('hidden');
                    document.getElementById('btn-checkout').disabled = false;
                }
                fetchRoomOrders(currentRoom.id);
            }
        }

        async function startSession() {
            const tid = document.getElementById('input-therapist').value;
            const s = document.getElementById('input-service');
            const opt = s.options[s.selectedIndex];
            const duration = parseInt(opt.dataset.dur);
            const price = parseInt(opt.dataset.price);
            
            if(!tid) return alert("Pilih Therapist!");

            const finishTime = new Date(new Date().getTime() + duration * 60000).toISOString();

            // 1. Lock Room & Therapist
            await _supabase.from('rooms').update({ status: 'occupied', therapist_id: tid, end_time: finishTime }).eq('id', currentRoom.id);
            await _supabase.from('therapists').update({ status: 'progress', end_time: finishTime }).eq('t_id', tid);
            
            // 2. Add Service to Bill
            await _supabase.from('orders').insert([{
                room_id: currentRoom.id,
                product_name: `MASSAGE: ${opt.value}`,
                price: price,
                qty: 1,
                status: 'pending',
                outlet_name: document.getElementById('active-outlet').value,
                staff_id: tid
            }]);

            loadRoomMap();
            closeModal();
        }

        async function checkout() {
            if(!confirm("Proses Checkout & Kosongkan Room?")) return;
            
            // 1. Update status orders dari pending ke completed
            await _supabase.from('orders').update({ status: 'completed' }).eq('room_id', currentRoom.id).eq('status', 'pending');
            
            // 2. Bebaskan Room & Therapist
            if(currentRoom.therapist_id) {
                await _supabase.from('therapists').update({ status: 'standby', end_time: null }).eq('t_id', currentRoom.therapist_id);
            }
            await _supabase.from('rooms').update({ status: 'available', therapist_id: null, end_time: null }).eq('id', currentRoom.id);
            
            alert("Checkout Berhasil!");
            closeModal();
            loadRoomMap();
        }

        function closeModal() { document.getElementById('pos-modal').classList.add('hidden'); }
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID'); }, 1000);
        
        loadRoomMap();
        _supabase.channel('room_updates').on('postgres_changes', { event: '*', schema: 'public', table: 'rooms' }, loadRoomMap).subscribe();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUNOX POS v3.0 - INTEGRATED SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #1e293b; }
        .room-standby { background: #2563eb; color: white; }
        .room-progress { background: #ef4444; color: white; }
        .room-checkedout { background: #a855f7; color: white; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen">

    <header class="bg-white p-5 shadow-sm flex justify-between items-center sticky top-0 z-40">
        <div class="flex items-center gap-4">
            <h1 class="text-2xl font-black italic text-slate-800">LUNOX <span class="text-blue-600">POS</span></h1>
        </div>
        <div id="clock" class="text-sm font-mono font-black bg-slate-800 text-white px-4 py-1.5 rounded-xl">00:00:00</div>
    </header>

    <main class="p-8 max-w-[1600px] mx-auto">
        <div id="room-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6"></div>
    </main>

    <div id="pos-modal" class="fixed inset-0 bg-slate-900/80 hidden z-50 flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white w-full max-w-6xl rounded-[3rem] shadow-2xl flex flex-col md:flex-row h-[90vh] overflow-hidden">
            
            <div class="flex-1 p-10 overflow-y-auto border-r">
                <div class="flex justify-between items-start mb-8">
                    <h2 id="modal-room-name" class="text-5xl font-black italic text-blue-600">ROOM --</h2>
                    <button onclick="closeModal()" class="text-slate-300 hover:text-red-500 text-5xl">&times;</button>
                </div>

                <div class="space-y-6">
                    <div class="grid grid-cols-2 gap-4">
                        <button onclick="openPicker('therapist')" class="p-5 bg-slate-50 border-2 rounded-2xl font-bold text-left flex justify-between">
                            <span id="label-therapist">Pilih Therapist...</span><i class="fa fa-user opacity-30"></i>
                        </button>
                        <button onclick="openPicker('service')" class="p-5 bg-slate-50 border-2 rounded-2xl font-bold text-left flex justify-between">
                            <span id="label-service">Pilih Layanan...</span><i class="fa fa-spa opacity-30"></i>
                        </button>
                    </div>
                    <button id="btn-start" onclick="startSession()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black uppercase shadow-lg">Mulai Sesi</button>
                    <button id="btn-checkout" onclick="checkoutRoom()" class="hidden w-full bg-purple-600 text-white py-5 rounded-2xl font-black uppercase shadow-lg">Selesai / Checkout</button>
                </div>
            </div>

            <div class="w-full md:w-[420px] bg-slate-50 p-10 flex flex-col">
                <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-6">Order Details</h3>
                <div id="bill-items" class="flex-1 overflow-y-auto space-y-4 pr-2"></div>
                <div class="border-t-4 border-slate-900 pt-6 mt-6">
                    <div class="flex justify-between text-2xl font-black">
                        <span>SUBTOTAL</span>
                        <span id="grand-total">Rp 0</span>
                    </div>
                    <button onclick="openPaymentModal()" class="w-full mt-4 bg-slate-900 text-white py-6 rounded-2xl font-black uppercase hover:bg-blue-600 transition">Proses Pembayaran</button>
                </div>
            </div>
        </div>
    </div>

    <div id="picker-modal" class="fixed inset-0 bg-black/60 hidden z-[120] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-2xl rounded-[2.5rem] shadow-2xl flex flex-col h-[70vh]">
            <div class="p-8 border-b">
                <input type="text" id="picker-search" oninput="filterPicker()" placeholder="Cari..." class="w-full bg-slate-100 p-4 rounded-xl font-bold outline-none border-2 border-transparent focus:border-blue-500">
            </div>
            <div class="flex-1 overflow-y-auto p-6">
                <table class="w-full"><tbody id="picker-table-body" class="font-bold divide-y divide-slate-50"></tbody></table>
            </div>
        </div>
    </div>

    <div id="payment-modal" class="fixed inset-0 bg-slate-900/95 hidden z-[110] flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-5xl rounded-[3.5rem] shadow-2xl overflow-hidden flex flex-col md:flex-row h-[85vh]">
            <div class="flex-1 p-10 bg-slate-50 border-r overflow-y-auto">
                <h3 class="text-xs font-black text-slate-400 mb-8 uppercase tracking-widest">Billing Summary</h3>
                <div id="pay-bill-list" class="space-y-3 mb-8"></div>
                
                <div class="border-t-2 pt-6 space-y-3">
                    <div class="flex justify-between text-slate-500 font-bold"><span>Subtotal</span><span id="p-subtotal">Rp 0</span></div>
                    
                    <div class="flex justify-between items-center gap-4 bg-red-50 p-3 rounded-xl">
                        <span class="text-red-600 font-bold text-xs uppercase">Pilih Diskon</span>
                        <select id="select-discount" onchange="calculateFinal()" class="bg-transparent border-b-2 border-red-200 outline-none font-black text-red-600">
                            <option value="0">TIDAK ADA DISKON</option>
                        </select>
                    </div>

                    <div class="flex justify-between text-slate-500 font-bold"><span>Service Chg (<span id="l-svc">0</span>%)</span><span id="p-svc">Rp 0</span></div>
                    <div class="flex justify-between text-slate-500 font-bold"><span>PPN (<span id="l-ppn">0</span>%)</span><span id="p-ppn">Rp 0</span></div>
                    <div class="border-t-4 border-slate-900 mt-4 pt-4 flex justify-between text-4xl font-black italic">
                        <span>TOTAL</span><span id="p-total" class="text-blue-600">Rp 0</span>
                    </div>
                </div>
            </div>

            <div class="w-full md:w-[450px] p-10 flex flex-col justify-between">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase block mb-4">Metode Bayar</label>
                    <div class="grid grid-cols-2 gap-2 mb-6" id="bank-container">
                        <button onclick="setPayMethod('CASH', null)" class="method-btn p-4 border-2 rounded-xl font-bold bg-blue-600 text-white shadow-lg" id="btn-cash">CASH</button>
                        </div>
                    
                    <label class="text-[10px] font-black text-slate-400 uppercase block mb-2">Uang Diterima</label>
                    <input type="number" id="pay-input" oninput="calcChange()" class="w-full text-5xl font-black outline-none border-b-4 border-slate-100 pb-2 mb-6" placeholder="0">
                    
                    <div class="bg-emerald-50 p-6 rounded-2xl border-2 border-emerald-100">
                        <span class="text-[10px] font-black text-emerald-600 block uppercase">Kembalian</span>
                        <span id="l-change" class="text-3xl font-black text-emerald-700">Rp 0</span>
                    </div>
                </div>
                <button onclick="finalizeTransaction()" class="w-full bg-blue-600 text-white py-6 rounded-2xl font-black text-xl shadow-xl">KONFIRMASI BAYAR</button>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = "https://mbzoydcehhvjdqfefflo.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1iem95ZGNlaGh2amRxZmVmZmxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NzYzNjcsImV4cCI6MjA4ODQ1MjM2N30.q5Ok1HJEeUIh-93KoXuH0zYqRN4i3LcweRMG9pWJkRg";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let activeRoom = null, masterData = { therapists: [], services: [], banks: [], discounts: [], settings: {} };
        let currentPickData = [], pickerType = '', currentTotal = 0, selectedBankId = null;

        async function init() {
            await loadGlobalData();
            loadRooms();
            setInterval(loadRooms, 15000);
            setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID'); }, 1000);
        }

        async function loadGlobalData() {
            const { data: tp } = await _supabase.from('therapists').select('*');
            const { data: sv } = await _supabase.from('services').select('*');
            const { data: bk } = await _supabase.from('banks').select('*').eq('is_active', true);
            const { data: ds } = await _supabase.from('discounts').select('*').eq('active', true);
            const { data: st } = await _supabase.from('settings').select('*'); // Ambil PPN & Service Charge

            masterData = { therapists: tp, services: sv, banks: bk, discounts: ds, 
                           settings: st ? st[0] : { ppn: 11, service: 0 } };

            // Load Bank Buttons
            const bContainer = document.getElementById('bank-container');
            masterData.banks.forEach(b => {
                const btn = document.createElement('button');
                btn.className = "method-btn p-4 border-2 rounded-xl font-bold border-slate-200 text-slate-500";
                btn.innerText = b.name.toUpperCase();
                btn.onclick = () => setPayMethod('BANK', b.id);
                btn.id = `btn-bank-${b.id}`;
                bContainer.appendChild(btn);
            });

            // Load Discount Dropdown
            const dSelect = document.getElementById('select-discount');
            masterData.discounts.forEach(d => {
                const opt = document.createElement('option');
                opt.value = d.value;
                opt.innerText = `${d.name} (${d.value}%)`;
                dSelect.appendChild(opt);
            });
        }

        async function loadRooms() {
            const { data: rooms } = await _supabase.from('rooms').select('*').order('name');
            const grid = document.getElementById('room-grid');
            grid.innerHTML = '';
            rooms.forEach(r => {
                const card = document.createElement('div');
                card.className = `p-8 rounded-[2rem] text-center shadow-lg cursor-pointer transform hover:scale-105 transition ${r.status === 'standby' ? 'room-standby' : r.status === 'occupied' ? 'room-progress' : 'room-checkedout'}`;
                card.onclick = () => openPOS(r);
                card.innerHTML = `<div class="text-[10px] opacity-60 font-black uppercase">${r.status}</div><h3 class="font-black text-2xl italic">${r.name}</h3>`;
                grid.appendChild(card);
            });
        }

        function openPOS(r) {
            activeRoom = r;
            document.getElementById('modal-room-name').innerText = r.name;
            document.getElementById('pos-modal').classList.remove('hidden');
            const isOcc = r.status === 'occupied';
            document.getElementById('btn-start').classList.toggle('hidden', isOcc);
            document.getElementById('btn-checkout').classList.toggle('hidden', !isOcc);
            loadBill(r.id);
        }

        async function loadBill(roomId) {
            const { data: items } = await _supabase.from('transaksi_spa').select('*').eq('room_id', roomId).eq('status_bayar', 'pending');
            currentTotal = 0;
            document.getElementById('bill-items').innerHTML = (items || []).map(i => {
                currentTotal += (i.harga_satuan * i.qty);
                return `<div class="bg-white p-4 rounded-2xl flex justify-between shadow-sm font-bold">
                    <span>${i.nama_item}</span><span>Rp ${(i.harga_satuan*i.qty).toLocaleString()}</span>
                </div>`;
            }).join('');
            document.getElementById('grand-total').innerText = `Rp ${currentTotal.toLocaleString()}`;
        }

        function openPaymentModal() {
            if (currentTotal === 0) return alert("Tagihan masih kosong!");
            document.getElementById('p-subtotal').innerText = `Rp ${currentTotal.toLocaleString()}`;
            document.getElementById('l-svc').innerText = masterData.settings.service;
            document.getElementById('l-ppn').innerText = masterData.settings.ppn;
            calculateFinal();
            document.getElementById('payment-modal').classList.remove('hidden');
        }

        function calculateFinal() {
            const subtotal = currentTotal;
            const discPct = parseFloat(document.getElementById('select-discount').value);
            const discVal = subtotal * (discPct / 100);
            
            const totalAfterDisc = subtotal - discVal;
            const svcVal = totalAfterDisc * (masterData.settings.service / 100);
            const ppnVal = totalAfterDisc * (masterData.settings.ppn / 100);
            
            const final = totalAfterDisc + svcVal + ppnVal;
            
            document.getElementById('p-subtotal').innerText = `Rp ${subtotal.toLocaleString()}`;
            document.getElementById('p-discount').innerText = `- Rp ${discVal.toLocaleString()}`;
            document.getElementById('p-svc').innerText = `+ Rp ${svcVal.toLocaleString()}`;
            document.getElementById('p-ppn').innerText = `+ Rp ${ppnVal.toLocaleString()}`;
            document.getElementById('p-total').innerText = `Rp ${final.toLocaleString()}`;
            
            window.finalAmount = final;
            calcChange();
        }

        function setPayMethod(type, bankId) {
            document.querySelectorAll('.method-btn').forEach(b => b.className = "method-btn p-4 border-2 rounded-xl font-bold border-slate-200 text-slate-500");
            if(type === 'CASH') {
                document.getElementById('btn-cash').className = "method-btn p-4 border-2 rounded-xl font-bold bg-blue-600 text-white shadow-lg";
                selectedBankId = null;
            } else {
                document.getElementById(`btn-bank-${bankId}`).className = "method-btn p-4 border-2 rounded-xl font-bold bg-blue-600 text-white shadow-lg";
                selectedBankId = bankId;
            }
        }

        function calcChange() {
            const input = parseInt(document.getElementById('pay-input').value) || 0;
            const change = input - window.finalAmount;
            document.getElementById('l-change').innerText = `Rp ${(change < 0 ? 0 : change).toLocaleString()}`;
        }

        async function finalizeTransaction() {
            const paid = parseInt(document.getElementById('pay-input').value) || 0;
            if (selectedBankId === null && paid < window.finalAmount) return alert("Uang Kurang!");

            await _supabase.from('transaksi_spa').update({ 
                status_bayar: 'paid', 
                total_bayar: window.finalAmount,
                bank_id: selectedBankId,
                waktu_bayar: new Date().toISOString()
            }).eq('room_id', activeRoom.id).eq('status_bayar', 'pending');

            await _supabase.from('rooms').update({ status: 'standby', therapist_id: null }).eq('id', activeRoom.id);
            alert("Pembayaran Berhasil!");
            location.reload();
        }

        // UI HELPERS
        function closeModal() { document.getElementById('pos-modal').classList.add('hidden'); }
        function openPicker(type) {
            pickerType = type;
            currentPickData = type === 'therapist' ? masterData.therapists : masterData.services;
            filterPicker();
            document.getElementById('picker-modal').classList.remove('hidden');
        }
        function filterPicker() {
            const q = document.getElementById('picker-search').value.toLowerCase();
            const body = document.getElementById('picker-table-body');
            body.innerHTML = currentPickData.filter(d => (d.name || d.nama_produk).toLowerCase().includes(q)).map(d => `
                <tr onclick="selectItem('${d.id || d.t_id}', '${d.name || d.nama_produk}', ${d.price || 0})" class="cursor-pointer hover:bg-blue-50">
                    <td class="p-4 uppercase">${d.name || d.nama_produk}</td>
                    <td class="p-4 text-right">Rp ${(d.price || 0).toLocaleString()}</td>
                </tr>
            `).join('');
        }
        function selectItem(id, name, price) {
            if(pickerType === 'therapist') { window.selT = id; document.getElementById('label-therapist').innerText = name; }
            else { window.selS = {name, price}; document.getElementById('label-service').innerText = name; }
            document.getElementById('picker-modal').classList.add('hidden');
        }
        async function startSession() {
            if(!window.selT || !window.selS) return alert("Pilih Therapist & Layanan!");
            await _supabase.from('rooms').update({ status: 'occupied', therapist_id: window.selT }).eq('id', activeRoom.id);
            await _supabase.from('transaksi_spa').insert([{ room_id: activeRoom.id, nama_item: window.selS.name, harga_satuan: window.selS.price, qty: 1, status_bayar: 'pending', therapist_id: window.selT }]);
            location.reload();
        }

        init();
    </script>
</body>
</html>

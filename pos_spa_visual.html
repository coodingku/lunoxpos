<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUNOX POS v2.0 - PREMIUM SPA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; color: #1e293b; }
        
        .room-standby { background: #2563eb; color: white; }
        .room-progress { background: #ef4444; color: white; }
        .room-warning { background: #facc15; color: #854d0e; animation: blink 1s infinite; }
        .room-overtime { background: #000000; color: #ff0000; }
        
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }

        /* Print Thermal Style */
        #thermal-receipt { display: none; width: 58mm; font-family: 'Courier New', monospace; font-size: 10px; }
        @media print {
            .no-print { display: none !important; }
            #thermal-receipt { display: block !important; margin: 0; padding: 5px; }
        }
    </style>
</head>
<body class="min-h-screen">

    <div id="thermal-receipt">
        <center>
            <strong style="font-size: 14px;">LUNOX SPA</strong><br>
            <span id="print-outlet">OUTLET</span><br>
            --------------------------
        </center>
        <div id="print-details"></div>
        --------------------------
        <div id="print-items"></div>
        --------------------------
        <div style="display: flex; justify-content: space-between;">
            <span>TOTAL:</span>
            <strong id="print-total">0</strong>
        </div>
        <center><br>Terima Kasih</center>
    </div>

    <div class="no-print">
        <header class="bg-white/90 backdrop-blur-md p-5 shadow-sm flex justify-between items-center sticky top-0 z-40 border-b">
            <div>
                <h1 class="text-2xl font-black italic tracking-tighter text-slate-800">LUNOX <span class="text-blue-600">POS</span></h1>
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Advanced Spa Management</p>
            </div>
            <div class="flex gap-4 items-center">
                <select id="active-outlet" onchange="init()" class="bg-white border-2 border-slate-200 rounded-2xl px-4 py-2 text-xs font-black text-blue-600 outline-none">
                    <option value="Delta">DELTA SPA</option>
                    <option value="Cabana">CABANA SPA</option>
                </select>
                <div id="clock" class="text-sm font-mono font-black bg-slate-800 text-white px-4 py-1.5 rounded-xl shadow-lg">00:00:00</div>
            </div>
        </header>

        <main class="p-8 max-w-[1600px] mx-auto">
            <div id="room-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6"></div>
        </main>
    </div>

    <div id="pos-modal" class="fixed inset-0 bg-slate-900/80 hidden z-50 flex items-center justify-center p-4 backdrop-blur-md no-print">
        <div class="bg-white w-full max-w-6xl rounded-[3rem] shadow-2xl overflow-hidden flex flex-col md:flex-row h-[90vh]">
            <div class="flex-1 p-10 overflow-y-auto border-r border-slate-100">
                <div class="flex justify-between items-start mb-8">
                    <h2 id="modal-room-name" class="text-5xl font-black italic uppercase tracking-tighter text-blue-600">ROOM --</h2>
                    <button onclick="closeModal()" class="text-slate-300 hover:text-red-500 text-5xl transition">&times;</button>
                </div>
                
                <div class="space-y-6">
                    <div class="bg-blue-50 p-6 rounded-[2.5rem] border-2 border-blue-200">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <input type="text" id="input-guest-name" placeholder="NAMA TAMU..." class="w-full p-4 rounded-2xl border-2 font-bold outline-none uppercase">
                            <button onclick="openPicker('staff_handle')" class="p-4 bg-white border-2 rounded-2xl font-bold text-blue-600 text-left flex justify-between items-center">
                                <span id="label-staff-handle">Staff Handle...</span>
                                <i class="fa fa-search opacity-30"></i>
                            </button>
                        </div>
                    </div>

                    <div class="bg-slate-50 p-6 rounded-[2.5rem] border-2 border-slate-200">
                        <div class="grid grid-cols-2 gap-4">
                            <button onclick="openPicker('therapist')" class="p-5 bg-white border-2 rounded-2xl font-bold text-blue-600 text-left flex justify-between items-center">
                                <span id="label-therapist">Pilih Therapist...</span>
                            </button>
                            <button onclick="openPicker('service')" class="p-5 bg-white border-2 rounded-2xl font-bold text-slate-700 text-left flex justify-between items-center">
                                <span id="label-service">Pilih Layanan...</span>
                            </button>
                        </div>
                        <div class="mt-4 flex gap-4">
                            <button id="btn-start-massage" onclick="startSession()" class="flex-1 bg-blue-600 text-white py-5 rounded-2xl font-black uppercase italic shadow-lg hover:bg-blue-700 transition">Mulai Massage</button>
                            <button id="btn-extra-time" onclick="openExtraTimeModal()" class="hidden bg-yellow-500 text-white px-8 rounded-2xl font-black uppercase italic shadow-lg hover:bg-yellow-600 transition">+ Extra Time</button>
                        </div>
                    </div>

                    <div class="bg-slate-50 p-6 rounded-[2.5rem] border-2 border-dashed border-slate-300">
                        <div class="flex gap-3">
                            <button onclick="openPicker('therapist_seller')" class="w-1/3 p-4 bg-white border-2 rounded-2xl font-bold text-xs text-emerald-600 text-left truncate"><span id="label-seller">Staff Penjual...</span></button>
                            <button onclick="openPicker('product')" class="flex-1 p-4 bg-white border-2 rounded-2xl font-bold text-left"><span id="label-product">Cari Produk...</span></button>
                            <input type="number" id="input-qty" value="1" class="w-16 p-4 rounded-2xl border-2 text-center font-black">
                            <button onclick="addToBill()" class="bg-emerald-500 text-white px-6 rounded-2xl font-black hover:bg-emerald-600"><i class="fa fa-plus"></i></button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="w-full md:w-[420px] bg-slate-50 p-10 flex flex-col border-l border-slate-200">
                <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-6">Current Bill</h3>
                <div id="bill-items" class="flex-1 overflow-y-auto space-y-4"></div>
                <div class="border-t-4 border-slate-900 pt-6 mt-6">
                    <div class="flex justify-between items-center mb-4">
                        <span id="grand-total" class="text-3xl font-black text-blue-600">Rp 0</span>
                    </div>
                    <button onclick="openPaymentModal()" class="w-full bg-slate-900 text-white py-6 rounded-[2rem] font-black uppercase hover:bg-blue-600 transition">Bayar & Print</button>
                </div>
            </div>
        </div>
    </div>

    <div id="picker-modal" class="fixed inset-0 bg-black/60 hidden z-[120] flex items-center justify-center p-4 no-print">
        <div class="bg-white w-full max-w-md rounded-[3rem] overflow-hidden flex flex-col h-[70vh]">
            <div class="p-6 border-b"><h3 class="font-black uppercase">Pilih Data</h3></div>
            <div class="flex-1 overflow-y-auto p-4"><table class="w-full text-left font-bold"><tbody id="picker-table-body" class="divide-y"></tbody></table></div>
        </div>
    </div>

    <div id="extra-time-modal" class="fixed inset-0 bg-black/90 hidden z-[130] flex items-center justify-center p-4 no-print">
        <div class="bg-white p-10 rounded-[3rem] max-w-xl w-full">
            <h3 class="text-3xl font-black text-center mb-10 italic">EXTRA TIME</h3>
            <div class="space-y-4">
                <button onclick="openPicker('therapist_extra')" class="w-full p-6 bg-slate-50 border-2 border-dashed rounded-3xl font-bold flex justify-between items-center">
                    <span id="label-therapist-extra">Pilih Therapist...</span>
                </button>
                <button onclick="openPicker('service_extra')" class="w-full p-6 bg-slate-50 border-2 border-dashed rounded-3xl font-bold flex justify-between items-center">
                    <span id="label-service-extra">Pilih Paket...</span>
                </button>
                <div class="grid grid-cols-2 gap-4 mt-10">
                    <button onclick="processExtraTime()" class="bg-yellow-500 text-white py-6 rounded-3xl font-black">KONFIRMASI</button>
                    <button onclick="document.getElementById('extra-time-modal').classList.add('hidden')" class="bg-slate-100 py-6 rounded-3xl font-black">BATAL</button>
                </div>
            </div>
        </div>
    </div>

    <div id="payment-modal" class="fixed inset-0 bg-slate-900/95 hidden z-[110] flex items-center justify-center p-4 no-print">
        <div class="bg-white w-full max-w-md rounded-[3.5rem] p-10 flex flex-col items-center">
            <h3 class="font-black text-slate-400 uppercase mb-8">Pembayaran</h3>
            <div class="grid grid-cols-3 gap-2 w-full mb-8">
                <button onclick="setMethod('CASH')" id="btn-cash" class="pay-method-btn p-4 border-2 rounded-2xl font-bold bg-blue-600 text-white border-blue-600">CASH</button>
                <button onclick="setMethod('QRIS')" id="btn-qris" class="pay-method-btn p-4 border-2 rounded-2xl font-bold border-slate-200 text-slate-400">QRIS</button>
                <button onclick="setMethod('CARD')" id="btn-card" class="pay-method-btn p-4 border-2 rounded-2xl font-bold border-slate-200 text-slate-400">CARD</button>
            </div>
            <input type="number" id="input-pay-amount" oninput="calcChange()" class="w-full text-4xl font-black text-center border-b-4 mb-4 outline-none" placeholder="Cash Amount...">
            <div id="label-change" class="text-2xl font-black text-emerald-600 mb-8">Rp 0</div>
            <button onclick="finalizePayment()" class="w-full bg-blue-600 text-white py-6 rounded-3xl font-black text-xl uppercase italic">Proses Bayar & Print</button>
        </div>
    </div>

    <script>
        const SB_URL = "https://mbzoydcehhvjdqfefflo.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1iem95ZGNlaGh2amRxZmVmZmxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NzYzNjcsImV4cCI6MjA4ODQ1MjM2N30.q5Ok1HJEeUIh-93KoXuH0zYqRN4i3LcweRMG9pWJkRg";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let currentRoom = null, activeOrders = [], masterTherapists = [], masterServices = [], masterProducts = [];
        let selectedPicker = {}, selectedSellerId = null, selectedStaffHandleId = null, selectedExtra = {};
        let currentPaymentMethod = 'CASH', currentTotalBill = 0;

        async function init() {
            await loadMasterData();
            await loadRoomMap();
            setInterval(loadRoomMap, 10000);
            setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID'); }, 1000);
        }

        async function loadMasterData() {
            const out = document.getElementById('active-outlet').value;
            const { data: tps } = await _supabase.from('therapists').select('*').eq('outlet_name', out);
            masterTherapists = tps || [];
            const { data: svc } = await _supabase.from('services').select('*').eq('outlet_name', out);
            masterServices = svc || [];
            const { data: pd } = await _supabase.from('produk').select('*').eq('outlet_name', out);
            masterProducts = pd || [];
        }

        async function loadRoomMap() {
            const out = document.getElementById('active-outlet').value;
            const { data: rooms } = await _supabase.from('rooms').select('*').eq('outlet_name', out).order('name');
            const grid = document.getElementById('room-grid'); 
            grid.innerHTML = '';
            rooms.forEach(r => {
                let statusClass = 'room-standby', timeLabel = 'READY';
                if (r.status === 'occupied' && r.end_time) {
                    const diff = Math.floor((new Date(r.end_time) - new Date()) / 60000);
                    if (diff <= 0) { statusClass = 'room-overtime'; timeLabel = 'TIME OVER'; }
                    else if (diff <= 10) { statusClass = 'room-warning'; timeLabel = diff + 'm'; }
                    else { statusClass = 'room-progress'; timeLabel = diff + 'm'; }
                }
                const card = document.createElement('div');
                card.className = `${statusClass} p-8 rounded-[2.5rem] text-center shadow-lg cursor-pointer transform hover:scale-105 transition`;
                card.onclick = () => openModal(r);
                card.innerHTML = `<div class="text-[9px] font-black opacity-60">${timeLabel}</div><h3 class="font-black text-xl italic">${r.name}</h3>`;
                grid.appendChild(card);
            });
        }

        async function openModal(r) {
            currentRoom = r;
            document.getElementById('modal-room-name').innerText = r.name;
            document.getElementById('pos-modal').classList.remove('hidden');
            document.getElementById('btn-start-massage').classList.toggle('hidden', r.status === 'occupied');
            document.getElementById('btn-extra-time').classList.toggle('hidden', r.status !== 'occupied');
            fetchActiveBill(r.id);
        }

        async function fetchActiveBill(roomId) {
            const { data } = await _supabase.from('transaksi_spa').select('*').eq('room_id', roomId).eq('status_bayar', 'pending');
            activeOrders = data || [];
            let total = 0;
            document.getElementById('bill-items').innerHTML = activeOrders.map(i => {
                total += (i.harga_satuan * i.qty);
                return `<div class="bg-white p-4 rounded-3xl border flex justify-between items-center shadow-sm">
                    <div><div class="text-xs font-black uppercase">${i.nama_item} x${i.qty}</div><div class="text-[10px] text-slate-400 font-bold">Rp ${(i.harga_satuan * i.qty).toLocaleString()}</div></div>
                    <button onclick="cancelItem(${i.id})" class="text-red-300 hover:text-red-500"><i class="fa fa-trash-alt"></i></button>
                </div>`;
            }).join('');
            currentTotalBill = total;
            document.getElementById('grand-total').innerText = `Rp ${total.toLocaleString()}`;
        }

        async function startSession() {
            if(!selectedStaffHandleId || !selectedPicker.tId || !selectedPicker.sName) return alert("Lengkapi Data!");
            const endTime = new Date(Date.now() + (selectedPicker.sDur * 60000)).toISOString();
            
            await _supabase.from('rooms').update({ status: 'occupied', therapist_id: selectedPicker.tId, end_time: endTime }).eq('id', currentRoom.id);
            await _supabase.from('transaksi_spa').insert([{ 
                room_id: currentRoom.id, nama_item: selectedPicker.sName, harga_satuan: selectedPicker.sPrice, qty: 1, 
                status_bayar: 'pending', therapist_id: selectedPicker.tId, staff_handle_id: selectedStaffHandleId, 
                guest_name: document.getElementById('input-guest-name').value || "GUEST", outlet_name: document.getElementById('active-outlet').value 
            }]);
            
            await fetchActiveBill(currentRoom.id); // Langsung tampilkan bill
            loadRoomMap();
            document.getElementById('btn-start-massage').classList.add('hidden');
            document.getElementById('btn-extra-time').classList.remove('hidden');
        }

        async function cancelItem(id) {
            const user = prompt("Manager ID:"), pass = prompt("Password:");
            const { data: auth } = await _supabase.from('user').select('*').eq('username', user).eq('password_id', pass).eq('role', 'manager').single();
            if(!auth) return alert("Akses Ditolak!");
            
            await _supabase.from('transaksi_spa').delete().eq('id', id);
            fetchActiveBill(currentRoom.id);
        }

        async function processExtraTime() {
            if(!selectedExtra.tId || !selectedExtra.sName) return alert("Pilih Therapist & Paket!");
            const baseTime = (new Date(currentRoom.end_time) > new Date()) ? new Date(currentRoom.end_time) : new Date();
            const newEnd = new Date(baseTime.getTime() + (selectedExtra.sDur * 60000)).toISOString();
            
            await _supabase.from('rooms').update({ end_time: newEnd }).eq('id', currentRoom.id);
            await _supabase.from('transaksi_spa').insert([{ 
                room_id: currentRoom.id, nama_item: "[EXT] "+selectedExtra.sName, harga_satuan: selectedExtra.sPrice, qty: 1, 
                status_bayar: 'pending', therapist_id: selectedExtra.tId, outlet_name: document.getElementById('active-outlet').value 
            }]);
            
            document.getElementById('extra-time-modal').classList.add('hidden');
            fetchActiveBill(currentRoom.id);
            loadRoomMap();
        }

        async function addToBill() {
            if(!selectedPicker.pName || !selectedSellerId) return alert("Pilih Produk & Staff!");
            await _supabase.from('transaksi_spa').insert([{ 
                room_id: currentRoom.id, nama_item: selectedPicker.pName, harga_satuan: selectedPicker.pPrice, 
                qty: parseInt(document.getElementById('input-qty').value), status_bayar: 'pending', 
                therapist_id: selectedSellerId, outlet_name: document.getElementById('active-outlet').value 
            }]);
            fetchActiveBill(currentRoom.id);
        }

        async function finalizePayment() {
            if(currentPaymentMethod === 'CASH' && (parseInt(document.getElementById('input-pay-amount').value) || 0) < currentTotalBill) return alert("Uang Kurang!");

            // 1. Persiapkan Thermal Print
            document.getElementById('print-outlet').innerText = document.getElementById('active-outlet').value;
            document.getElementById('print-details').innerHTML = `Room: ${currentRoom.name}<br>Date: ${new Date().toLocaleString()}`;
            document.getElementById('print-items').innerHTML = activeOrders.map(i => `<div>${i.nama_item} x${i.qty} = ${(i.harga_satuan*i.qty).toLocaleString()}</div>`).join('');
            document.getElementById('print-total').innerText = currentTotalBill.toLocaleString();

            // 2. Jalankan Print
            window.print();

            // 3. Update Database
            await _supabase.from('transaksi_spa').update({ status_bayar: 'paid', payment_method: currentPaymentMethod, total_bayar: currentTotalBill, checkout_at: new Date().toISOString() }).eq('room_id', currentRoom.id).eq('status_bayar', 'pending');
            await _supabase.from('rooms').update({ status: 'standby', therapist_id: null, end_time: null }).eq('id', currentRoom.id);
            
            location.reload();
        }

        function openPicker(type) {
            selectedPicker.type = type;
            document.getElementById('picker-modal').classList.remove('hidden');
            let data = (type.includes('service')) ? masterServices : (type === 'product' ? masterProducts : masterTherapists);
            const body = document.getElementById('picker-table-body'); body.innerHTML = '';
            data.forEach(item => {
                const name = item.name || item.nama_produk, price = item.price || item.harga || 0;
                const tr = document.createElement('tr'); tr.className = "hover:bg-blue-50 cursor-pointer p-4 block";
                tr.onclick = () => {
                    if(type==='staff_handle') { selectedStaffHandleId=item.t_id; document.getElementById('label-staff-handle').innerText=name; }
                    if(type==='therapist') { selectedPicker.tId=item.t_id; document.getElementById('label-therapist').innerText=name; }
                    if(type==='service') { selectedPicker.sName=name; selectedPicker.sPrice=price; selectedPicker.sDur=item.duration_minutes; document.getElementById('label-service').innerText=name; }
                    if(type==='product') { selectedPicker.pName=name; selectedPicker.pPrice=price; document.getElementById('label-product').innerText=name; }
                    if(type==='therapist_seller') { selectedSellerId=item.t_id; document.getElementById('label-seller').innerText=name; }
                    if(type==='therapist_extra') { selectedExtra.tId=item.t_id; document.getElementById('label-therapist-extra').innerText=name; }
                    if(type==='service_extra') { selectedExtra.sName=name; selectedExtra.sPrice=price; selectedExtra.sDur=item.duration_minutes; document.getElementById('label-service-extra').innerText=name; }
                    document.getElementById('picker-modal').classList.add('hidden');
                };
                tr.innerHTML = `<td class="p-2">${name}</td><td class="p-2 text-right">Rp ${price.toLocaleString()}</td>`;
                body.appendChild(tr);
            });
        }

        function closeModal() { document.getElementById('pos-modal').classList.add('hidden'); }
        function openExtraTimeModal() { document.getElementById('extra-time-modal').classList.remove('hidden'); }
        function openPaymentModal() { if(activeOrders.length > 0) document.getElementById('payment-modal').classList.remove('hidden'); }
        function setMethod(m) { 
            currentPaymentMethod = m;
            document.querySelectorAll('.pay-method-btn').forEach(b => b.classList.replace('bg-blue-600', 'bg-white'));
            document.getElementById(`btn-${m.toLowerCase()}`).classList.replace('bg-white', 'bg-blue-600');
        }
        function calcChange() {
            const val = parseInt(document.getElementById('input-pay-amount').value) || 0;
            document.getElementById('label-change').innerText = "Rp " + Math.max(0, val - currentTotalBill).toLocaleString();
        }

        init();
    </script>
</body>
</html>

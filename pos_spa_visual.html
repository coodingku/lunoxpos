<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUNOX POS - PREMIUM SPA SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #cbd5e1; overflow-x: hidden; }
        .room-standby { background: #2563eb; color: white; }
        .room-progress { background: #dc2626; color: white; animation: pulse-red 2s infinite; }
        .room-pending { background: #eab308; color: white; }
        @keyframes pulse-red { 
            0% { box-shadow: 0 0 0 0px rgba(220, 38, 38, 0.4); } 
            70% { box-shadow: 0 0 0 15px rgba(220, 38, 38, 0); } 
            100% { box-shadow: 0 0 0 0px rgba(220, 38, 38, 0); } 
        }
        @media print {
            body * { visibility: hidden; }
            #thermal-receipt, #thermal-receipt * { visibility: visible; }
            #thermal-receipt { position: absolute; left: 0; top: 0; width: 58mm; display: block !important; }
        }
    </style>
</head>
<body class="min-h-screen">

    <header class="bg-white/90 backdrop-blur-md p-5 shadow-sm flex justify-between items-center sticky top-0 z-40 border-b">
        <div>
            <h1 class="text-2xl font-black italic tracking-tighter text-slate-800">LUNOX <span class="text-blue-600">POS</span></h1>
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">ADVANCED SPA SYSTEM</p>
        </div>
        <div class="flex gap-4 items-center">
            <button onclick="openAttendanceModal()" class="bg-slate-800 text-white px-5 py-2.5 rounded-2xl text-xs font-black hover:bg-black transition uppercase">Absensi</button>
            <select id="active-outlet" onchange="init()" class="bg-white border-2 border-slate-200 rounded-2xl px-4 py-2 text-xs font-black text-blue-600 outline-none cursor-pointer">
                <option value="Delta">DELTA SPA</option>
                <option value="Cabana">CABANA SPA</option>
            </select>
            <div id="clock" class="text-sm font-mono font-black bg-slate-800 text-white px-4 py-1.5 rounded-xl shadow-lg">00:00:00</div>
        </div>
    </header>

    <main class="p-8 max-w-[1600px] mx-auto">
        <div id="room-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6"></div>
    </main>

    <div id="pos-modal" class="fixed inset-0 bg-slate-900/80 hidden z-50 flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white w-full max-w-5xl rounded-[3rem] shadow-2xl overflow-hidden flex flex-col md:flex-row h-[85vh]">
            <div class="flex-1 p-10 overflow-y-auto border-r border-slate-100">
                <div class="flex justify-between items-start mb-8 text-slate-800">
                    <h2 id="modal-room-name" class="text-5xl font-black italic uppercase tracking-tighter text-blue-600">ROOM --</h2>
                    <button onclick="closeModal()" class="text-slate-300 hover:text-red-500 text-5xl transition">&times;</button>
                </div>
                <div class="space-y-6">
                    <div class="bg-slate-50 p-6 rounded-[2.5rem] border-2 border-dashed border-slate-200">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Therapist & Layanan</label>
                        <div class="grid grid-cols-2 gap-4 mt-2">
                            <button onclick="openPicker('therapist')" class="w-full p-5 bg-white border-2 rounded-2xl font-bold text-blue-600 text-left flex justify-between items-center">
                                <span id="label-therapist">Pilih Therapist...</span>
                                <i class="fa fa-user-plus opacity-30"></i>
                            </button>
                            <button onclick="openPicker('service')" class="w-full p-5 bg-white border-2 rounded-2xl font-bold text-slate-700 text-left flex justify-between items-center">
                                <span id="label-service">Pilih Layanan...</span>
                                <i class="fa fa-spa opacity-30"></i>
                            </button>
                        </div>
                        <button id="btn-start-massage" onclick="startSession()" class="w-full bg-blue-600 text-white py-5 mt-4 rounded-2xl font-black uppercase italic shadow-lg hover:bg-blue-700 transition">Mulai Massage</button>
                    </div>

                    <div class="bg-slate-50 p-6 rounded-[2.5rem] border-2 border-dashed border-slate-200">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Tambahan Produk / F&B</label>
                        <div class="grid grid-cols-1 gap-3 mt-2">
                            <button onclick="openPicker('therapist_seller')" class="w-full p-4 bg-white border-2 rounded-2xl font-bold text-xs text-emerald-600 text-left flex justify-between items-center shadow-sm">
                                <span id="label-seller">Pilih Staff Penjual...</span>
                                <i class="fa fa-tag opacity-30"></i>
                            </button>
                            <div class="flex gap-3">
                                <button onclick="openPicker('product')" class="flex-1 p-5 bg-white border-2 rounded-2xl font-bold text-left flex justify-between items-center shadow-sm">
                                    <span id="label-product">Cari Item...</span>
                                    <i class="fa fa-search opacity-30"></i>
                                </button>
                                <input type="number" id="input-qty" value="1" min="1" class="w-20 p-5 bg-white border-2 rounded-2xl font-black text-center outline-none">
                                <button onclick="addToBill()" class="bg-emerald-500 text-white px-8 rounded-2xl font-black hover:bg-emerald-600 transition shadow-lg"><i class="fa fa-plus"></i></button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="w-full md:w-[400px] bg-slate-50 p-10 flex flex-col">
                <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-6">Current Bill</h3>
                <div id="bill-items" class="flex-1 overflow-y-auto space-y-4 pr-2"></div>
                <div class="border-t pt-6 mt-6">
                    <button onclick="openPaymentModal()" class="w-full bg-slate-900 text-white py-6 rounded-[2rem] font-black uppercase tracking-widest shadow-2xl hover:bg-black transition">BAYAR SEKARANG</button>
                </div>
            </div>
        </div>
    </div>

    <div id="picker-modal" class="fixed inset-0 bg-black/60 hidden z-[70] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-2xl rounded-[3rem] shadow-2xl flex flex-col h-[75vh]">
            <div class="p-8 border-b flex justify-between items-center">
                <h3 id="picker-title" class="text-xl font-black uppercase tracking-tighter">Pilih Data</h3>
                <button onclick="closePicker()" class="text-slate-300 hover:text-red-500 text-4xl">&times;</button>
            </div>
            <div class="p-6 bg-slate-50">
                <input type="text" id="picker-search" onkeyup="filterPicker()" placeholder="Cari..." class="w-full p-5 rounded-2xl border-none ring-2 ring-slate-100 focus:ring-blue-500 outline-none font-bold">
            </div>
            <div class="flex-1 overflow-y-auto px-6 pb-6">
                <table class="w-full text-left">
                    <tbody id="picker-table-body" class="font-bold text-slate-700"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="payment-modal" class="fixed inset-0 bg-blue-900/90 hidden z-[60] flex items-center justify-center p-4 backdrop-blur-xl">
        <div class="bg-white w-full max-w-md rounded-[3rem] p-10 shadow-2xl">
            <h2 class="text-2xl font-black text-center uppercase mb-8 italic">Checkout</h2>
            <div class="space-y-4 mb-8">
                <div class="flex justify-between text-slate-500 font-bold text-xs uppercase"><span>Subtotal</span><span id="p-subtotal">0</span></div>
                <div class="flex justify-between items-center text-red-500 font-bold text-xs uppercase">
                    <span>Diskon</span>
                    <select id="db-discount" onchange="calculateTotal()" class="bg-red-50 rounded-lg px-2 py-1 font-black outline-none cursor-pointer">
                        <option value="0">0%</option>
                    </select>
                </div>
                <div id="tax-details" class="space-y-1 text-[10px] text-slate-400 font-bold uppercase border-t pt-2">
                    <div class="flex justify-between"><span>Service (5%)</span><span id="p-service">0</span></div>
                    <div class="flex justify-between"><span>PPN (11%)</span><span id="p-ppn">0</span></div>
                </div>
                <div class="pt-6 border-t-2 border-dashed flex justify-between items-center font-black">
                    <span class="text-slate-800 text-lg uppercase">Total Akhir</span>
                    <span id="p-grand-total" class="text-4xl text-blue-600 tracking-tighter">0</span>
                </div>
            </div>
            <div class="space-y-4">
                <select id="db-payment-method" class="w-full p-5 bg-slate-100 rounded-2xl font-black outline-none text-center text-lg"></select>
                <div class="grid grid-cols-2 gap-4 pt-4">
                    <button onclick="closePaymentModal()" class="py-5 font-black text-slate-400 uppercase text-xs">Batal</button>
                    <button onclick="processCheckout()" class="bg-blue-600 text-white py-5 rounded-2xl font-black uppercase text-xs shadow-lg">Print & Selesai</button>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-attendance" class="fixed inset-0 bg-slate-900/95 hidden z-[100] flex items-center justify-center p-4 backdrop-blur-xl">
        <div class="bg-white w-full max-w-md rounded-[3rem] p-10 shadow-2xl text-center">
            <div class="w-20 h-20 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl shadow-inner"><i class="fa fa-fingerprint"></i></div>
            <h2 class="text-2xl font-black uppercase italic tracking-tighter">Staff Attendance</h2>
            <input type="password" id="staff-id-input" placeholder="••••" class="w-full p-6 bg-slate-100 rounded-[2rem] text-center text-4xl font-black tracking-[1rem] outline-none my-6 border-2 border-slate-200">
            <div class="grid grid-cols-2 gap-4">
                <button onclick="closeAttendanceModal()" class="py-5 font-black text-slate-400 uppercase text-xs">Batal</button>
                <button onclick="processAbsensi()" class="bg-blue-600 text-white py-5 rounded-2xl font-black uppercase text-xs shadow-lg">Konfirmasi</button>
            </div>
        </div>
    </div>

    <div id="thermal-receipt" class="hidden font-mono text-[10px] w-[58mm] bg-white text-black p-2">
        <div class="text-center font-bold text-xs mb-1 italic">LUNOX SPA</div>
        <div id="r-outlet" class="text-center mb-2 uppercase text-[8px]">---</div>
        <div id="r-date" class="text-center mb-2 text-[7px]">---</div>
        <div class="border-b border-dashed mb-2"></div>
        <div id="r-items-list" class="space-y-1 mb-2"></div>
        <div class="border-t border-dashed pt-2 space-y-1">
            <div class="flex justify-between"><span>SUBTOTAL</span><span id="r-subtotal"></span></div>
            <div class="flex justify-between"><span>TAX & SERV</span><span id="r-tax"></span></div>
            <div class="flex justify-between font-bold text-xs"><span>TOTAL</span><span id="r-total"></span></div>
        </div>
        <div class="text-center mt-4 text-[7px]">TERIMA KASIH ATAS KUNJUNGANNYA</div>
    </div>

    <script>
        const SB_URL = "https://mbzoydcehhvjdqfefflo.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1iem95ZGNlaGh2amRxZmVmZmxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NzYzNjcsImV4cCI6MjA4ODQ1MjM2N30.q5Ok1HJEeUIh-93KoXuH0zYqRN4i3LcweRMG9pWJkRg";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let currentRoom = null, activeOrders = [], masterRoomsData = [];
        let masterTherapists = [], masterServices = [], masterProducts = [];
        let selectedPicker = {};
        let selectedSellerId = null;

        async function init() {
            await fetchSettings();
            await loadMasterData();
            loadRoomMap();
        }

        async function fetchSettings() {
            const { data: ds } = await _supabase.from('discounts').select('*').eq('active', true);
            if(ds) document.getElementById('db-discount').innerHTML = '<option value="0">0%</option>' + ds.map(d => `<option value="${d.value}">${d.name} (${d.value}%)</option>`).join('');
            
            const { data: bk } = await _supabase.from('banks').select('*').eq('is_active', true);
            if(bk) document.getElementById('db-payment-method').innerHTML = '<option value="CASH">CASH</option>' + bk.map(b => `<option value="${b.name}">${b.name}</option>`).join('');
        }

        async function loadMasterData() {
            const out = document.getElementById('active-outlet').value;
            const { data: tps } = await _supabase.from('therapists').select('*').eq('outlet_name', out);
            masterTherapists = tps || [];
            
            const { data: svc } = await _supabase.from('services').select('*').eq('outlet_name', out).order('name');
            masterServices = svc || [];
            
            const { data: pd } = await _supabase.from('produk').select('*').eq('outlet_name', out);
            masterProducts = pd || [];
        }

        async function loadRoomMap() {
            const out = document.getElementById('active-outlet').value;
            const { data: rooms } = await _supabase.from('rooms').select('*').eq('outlet_name', out).order('name');
            const { data: trans } = await _supabase.from('transaksi_spa').select('room_id').eq('status_bayar', 'pending').eq('outlet_name', out);
            
            masterRoomsData = rooms || [];
            const grid = document.getElementById('room-grid'); 
            grid.innerHTML = '';
            
            masterRoomsData.forEach(r => {
                const hasTrans = (trans || []).some(t => t.room_id === r.id);
                const isOcc = r.status === 'occupied';
                let style = isOcc ? 'room-progress' : (hasTrans ? 'room-pending' : 'room-standby');
                
                const card = document.createElement('div');
                card.className = `${style} p-10 rounded-[2.5rem] text-center shadow-lg transition-all transform hover:scale-105 cursor-pointer border-4 border-white/20`;
                card.onclick = () => openModal(r);
                card.innerHTML = `<div class="text-[9px] font-black uppercase opacity-60 mb-1 tracking-widest">${isOcc ? 'MASSAGE' : (hasTrans ? 'BILL' : 'READY')}</div><h3 class="font-black text-3xl italic tracking-tighter">${r.name}</h3>`;
                grid.appendChild(card);
            });
        }

        function openPicker(type) {
            selectedPicker.type = type;
            const body = document.getElementById('picker-table-body'); 
            body.innerHTML = '';
            
            let data = [];
            if (type === 'therapist') {
                data = masterTherapists.filter(t => t.status === 'standby');
            } else if (type === 'therapist_seller') {
                data = masterTherapists;
            } else if (type === 'service') {
                data = masterServices;
            } else {
                data = masterProducts;
            }

            data.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = "border-b hover:bg-blue-50 cursor-pointer";
                tr.onclick = () => {
                    const itemName = item.name || item.nama_produk;
                    const itemPrice = item.price || item.harga;
                    
                    if(type === 'therapist') { 
                        selectedPicker.tId = item.t_id; 
                        document.getElementById('label-therapist').innerText = item.name; 
                    }
                    if(type === 'therapist_seller') { 
                        selectedSellerId = item.t_id; 
                        document.getElementById('label-seller').innerText = "Penjual: " + item.name; 
                    }
                    if(type === 'service') { 
                        selectedPicker.sName = item.name; 
                        selectedPicker.sPrice = item.price; 
                        selectedPicker.sDur = item.dur || 60;
                        selectedPicker.comType = item.commission_type || 'percentage';
                        selectedPicker.comValue = item.commission_value || 0;
                        document.getElementById('label-service').innerText = item.name; 
                    }
                    if(type === 'product') { 
                        selectedPicker.pName = itemName; 
                        selectedPicker.pPrice = itemPrice; 
                        selectedPicker.comType = item.commission_type || 'percentage';
                        selectedPicker.comValue = item.commission_value || 0;
                        document.getElementById('label-product').innerText = itemName; 
                    }
                    closePicker();
                };
                tr.innerHTML = `<td class="p-5 uppercase">${item.name || item.nama_produk}</td><td class="p-5 text-right font-black">${(item.price || item.harga || 0).toLocaleString()}</td>`;
                body.appendChild(tr);
            });
            document.getElementById('picker-title').innerText = type.replace('_', ' ').toUpperCase();
            document.getElementById('picker-modal').classList.remove('hidden');
        }

        function closePicker() { document.getElementById('picker-modal').classList.add('hidden'); }
        function filterPicker() {
            const val = document.getElementById('picker-search').value.toLowerCase();
            const rows = document.querySelectorAll('#picker-table-body tr');
            rows.forEach(r => r.style.display = r.innerText.toLowerCase().includes(val) ? '' : 'none');
        }

        function openModal(r) { 
            currentRoom = r; 
            selectedSellerId = null; 
            selectedPicker = {};
            document.getElementById('modal-room-name').innerText = r.name; 
            document.getElementById('label-therapist').innerText = "Pilih Therapist...";
            document.getElementById('label-service').innerText = "Pilih Layanan...";
            document.getElementById('label-seller').innerText = "Pilih Staff Penjual...";
            document.getElementById('label-product').innerText = "Cari Item...";
            
            const btnStart = document.getElementById('btn-start-massage');
            if(r.status === 'occupied') {
                btnStart.classList.add('opacity-50', 'pointer-events-none');
                btnStart.innerText = "Massage In Progress";
            } else {
                btnStart.classList.remove('opacity-50', 'pointer-events-none');
                btnStart.innerText = "Mulai Massage";
            }

            document.getElementById('pos-modal').classList.remove('hidden'); 
            fetchActiveBill(r.id);
        }

        function closeModal() { document.getElementById('pos-modal').classList.add('hidden'); }

        async function fetchActiveBill(id) {
            const { data } = await _supabase.from('transaksi_spa').select('*').eq('room_id', id).eq('status_bayar', 'pending');
            activeOrders = data || [];
            const billCont = document.getElementById('bill-items');
            billCont.innerHTML = activeOrders.map(i => `
                <div class="bg-white p-5 rounded-2xl border-2 flex justify-between items-center shadow-sm">
                    <div class="text-[10px] font-black uppercase">${i.nama_item}<br><span class="text-blue-600">${i.qty}x</span></div>
                    <div class="text-right">
                        <b class="text-sm block">Rp ${(i.harga_satuan*i.qty).toLocaleString()}</b>
                        <button onclick="deleteItem(${i.id})" class="text-[9px] text-red-500 font-bold uppercase mt-1">Hapus</button>
                    </div>
                </div>`).join('');
        }

        async function addToBill() {
            if(!selectedPicker.pName) return alert("Pilih produk!");
            if(!selectedSellerId) return alert("Pilih Penjual dulu!");
            await _supabase.from('transaksi_spa').insert([{ 
                room_id: currentRoom.id, 
                nama_item: selectedPicker.pName, 
                harga_satuan: selectedPicker.pPrice, 
                qty: parseInt(document.getElementById('input-qty').value), 
                status_bayar: 'pending', 
                outlet_name: document.getElementById('active-outlet').value, 
                therapist_id: selectedSellerId,
                commission_type: selectedPicker.comType,
                commission_value: selectedPicker.comValue
            }]);
            fetchActiveBill(currentRoom.id);
            document.getElementById('label-product').innerText = "Cari Item...";
            selectedPicker.pName = null;
        }

        async function deleteItem(id) {
            if(confirm('Hapus item ini?')) {
                await _supabase.from('transaksi_spa').delete().eq('id', id);
                fetchActiveBill(currentRoom.id);
            }
        }

        async function startSession() {
            if(!selectedPicker.tId || !selectedPicker.sName) return alert("Pilih Therapist & Layanan!");
            const end = new Date(Date.now() + selectedPicker.sDur * 60000).toISOString();
            await _supabase.from('rooms').update({ status: 'occupied', therapist_id: selectedPicker.tId, end_time: end }).eq('id', currentRoom.id);
            await _supabase.from('therapists').update({ status: 'progress', end_time: end }).eq('t_id', selectedPicker.tId);
            await _supabase.from('transaksi_spa').insert([{ 
                room_id: currentRoom.id, 
                nama_item: selectedPicker.sName, 
                harga_satuan: selectedPicker.sPrice, 
                qty: 1, 
                status_bayar: 'pending', 
                outlet_name: document.getElementById('active-outlet').value, 
                therapist_id: selectedPicker.tId,
                commission_type: selectedPicker.comType,
                commission_value: selectedPicker.comValue
            }]);
            closeModal(); init();
        }

        function openPaymentModal() { 
            if(activeOrders.length === 0) return alert("Bill kosong!"); 
            document.getElementById('payment-modal').classList.remove('hidden'); 
            calculateTotal(); 
        }
        function closePaymentModal() { document.getElementById('payment-modal').classList.add('hidden'); }

        async function calculateTotal() {
            const sub = activeOrders.reduce((a, b) => a + (b.harga_satuan * b.qty), 0);
            const discPercent = parseFloat(document.getElementById('db-discount').value) || 0;
            
            // Mengambil setting pajak secara dinamis jika ada tabel settings
            const { data: set } = await _supabase.from('settings').select('*').eq('key', 'tax_config').maybeSingle();
            const ppnPercent = set ? set.ppn : 11; 
            const servicePercent = set ? set.service : 5;

            const discountAmount = sub * (discPercent / 100);
            const afterDiscount = sub - discountAmount;
            const serviceAmount = afterDiscount * (servicePercent / 100);
            const ppnAmount = (afterDiscount + serviceAmount) * (ppnPercent / 100);
            const grandTotal = Math.round(afterDiscount + serviceAmount + ppnAmount);

            document.getElementById('p-subtotal').innerText = `Rp ${sub.toLocaleString()}`;
            document.getElementById('p-service').innerText = `Rp ${Math.round(serviceAmount).toLocaleString()}`;
            document.getElementById('p-ppn').innerText = `Rp ${Math.round(ppnAmount).toLocaleString()}`;
            document.getElementById('p-grand-total').innerText = `Rp ${grandTotal.toLocaleString()}`;
            
            return { sub, discountAmount, serviceAmount, ppnAmount, grandTotal };
        }
        
        async function processCheckout() {
            const totals = await calculateTotal();
            const pay = document.getElementById('db-payment-method').value;
            const outlet = document.getElementById('active-outlet').value;

            // Bebaskan Therapist & Room
            const { data: rData } = await _supabase.from('rooms').select('therapist_id').eq('id', currentRoom.id).single();
            if(rData && rData.therapist_id) {
                await _supabase.from('therapists').update({ status: 'standby', end_time: null }).eq('t_id', rData.therapist_id);
            }

            await _supabase.from('transaksi_spa').update({ 
                status_bayar: 'completed', 
                total_bayar: totals.grandTotal, 
                payment_method: pay, 
                checkout_at: new Date() 
            }).eq('room_id', currentRoom.id).eq('status_bayar', 'pending');

            await _supabase.from('rooms').update({ status: 'available', therapist_id: null, end_time: null }).eq('id', currentRoom.id);

            // Struk
            document.getElementById('r-outlet').innerText = outlet;
            document.getElementById('r-date').innerText = new Date().toLocaleString('id-ID');
            document.getElementById('r-items-list').innerHTML = activeOrders.map(i => `
                <div class="flex justify-between"><span>${i.nama_item} x${i.qty}</span><span>${(i.harga_satuan*i.qty).toLocaleString()}</span></div>`).join('');
            document.getElementById('r-subtotal').innerText = totals.sub.toLocaleString();
            document.getElementById('r-tax').innerText = (totals.serviceAmount + totals.ppnAmount).toLocaleString();
            document.getElementById('r-total').innerText = totals.grandTotal.toLocaleString();

            window.print();
            closePaymentModal(); closeModal(); init();
        }

        function openAttendanceModal() { document.getElementById('modal-attendance').classList.remove('hidden'); document.getElementById('staff-id-input').focus(); }
        function closeAttendanceModal() { document.getElementById('modal-attendance').classList.add('hidden'); document.getElementById('staff-id-input').value = ''; }

        async function processAbsensi() {
            const staffId = document.getElementById('staff-id-input').value;
            const { data: staff } = await _supabase.from('therapists').select('*').eq('t_id', staffId).single();
            if (staff) {
                await _supabase.from('therapists').update({ status: 'standby' }).eq('t_id', staffId);
                alert(`Absensi Berhasil: ${staff.name} Standby.`);
                closeAttendanceModal(); loadMasterData();
            } else {
                alert("ID tidak dikenal.");
            }
        }

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID'); }, 1000);
        init();
    </script>
</body>
</html>

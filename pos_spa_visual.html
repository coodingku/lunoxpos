<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUNOX POS - PREMIUM SPA SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #cbd5e1; overflow-x: hidden; }
        
        /* Room Colors */
        .room-standby { background: #2563eb; color: white; }
        .room-progress { background: #dc2626; color: white; animation: pulse-red 2s infinite; }
        .room-checkedout { background: #a855f7; color: white; }
        .room-pending { background: #eab308; color: white; }
        
        @keyframes pulse-red { 
            0% { box-shadow: 0 0 0 0px rgba(220, 38, 38, 0.4); } 
            70% { box-shadow: 0 0 0 15px rgba(220, 38, 38, 0); } 
            100% { box-shadow: 0 0 0 0px rgba(220, 38, 38, 0); } 
        }
        @media print {
            body * { visibility: hidden; }
            #thermal-receipt, #thermal-receipt * { visibility: visible; }
            #thermal-receipt { position: absolute; left: 0; top: 0; width: 58mm; display: block !important; }
        }
    </style>
</head>
<body class="min-h-screen">

    <header class="bg-white/90 backdrop-blur-md p-5 shadow-sm flex justify-between items-center sticky top-0 z-40 border-b">
        <div>
            <h1 class="text-2xl font-black italic tracking-tighter text-slate-800">LUNOX <span class="text-blue-600">POS</span></h1>
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">ADVANCED SPA SYSTEM</p>
        </div>
        <div class="flex gap-4 items-center">
            <button onclick="openAttendanceModal()" class="bg-slate-800 text-white px-5 py-2.5 rounded-2xl text-xs font-black hover:bg-black transition uppercase">Absensi</button>
            <select id="active-outlet" onchange="init()" class="bg-white border-2 border-slate-200 rounded-2xl px-4 py-2 text-xs font-black text-blue-600 outline-none cursor-pointer">
                <option value="Delta">DELTA SPA</option>
                <option value="Cabana">CABANA SPA</option>
            </select>
            <div id="clock" class="text-sm font-mono font-black bg-slate-800 text-white px-4 py-1.5 rounded-xl shadow-lg">00:00:00</div>
        </div>
    </header>

    <main class="p-8 max-w-[1600px] mx-auto">
        <div id="room-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6"></div>
    </main>

    <div id="pos-modal" class="fixed inset-0 bg-slate-900/80 hidden z-50 flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white w-full max-w-5xl rounded-[3rem] shadow-2xl overflow-hidden flex flex-col md:flex-row h-[85vh]">
            <div class="flex-1 p-10 overflow-y-auto border-r border-slate-100">
                <div class="flex justify-between items-start mb-8 text-slate-800">
                    <h2 id="modal-room-name" class="text-5xl font-black italic uppercase tracking-tighter text-blue-600">ROOM --</h2>
                    <button onclick="closeModal()" class="text-slate-300 hover:text-red-500 text-5xl transition">&times;</button>
                </div>
                <div class="space-y-6">
                    <div id="checkin-inputs" class="grid grid-cols-2 gap-4">
                        <div class="bg-slate-50 p-4 rounded-2xl border-2 border-slate-200">
                            <label class="text-[10px] font-black text-slate-400 uppercase">Nama Tamu</label>
                            <input type="text" id="input-guest-name" placeholder="Input Nama Tamu..." class="w-full bg-transparent font-bold text-slate-800 outline-none">
                        </div>
                        <div class="bg-slate-50 p-4 rounded-2xl border-2 border-slate-200">
                            <label class="text-[10px] font-black text-slate-400 uppercase">Staff / GRO</label>
                            <input type="text" id="input-gro-name" placeholder="Nama Handle Staff..." class="w-full bg-transparent font-bold text-slate-800 outline-none">
                        </div>
                    </div>

                    <div class="bg-slate-50 p-6 rounded-[2.5rem] border-2 border-dashed border-slate-200">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Therapist & Layanan</label>
                        <div class="grid grid-cols-2 gap-4 mt-2">
                            <button onclick="openPicker('therapist')" class="w-full p-5 bg-white border-2 rounded-2xl font-bold text-blue-600 text-left flex justify-between items-center">
                                <span id="label-therapist">Pilih Therapist...</span>
                                <i class="fa fa-user-plus opacity-30"></i>
                            </button>
                            <button onclick="openPicker('service')" class="w-full p-5 bg-white border-2 rounded-2xl font-bold text-slate-700 text-left flex justify-between items-center">
                                <span id="label-service">Pilih Layanan...</span>
                                <i class="fa fa-spa opacity-30"></i>
                            </button>
                        </div>
                        <div class="flex gap-3 mt-4">
                            <button id="btn-start-massage" onclick="startSession()" class="flex-[2] bg-blue-600 text-white py-5 rounded-2xl font-black uppercase italic shadow-lg hover:bg-blue-700 transition">Mulai Massage</button>
                            <button id="btn-checkout-room" onclick="checkoutKamar()" class="hidden flex-1 bg-purple-600 text-white py-5 rounded-2xl font-black uppercase italic shadow-lg hover:bg-purple-700 transition">Check Out Room</button>
                            <button id="btn-extra-time" onclick="openExtraTimeModal()" class="hidden flex-1 bg-yellow-500 text-white py-5 rounded-2xl font-black uppercase italic shadow-lg hover:bg-yellow-600 transition">+ Extra</button>
                        </div>
                    </div>

                    <div class="bg-slate-50 p-6 rounded-[2.5rem] border-2 border-dashed border-slate-200">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Tambahan Produk / F&B</label>
                        <div class="grid grid-cols-1 gap-3 mt-2">
                            <button onclick="openPicker('therapist_seller')" class="w-full p-4 bg-white border-2 rounded-2xl font-bold text-xs text-emerald-600 text-left flex justify-between items-center shadow-sm">
                                <span id="label-seller">Pilih Staff Penjual...</span>
                                <i class="fa fa-tag opacity-30"></i>
                            </button>
                            <div class="flex gap-3">
                                <button onclick="openPicker('product')" class="flex-1 p-5 bg-white border-2 rounded-2xl font-bold text-left flex justify-between items-center shadow-sm">
                                    <span id="label-product">Cari Item...</span>
                                    <i class="fa fa-search opacity-30"></i>
                                </button>
                                <input type="number" id="input-qty" value="1" min="1" class="w-20 p-5 bg-white border-2 rounded-2xl font-black text-center outline-none">
                                <button onclick="addToBill()" class="bg-emerald-500 text-white px-8 rounded-2xl font-black hover:bg-emerald-600 transition shadow-lg"><i class="fa fa-plus"></i></button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="w-full md:w-[400px] bg-slate-50 p-10 flex flex-col">
                <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-6">Current Bill</h3>
                <div id="bill-items" class="flex-1 overflow-y-auto space-y-4 pr-2"></div>
                <div class="border-t pt-6 mt-6">
                    <div class="flex justify-between items-center mb-4 px-2">
                        <span class="text-xs font-black text-slate-400 uppercase">Total Bill</span>
                        <span id="current-total-display" class="text-2xl font-black text-blue-600">Rp 0</span>
                    </div>
                    <button onclick="openPaymentModal()" class="w-full bg-slate-900 text-white py-6 rounded-[2rem] font-black uppercase tracking-widest shadow-2xl hover:bg-black transition">BAYAR SEKARANG</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ... (SB_URL, SB_KEY, _supabase, dll tetap sama) ...

        async function loadRoomMap() {
            const out = document.getElementById('active-outlet').value;
            const { data: rooms } = await _supabase.from('rooms').select('*').eq('outlet_name', out).order('name');
            const { data: trans } = await _supabase.from('transaksi_spa').select('room_id').eq('status_bayar', 'pending').eq('outlet_name', out);
            
            masterRoomsData = rooms || [];
            const grid = document.getElementById('room-grid'); 
            grid.innerHTML = '';
            
            masterRoomsData.forEach(r => {
                const hasTrans = (trans || []).some(t => t.room_id === r.id);
                let style = 'room-standby', label = 'READY';

                if (r.status === 'occupied') { style = 'room-progress'; label = 'MASSAGE'; }
                else if (r.status === 'checked_out') { style = 'room-checkedout'; label = 'CHECKOUT'; }
                else if (hasTrans) { style = 'room-pending'; label = 'BILL'; }
                
                const card = document.createElement('div');
                card.className = `${style} p-6 rounded-[2rem] text-center shadow-lg transition-all transform hover:scale-105 cursor-pointer border-4 border-white/20 flex flex-col justify-between min-h-[160px]`;
                card.onclick = () => openModal(r);
                
                // Info Tambahan Tamu & Staff jika room Occupied
                const guestInfo = r.guest_name ? `<div class="mt-2 text-[11px] font-bold border-t border-white/20 pt-2"><i class="fa fa-user mr-1"></i> ${r.guest_name.toUpperCase()}</div>` : '';
                const groInfo = r.gro_name ? `<div class="text-[9px] font-medium opacity-80 italic">Handle by: ${r.gro_name}</div>` : '';

                card.innerHTML = `
                    <div>
                        <div class="text-[9px] font-black uppercase opacity-60 mb-1 tracking-widest">${label}</div>
                        <h3 class="font-black text-2xl italic tracking-tighter">${r.name}</h3>
                    </div>
                    <div>
                        ${guestInfo}
                        ${groInfo}
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function openModal(r) { 
            currentRoom = r; 
            document.getElementById('modal-room-name').innerText = r.name; 
            
            // Set input value jika sudah ada data tersimpan (Occupied)
            document.getElementById('input-guest-name').value = r.guest_name || '';
            document.getElementById('input-gro-name').value = r.gro_name || '';

            const isOcc = (r.status === 'occupied');
            document.getElementById('btn-start-massage').classList.toggle('hidden', isOcc || r.status === 'checked_out');
            document.getElementById('btn-checkout-room').classList.toggle('hidden', !isOcc);
            document.getElementById('btn-extra-time').classList.toggle('hidden', !isOcc);
            
            // Disable input jika sudah jalan sesinya
            document.getElementById('input-guest-name').disabled = isOcc;
            document.getElementById('input-gro-name').disabled = isOcc;

            document.getElementById('pos-modal').classList.remove('hidden'); 
            fetchActiveBill(r.id);
        }

        async function startSession() {
            const guestName = document.getElementById('input-guest-name').value;
            const groName = document.getElementById('input-gro-name').value;

            if(!selectedPicker.tId || !selectedPicker.sName) return alert("Pilih Therapist & Layanan!");
            if(!guestName) return alert("Isi Nama Tamu!");

            const end = new Date(Date.now() + selectedPicker.sDur * 60000).toISOString();
            
            // Update Rooms dengan Guest & GRO
            await _supabase.from('rooms').update({ 
                status: 'occupied', 
                therapist_id: selectedPicker.tId, 
                end_time: end,
                guest_name: guestName,
                gro_name: groName
            }).eq('id', currentRoom.id);

            await _supabase.from('therapists').update({ status: 'progress', end_time: end }).eq('t_id', selectedPicker.tId);
            
            await _supabase.from('transaksi_spa').insert([{ 
                room_id: currentRoom.id, nama_item: selectedPicker.sName, harga_satuan: selectedPicker.sPrice, qty: 1, 
                status_bayar: 'pending', outlet_name: document.getElementById('active-outlet').value, therapist_id: selectedPicker.tId,
                guest_name: guestName // simpan juga di transaksi jika perlu
            }]);
            
            closeModal(); init();
        }

        async function processCheckout() {
            const totals = await calculateTotal();
            const payMethod = document.getElementById('db-payment-method').value;
            
            // Finalisasi Room & Bill (Reset Guest & GRO)
            await _supabase.from('transaksi_spa').update({ 
                status_bayar: 'completed', total_bayar: totals.grand, payment_method: payMethod, checkout_at: new Date() 
            }).eq('room_id', currentRoom.id).eq('status_bayar', 'pending');

            await _supabase.from('rooms').update({ 
                status: 'available', therapist_id: null, end_time: null, 
                guest_name: null, gro_name: null 
            }).eq('id', currentRoom.id);

            // ... (Rest of checkout logic / print) ...
            location.reload();
        }

        // ... (Fungsi lainnya tetap sama) ...
    </script>
</body>
</html>

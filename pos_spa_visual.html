<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUNOX POS - SMART ATTENDANCE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .room-available { background: #eff6ff; border: 2px solid #3b82f6; color: #1e40af; }
        .room-pending { background: #fefce8; border: 2px solid #eab308; color: #854d0e; animation: pulse-yellow 2s infinite; }
        .room-occupied { background: #fff1f2; border: 2px solid #ef4444; color: #991b1b; }
        @keyframes pulse-yellow { 0% { box-shadow: 0 0 0 0px rgba(234, 179, 8, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(234, 179, 8, 0); } 100% { box-shadow: 0 0 0 0px rgba(234, 179, 8, 0); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <header class="bg-white p-5 shadow-sm flex justify-between items-center border-b sticky top-0 z-40">
        <div>
            <h1 class="text-2xl font-black italic tracking-tighter text-slate-800">LUNOX <span class="text-blue-600">POS</span></h1>
            <p id="outlet-display" class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Loading...</p>
        </div>
        <div class="flex gap-4 items-center">
            <button onclick="openAttendanceModal()" class="bg-slate-800 text-white px-4 py-2 rounded-xl text-xs font-black hover:bg-black transition flex items-center gap-2">
                <i class="fa fa-fingerprint"></i> ABSENSI MANUAL
            </button>
            <select id="active-outlet" onchange="loadRoomMap()" class="bg-slate-100 rounded-xl px-4 py-2 text-xs font-black text-blue-600 outline-none">
                <option value="Delta">DELTA SPA</option>
                <option value="Cabana">CABANA SPA</option>
            </select>
            <div id="clock" class="text-sm font-mono font-black bg-blue-600 text-white px-3 py-1 rounded-lg">00:00:00</div>
        </div>
    </header>

    <main class="p-6">
        <div id="room-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6"></div>
    </main>

    <div id="modal-attendance" class="fixed inset-0 bg-black/80 hidden z-[60] flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-black uppercase text-slate-800">Staff Check-in</h2>
                <button onclick="closeAttendanceModal()" class="text-slate-300 hover:text-red-500 text-3xl">&times;</button>
            </div>
            
            <div id="id-input-section" class="space-y-4">
                <p class="text-xs font-bold text-slate-500 uppercase tracking-widest">Masukkan ID Therapist</p>
                <div class="relative">
                    <input type="text" id="manual-tid" placeholder="Contoh: T001" 
                           class="w-full p-5 bg-slate-100 rounded-2xl border-2 border-transparent focus:border-blue-500 focus:bg-white font-black text-2xl uppercase outline-none transition-all">
                </div>
                <button onclick="searchTherapist()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black uppercase shadow-lg hover:bg-blue-700">Cek ID Therapist</button>
            </div>

            <div id="staff-info-section" class="hidden space-y-6 mt-4 pt-6 border-t border-dashed border-slate-200">
                <div class="bg-blue-50 p-6 rounded-3xl text-center">
                    <p class="text-[10px] font-black text-blue-400 uppercase tracking-widest">Therapist Ditemukan</p>
                    <h3 id="found-name" class="text-2xl font-black text-slate-800 uppercase mt-1">---</h3>
                    <p id="found-id" class="text-sm font-bold text-blue-600 italic">---</p>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="updateAbsensi('standby')" class="bg-emerald-500 text-white py-5 rounded-3xl font-black uppercase text-xs shadow-lg hover:bg-emerald-600">Absen Masuk</button>
                    <button onclick="updateAbsensi('offline')" class="bg-slate-200 text-slate-600 py-5 rounded-3xl font-black uppercase text-xs hover:bg-red-500 hover:text-white">Absen Pulang</button>
                </div>
            </div>
        </div>
    </div>

    <div id="pos-modal" class="fixed inset-0 bg-slate-900/60 hidden z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-5xl rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col md:flex-row h-[85vh]">
            <div class="flex-1 p-8 overflow-y-auto border-r">
                <div class="flex justify-between items-start mb-8">
                    <div><h2 id="modal-room-name" class="text-4xl font-black italic uppercase text-slate-800 tracking-tighter">ROOM --</h2><div id="room-status-tag" class="mt-2 text-[10px] font-black uppercase px-3 py-1 rounded-full inline-block">STATUS</div></div>
                    <button onclick="closeModal()" class="text-slate-300 hover:text-red-500 text-4xl">&times;</button>
                </div>
                <div id="form-massage" class="space-y-6 mb-10">
                    <h3 class="text-xs font-black text-blue-600 uppercase tracking-widest border-b pb-2">Mulai Treatment</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <select id="input-therapist" class="p-4 bg-slate-50 rounded-2xl border font-bold text-blue-600 outline-none"></select>
                        <select id="input-service" class="p-4 bg-slate-50 rounded-2xl border font-bold outline-none">
                            <option value="Trad. Massage" data-price="250000" data-dur="60">Trad. Massage (60m) - 250k</option>
                            <option value="Shiatsu" data-price="350000" data-dur="90">Shiatsu (90m) - 350k</option>
                            <option value="Royal Spa" data-price="500000" data-dur="120">Royal Spa (120m) - 500k</option>
                        </select>
                    </div>
                    <button onclick="startSession()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black uppercase italic shadow-lg">Mulai Sesi</button>
                </div>
                <div class="space-y-4">
                    <h3 class="text-xs font-black text-emerald-600 uppercase tracking-widest border-b pb-2">Tambah FnB</h3>
                    <div class="flex gap-2">
                        <select id="input-product" class="flex-1 p-4 bg-slate-50 rounded-2xl border font-bold outline-none"></select>
                        <input type="number" id="input-qty" value="1" min="1" class="w-20 p-4 bg-slate-50 rounded-2xl border font-bold text-center">
                        <button onclick="addToBill()" class="bg-emerald-500 text-white px-8 rounded-2xl font-black"><i class="fa fa-plus"></i></button>
                    </div>
                </div>
            </div>
            <div class="w-full md:w-96 bg-slate-50 p-8 flex flex-col">
                <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-6">Rincian Bill</h3>
                <div id="bill-items" class="flex-1 overflow-y-auto space-y-3"></div>
                <div class="border-t pt-6 mt-6">
                    <div class="flex justify-between items-center mb-6"><span class="text-xs font-black text-slate-400 uppercase">Total Tagihan</span><span id="bill-total" class="text-2xl font-black text-blue-600">Rp 0</span></div>
                    <button onclick="checkout()" class="w-full bg-slate-900 text-white py-5 rounded-3xl font-black uppercase shadow-xl">Checkout & Print</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = "https://mbzoydcehhvjdqfefflo.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1iem95ZGNlaGh2amRxZmVmZmxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NzYzNjcsImV4cCI6MjA4ODQ1MjM2N30.q5Ok1HJEeUIh-93KoXuH0zYqRN4i3LcweRMG9pWJkRg";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let currentRoom = null;
        let activeOrders = [];
        let selectedStaffId = null;

        // LOAD ROOM GRID
        async function loadRoomMap() {
            const outlet = document.getElementById('active-outlet').value;
            document.getElementById('outlet-display').innerText = `${outlet} Floor Map`;
            const { data: rooms } = await _supabase.from('rooms').select('*').eq('outlet_name', outlet).order('name');
            const { data: pendingTrans } = await _supabase.from('transaksi_spa').select('room_id').eq('status_bayar', 'pending').eq('outlet_name', outlet);
            const grid = document.getElementById('room-grid');
            grid.innerHTML = '';
            rooms.forEach(room => {
                const hasTransaction = pendingTrans.some(t => t.room_id === room.id);
                const isMassageActive = room.status === 'occupied';
                let statusClass = isMassageActive ? 'room-occupied' : (hasTransaction ? 'room-pending' : 'room-available');
                let statusText = isMassageActive ? 'Massage' : (hasTransaction ? 'Bill Active' : 'Standby');
                const card = document.createElement('div');
                card.className = `${statusClass} p-6 rounded-[2.5rem] shadow-sm cursor-pointer hover:scale-105 transition-all text-center min-h-[150px] flex flex-col items-center justify-center`;
                card.onclick = () => openModal(room);
                card.innerHTML = `<div class="text-[9px] font-black uppercase opacity-60">${statusText}</div><h3 class="font-black text-2xl italic">${room.name}</h3>`;
                grid.appendChild(card);
            });
            loadMasterData();
        }

        async function loadMasterData() {
            const outlet = document.getElementById('active-outlet').value;
            const { data: tps } = await _supabase.from('therapists').select('*').eq('outlet_name', outlet).eq('status', 'standby');
            document.getElementById('input-therapist').innerHTML = tps.map(t => `<option value="${t.t_id}">${t.t_id} - ${t.name}</option>`).join('');
            const { data: p } = await _supabase.from('produk').select('*').eq('outlet_name', outlet);
            document.getElementById('input-product').innerHTML = p.map(i => `<option value="${i.id}" data-nama="${i.nama_produk}" data-harga="${i.harga}">${i.nama_produk} - ${i.harga.toLocaleString()}</option>`).join('');
        }

        // --- FITUR SEARCH THERAPIST MANUAL ---
        async function searchTherapist() {
            const tid = document.getElementById('manual-tid').value.trim().toUpperCase();
            const outlet = document.getElementById('active-outlet').value;
            
            if(!tid) return alert("Masukkan ID!");

            const { data, error } = await _supabase
                .from('therapists')
                .select('*')
                .eq('t_id', tid)
                .eq('outlet_name', outlet)
                .single();

            if (data) {
                // Tampilkan info staff
                selectedStaffId = tid;
                document.getElementById('found-name').innerText = data.name;
                document.getElementById('found-id').innerText = `ID: ${data.t_id} | Status Saat Ini: ${data.status.toUpperCase()}`;
                document.getElementById('staff-info-section').classList.remove('hidden');
                document.getElementById('id-input-section').classList.add('opacity-40');
            } else {
                alert("ID Therapist Tidak Terdaftar!");
                document.getElementById('staff-info-section').classList.add('hidden');
            }
        }

        async function updateAbsensi(newStatus) {
            if(!selectedStaffId) return;
            const { error } = await _supabase.from('therapists').update({ status: newStatus }).eq('t_id', selectedStaffId);
            if(!error) {
                alert(`Berhasil! Therapist ${selectedStaffId} sekarang ${newStatus}`);
                closeAttendanceModal();
                loadRoomMap();
            }
        }

        // START & CHECKOUT (Sama seperti sebelumnya)
        async function startSession() {
            const tid = document.getElementById('input-therapist').value;
            const s = document.getElementById('input-service');
            const opt = s.options[s.selectedIndex];
            const finish = new Date(new Date().getTime() + parseInt(opt.dataset.dur) * 60000).toISOString();
            await _supabase.from('rooms').update({ status: 'occupied', therapist_id: tid, end_time: finish }).eq('id', currentRoom.id);
            await _supabase.from('therapists').update({ status: 'progress', end_time: finish }).eq('t_id', tid);
            await _supabase.from('transaksi_spa').insert([{ room_id: currentRoom.id, nama_item: `MASSAGE: ${opt.value}`, harga_satuan: parseInt(opt.dataset.price), qty: 1, status_bayar: 'pending', outlet_name: document.getElementById('active-outlet').value, therapist_id: tid }]);
            closeModal();
            loadRoomMap();
        }

        async function checkout() {
            const { data: roomData } = await _supabase.from('rooms').select('therapist_id').eq('id', currentRoom.id).single();
            await _supabase.from('transaksi_spa').update({ status_bayar: 'completed' }).eq('room_id', currentRoom.id).eq('status_bayar', 'pending');
            if(roomData.therapist_id) await _supabase.from('therapists').update({ status: 'standby', end_time: null }).eq('t_id', roomData.therapist_id);
            await _supabase.from('rooms').update({ status: 'available', therapist_id: null, end_time: null }).eq('id', currentRoom.id);
            alert("Checkout Berhasil!"); closeModal(); loadRoomMap();
        }

        // UI HELPERS
        function openAttendanceModal() { 
            document.getElementById('modal-attendance').classList.remove('hidden');
            document.getElementById('manual-tid').value = "";
            document.getElementById('staff-info-section').classList.add('hidden');
            document.getElementById('id-input-section').classList.remove('opacity-40');
        }
        function closeAttendanceModal() { document.getElementById('modal-attendance').classList.add('hidden'); }
        function openModal(room) { currentRoom = room; document.getElementById('modal-room-name').innerText = room.name; document.getElementById('pos-modal').classList.remove('hidden'); fetchActiveBill(room.id); document.getElementById('form-massage').classList.toggle('hidden', room.status === 'occupied'); }
        function closeModal() { document.getElementById('pos-modal').classList.add('hidden'); }
        async function fetchActiveBill(roomId) {
            const { data } = await _supabase.from('transaksi_spa').select('*').eq('room_id', roomId).eq('status_bayar', 'pending');
            activeOrders = data || [];
            let total = 0;
            document.getElementById('bill-items').innerHTML = activeOrders.map(i => { total += (i.harga_satuan * i.qty); return `<div class="bg-white p-4 rounded-2xl border text-xs flex justify-between"><div><b>${i.nama_item}</b><br>${i.qty}x</div><b>Rp ${(i.harga_satuan*i.qty).toLocaleString()}</b></div>`; }).join('');
            document.getElementById('bill-total').innerText = `Rp ${total.toLocaleString()}`;
        }
        async function addToBill() {
            const p = document.getElementById('input-product'); const opt = p.options[p.selectedIndex];
            await _supabase.from('transaksi_spa').insert([{ room_id: currentRoom.id, nama_item: opt.dataset.nama, harga_satuan: parseInt(opt.dataset.harga), qty: parseInt(document.getElementById('input-qty').value), status_bayar: 'pending', outlet_name: document.getElementById('active-outlet').value }]);
            fetchActiveBill(currentRoom.id); loadRoomMap();
        }

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID'); }, 1000);
        loadRoomMap();
        _supabase.channel('pos_realtime').on('postgres_changes', { event: '*', schema: 'public' }, loadRoomMap).subscribe();
    </script>
</body>
</html>

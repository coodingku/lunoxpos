<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUNOX POS - PREMIUM SPA SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #cbd5e1; overflow-x: hidden; }
        .room-standby { background: #2563eb; color: white; }
        .room-progress { background: #dc2626; color: white; animation: pulse-red 2s infinite; }
        .room-pending { background: #eab308; color: white; }
        @keyframes pulse-red { 
            0% { box-shadow: 0 0 0 0px rgba(220, 38, 38, 0.4); } 
            70% { box-shadow: 0 0 0 15px rgba(220, 38, 38, 0); } 
            100% { box-shadow: 0 0 0 0px rgba(220, 38, 38, 0); } 
        }
        @media print {
            body * { visibility: hidden; }
            #thermal-receipt, #thermal-receipt * { visibility: visible; }
            #thermal-receipt { position: absolute; left: 0; top: 0; width: 58mm; display: block !important; }
        }
    </style>
</head>
<body class="min-h-screen">

    <header class="bg-white/90 backdrop-blur-md p-5 shadow-sm flex justify-between items-center sticky top-0 z-40 border-b">
        <div>
            <h1 class="text-2xl font-black italic tracking-tighter text-slate-800">LUNOX <span class="text-blue-600">POS</span></h1>
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">ADVANCED SPA SYSTEM</p>
        </div>
        <div class="flex gap-4 items-center">

            <select id="active-outlet" onchange="init()" class="bg-white border-2 border-slate-200 rounded-2xl px-4 py-2 text-xs font-black text-blue-600 outline-none cursor-pointer">
                <option value="Delta">DELTA SPA</option>
                <option value="Cabana">CABANA SPA</option>
            </select>
            <div id="clock" class="text-sm font-mono font-black bg-slate-800 text-white px-4 py-1.5 rounded-xl shadow-lg">00:00:00</div>
        </div>
    </header>

    <main class="p-8 max-w-[1600px] mx-auto">
        <div id="room-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6"></div>
    </main>

    <div id="pos-modal" class="fixed inset-0 bg-slate-900/80 hidden z-50 flex items-center justify-center p-4 backdrop-blur-md">

            <div class="flex-1 p-10 overflow-y-auto border-r border-slate-100">

                        <h2 id="modal-room-name" class="text-5xl font-black italic uppercase tracking-tighter text-blue-600">ROOM --</h2>
                        <span id="room-status-badge" class="text-[10px] font-bold bg-blue-100 text-blue-600 px-3 py-1 rounded-full uppercase">Ready</span>

            <div class="flex justify-between"><span>TOTAL</span><span id="r-total"></span></div>
        </div>

    <script>
        const SB_URL = "https://mbzoydcehhvjdqfefflo.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1iem95ZGNlaGh2amRxZmVmZmxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NzYzNjcsImV4cCI6MjA4ODQ1MjM2N30.q5Ok1HJEeUIh-93KoXuH0zYqRN4i3LcweRMG9pWJkRg";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let currentRoom = null, activeOrders = [], masterRoomsData = [];
        let masterAllStaff = [], masterServices = [], masterProducts = [];
        let selectedPicker = {}, selectedSellerId = null, selectedGroName = null;

        async function init() {
            await fetchSettings();
            await loadMasterData();
            loadRoomMap();
        }

        async function fetchSettings() {
            const { data: ds } = await _supabase.from('discounts').select('*').eq('active', true);
            if(ds) document.getElementById('db-discount').innerHTML = '<option value="0">0%</option>' + ds.map(d => `<option value="${d.value}">${d.name} (${d.value}%)</option>`).join('');
            const { data: bk } = await _supabase.from('banks').select('*').eq('is_active', true);
            if(bk) document.getElementById('db-payment-method').innerHTML = '<option value="CASH">CASH</option>' + bk.map(b => `<option value="${b.name}">${b.name}</option>`).join('');
        }

       // 1. Pastikan pengambilan data master lebih luas
async function loadMasterData() {
    const out = document.getElementById('active-outlet').value;
    
    // Ambil SEMUA staff di outlet tersebut tanpa filter kategori dulu di query
    const { data: staff, error: staffError } = await _supabase
        .from('therapists')
        .select('*')
        .eq('outlet_name', out);

    if (staffError) console.error("Error loading staff:", staffError);
    masterAllStaff = staff || [];

    const { data: svc } = await _supabase.from('services').select('*').eq('outlet_name', out);
    masterServices = svc || [];
    
    const { data: pd } = await _supabase.from('produk').select('*').eq('outlet_name', out);
    masterProducts = pd || [];
}


        async function loadRoomMap() {
            const out = document.getElementById('active-outlet').value;
            const { data: rooms } = await _supabase.from('rooms').select('*').eq('outlet_name', out).order('name');
            const { data: activeTrans } = await _supabase.from('transaksi_spa').select('room_id, guest_name').eq('status_bayar', 'pending').eq('outlet_name', out);
            
            const grid = document.getElementById('room-grid'); grid.innerHTML = '';
            rooms.forEach(r => {
                const session = activeTrans?.find(t => t.room_id === r.id);
                const isOcc = r.status === 'occupied';
                let style = isOcc ? 'room-progress' : (session ? 'room-pending' : 'room-standby');
                
                const card = document.createElement('div');
                card.className = `${style} p-6 rounded-[2.5rem] shadow-lg transition-all cursor-pointer min-h-[170px] flex flex-col justify-between`;
                card.onclick = () => openModal(r, session);
                card.innerHTML = `
                    <div>
                        <div class="text-[9px] font-black uppercase opacity-60 tracking-widest">${isOcc ? 'MASSAGE' : (session ? 'PENDING' : 'READY')}</div>
                        <h3 class="font-black text-3xl italic tracking-tighter">${r.name}</h3>
                    </div>
                    ${session ? `<div class="text-[10px] font-black uppercase truncate border-t border-white/20 pt-2"><i class="fa fa-user mr-1"></i> ${session.guest_name}</div>` : ''}
                `;
                grid.appendChild(card);
            });
        }

        function openModal(r, session) { 
            currentRoom = r; selectedPicker = {};
            document.getElementById('modal-room-name').innerText = r.name;
            document.getElementById('input-guest-name').value = session?.guest_name || '';
            
            // UI Reset
            const isOcc = r.status === 'occupied';
            document.getElementById('room-status-badge').innerText = isOcc ? "Massage Progress" : "Available";
            document.getElementById('btn-start-massage').style.display = isOcc ? 'none' : 'block';
            document.getElementById('btn-extra-time').style.display = isOcc ? 'block' : 'none';

            document.getElementById('pos-modal').classList.remove('hidden'); 
            fetchActiveBill(r.id);
        }

        async function fetchActiveBill(id) {
            const { data } = await _supabase.from('transaksi_spa').select('*').eq('room_id', id).eq('status_bayar', 'pending');
            activeOrders = data || [];
            let total = 0;
            document.getElementById('bill-items').innerHTML = activeOrders.map(i => {
                total += (i.harga_satuan * i.qty);
                return `<div class="bg-white p-5 rounded-3xl border-2 flex justify-between items-center">
                    <div class="text-[10px] font-black uppercase">${i.nama_item}<br><span class="text-blue-600">${i.qty}x</span></div>
                    <div class="text-right">
                        <b class="text-sm block">Rp ${(i.harga_satuan*i.qty).toLocaleString()}</b>
                        <button onclick="reqDelete(${i.id})" class="text-[9px] text-red-500 font-bold uppercase mt-1">Hapus</button>
                    </div>
                </div>`}).join('');
            document.getElementById('bill-total-display').innerText = `Rp ${total.toLocaleString()}`;
        }

       // 2. Perbaikan Filter di OpenPicker (Case Insensitive)
function openPicker(type) {
    selectedPicker.type = type;
    const body = document.getElementById('picker-table-body'); 
    body.innerHTML = '';
    let data = [];

    if(type === 'gro') {
        // Filter: Semua yang kategorinya BUKAN 'Therapist' (Abaikan huruf besar/kecil)
        data = masterAllStaff.filter(s => 
            s.category && s.category.toLowerCase() !== 'therapist'
        );
    } else if(type === 'therapist' || type === 'therapist_seller' || type === 'extra_therapist') {
        // Filter: Hanya yang kategorinya 'Therapist'
        data = masterAllStaff.filter(s => 
            s.category && s.category.toLowerCase() === 'therapist'
        );
        
        // Tambahan: Jika untuk 'therapist' utama, tampilkan hanya yang 'standby'
        if(type === 'therapist') {
            data = data.filter(s => s.status === 'standby');
        }
    } else if(type === 'service' || type === 'extra_service') {
        data = masterServices;
    } else {
        data = masterProducts;
    }

    if (data.length === 0) {
        body.innerHTML = `<tr><td colspan="2" class="p-10 text-center text-slate-400 italic">Data tidak ditemukan...</td></tr>`;
    }

    data.forEach(item => {
        const tr = document.createElement('tr');
        tr.className = "border-b hover:bg-blue-50 cursor-pointer";
        tr.onclick = () => {
            const name = item.name || item.nama_produk;
            const price = item.price || item.harga || 0;

            if(type === 'gro') { selectedGroName = name; document.getElementById('label-gro').innerText = name; }
            if(type === 'therapist') { selectedPicker.tId = item.t_id; document.getElementById('label-therapist').innerText = name; }
            if(type === 'therapist_seller') { selectedSellerId = item.t_id; document.getElementById('label-seller').innerText = "Oleh: " + name; }
            if(type === 'service') { 
                selectedPicker.sName = name; selectedPicker.sPrice = price; selectedPicker.sDur = item.dur || 60; 
                document.getElementById('label-service').innerText = name; 
            }
            if(type === 'product') { 
                selectedPicker.pName = name; selectedPicker.pPrice = price; 
                document.getElementById('label-product').innerText = name; 
            }
            if(type === 'extra_service') {
                selectedPicker.exSvc = name; selectedPicker.exPrice = price;
                openPicker('extra_therapist'); return; 
            }
            if(type === 'extra_therapist') {
                addExtraToBill(item.t_id, name);
            }
            closePicker();
        };
        tr.innerHTML = `<td class="p-5 uppercase">${item.name || item.nama_produk}</td><td class="p-5 text-right font-black">${(item.price || item.harga || 0).toLocaleString()}</td>`;
        body.appendChild(tr);
    });
    
    document.getElementById('picker-title').innerText = type.replace('_',' ').toUpperCase();
    document.getElementById('picker-modal').classList.remove('hidden');
}

        async function startSession() {
            if(!selectedPicker.tId || !selectedPicker.sName || !selectedGroName) return alert("Data Belum Lengkap!");
            const endTime = new Date(Date.now() + selectedPicker.sDur * 60000).toISOString();
            
            await _supabase.from('rooms').update({ status: 'occupied', therapist_id: selectedPicker.tId, end_time: endTime }).eq('id', currentRoom.id);
            await _supabase.from('therapists').update({ status: 'progress', end_time: endTime }).eq('t_id', selectedPicker.tId);
            await _supabase.from('transaksi_spa').insert([{ 
                room_id: currentRoom.id, nama_item: selectedPicker.sName, harga_satuan: selectedPicker.sPrice, qty: 1, 
                status_bayar: 'pending', outlet_name: document.getElementById('active-outlet').value, 
                therapist_id: selectedPicker.tId, guest_name: document.getElementById('input-guest-name').value, staff_handle_id: selectedGroName
            }]);
            closeModal(); init();
        }

        async function addToBill() {
            if(!selectedPicker.pName || !selectedSellerId) return alert("Pilih Produk & Penjual!");
            const out = document.getElementById('active-outlet').value;
            const payload = { 
                room_id: currentRoom.id, nama_item: selectedPicker.pName, harga_satuan: selectedPicker.pPrice, 
                qty: parseInt(document.getElementById('input-qty').value), status_bayar: 'pending', 
                outlet_name: out, therapist_id: selectedSellerId, guest_name: document.getElementById('input-guest-name').value,
                staff_handle_id: selectedGroName
            };
            await _supabase.from('transaksi_spa').insert([payload]);
            
            // Print Otomatis Produk
            printSingleItem(payload.nama_item, payload.qty);
            fetchActiveBill(currentRoom.id);
        }

        async function addExtraToBill(tId, tName) {
            const payload = { 
                room_id: currentRoom.id, nama_item: `[EXTRA] ${selectedPicker.exSvc}`, harga_satuan: selectedPicker.exPrice, 
                qty: 1, status_bayar: 'pending', outlet_name: document.getElementById('active-outlet').value, 
                therapist_id: tId, guest_name: document.getElementById('input-guest-name').value, staff_handle_id: selectedGroName
            };
            await _supabase.from('transaksi_spa').insert([payload]);
            fetchActiveBill(currentRoom.id);
        }

        function printSingleItem(name, qty) {
            document.getElementById('r-outlet').innerText = document.getElementById('active-outlet').value;
            document.getElementById('r-info').innerText = `ORDER: ${new Date().toLocaleTimeString()}\nROOM: ${currentRoom.name}`;
            document.getElementById('r-items-list').innerHTML = `<div class="flex justify-between"><span>${name}</span><span>x${qty}</span></div>`;
            document.getElementById('r-total').innerText = "NEW ORDER";
            window.print();
        }

        function reqDelete(id) {
            document.getElementById('access-title').innerText = "Hapus Item";
            document.getElementById('modal-access').classList.remove('hidden');
            document.getElementById('access-pin').focus();
            document.getElementById('btn-access-confirm').onclick = async () => {
                const pin = document.getElementById('access-pin').value;
                const { data } = await _supabase.from('therapists').select('*').eq('t_id', pin).single();
                if(data) {
                    await _supabase.from('transaksi_spa').delete().eq('id', id);
                    closeAccessModal(); fetchActiveBill(currentRoom.id);
                } else { alert("PIN SALAH!"); }
            };
        }

        async function checkoutRoom() {
            if(!confirm("Kosongkan Room & Set Therapist ke Standby?")) return;
            const { data: r } = await _supabase.from('rooms').select('therapist_id').eq('id', currentRoom.id).single();
            if(r?.therapist_id) await _supabase.from('therapists').update({ status: 'standby', end_time: null }).eq('t_id', r.therapist_id);
            await _supabase.from('rooms').update({ status: 'available', therapist_id: null, end_time: null }).eq('id', currentRoom.id);
            closeModal(); init();
        }

        function openAttendanceModal() {
            document.getElementById('access-title').innerText = "Staff Attendance";
            document.getElementById('modal-access').classList.remove('hidden');
            document.getElementById('btn-access-confirm').onclick = async () => {
                const pin = document.getElementById('access-pin').value;
                const { data } = await _supabase.from('therapists').update({ status: 'standby' }).eq('t_id', pin).select();
                if(data.length) { alert("Absensi Berhasil!"); closeAccessModal(); loadMasterData(); }
                else { alert("ID Tidak Ditemukan!"); }
            };
        }

        function calculateFinalTotal() {
            const sub = activeOrders.reduce((a, b) => a + (b.harga_satuan * b.qty), 0);
            const disc = parseInt(document.getElementById('db-discount').value);
            const total = sub - (sub * disc / 100);
            document.getElementById('p-subtotal').innerText = `Rp ${sub.toLocaleString()}`;
            document.getElementById('p-grand-total').innerText = `Rp ${total.toLocaleString()}`;
            return total;
        }

        async function processFinalPayment() {
            const final = calculateFinalTotal();
            const payMethod = document.getElementById('db-payment-method').value;
            await _supabase.from('transaksi_spa').update({ 
                status_bayar: 'completed', 
                total_bayar: final, 
                payment_method: payMethod,
                checkout_at: new Date() 
            }).eq('room_id', currentRoom.id).eq('status_bayar', 'pending');
            
            alert("Pembayaran Berhasil!");
            closePaymentModal(); closeModal(); init();
        }

        // Helpers
        function closePicker() { document.getElementById('picker-modal').classList.add('hidden'); }
        function closeModal() { document.getElementById('pos-modal').classList.add('hidden'); }
        function openPaymentModal() { if(!activeOrders.length) return; document.getElementById('payment-modal').classList.remove('hidden'); calculateFinalTotal(); }
        function closePaymentModal() { document.getElementById('payment-modal').classList.add('hidden'); }
        function closeAccessModal() { document.getElementById('modal-access').classList.add('hidden'); document.getElementById('access-pin').value = ''; }
        function filterPicker() {
            const val = document.getElementById('picker-search').value.toLowerCase();
            document.querySelectorAll('#picker-table-body tr').forEach(r => r.style.display = r.innerText.toLowerCase().includes(val) ? '' : 'none');
        }

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID'); }, 1000);
        init();
    </script>
</body>
</html>

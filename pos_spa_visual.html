<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUNOX POS - PREMIUM SPA SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; }
        .room-standby { background: #2563eb; color: white; }
        .room-progress { background: #ef4444; color: white; }
        .room-warning { background: #facc15; color: #854d0e; animation: blink 1s infinite; }
        .room-overtime { background: #000000; color: #ff0000; }
        .room-checkedout { background: #a855f7; color: white; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        
        /* Hide scrollbar for clean UI */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen">

    <header class="bg-white/90 backdrop-blur-md p-5 shadow-sm flex justify-between items-center sticky top-0 z-40 border-b">
        <div>
            <h1 class="text-2xl font-black italic tracking-tighter text-slate-800">LUNOX <span class="text-blue-600">POS</span></h1>
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">ADVANCED SPA SYSTEM</p>
        </div>
        <div class="flex gap-4 items-center">
            <select id="active-outlet" onchange="init()" class="bg-white border-2 border-slate-200 rounded-2xl px-4 py-2 text-xs font-black text-blue-600 outline-none">
                <option value="Delta">DELTA SPA</option>
                <option value="Cabana">CABANA SPA</option>
            </select>
            <div id="clock" class="text-sm font-mono font-black bg-slate-800 text-white px-4 py-1.5 rounded-xl shadow-lg">00:00:00</div>
        </div>
    </header>

    <main class="p-8 max-w-[1600px] mx-auto">
        <div id="room-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6"></div>
    </main>

    <div id="pos-modal" class="fixed inset-0 bg-slate-900/80 hidden z-50 flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white w-full max-w-6xl rounded-[3rem] shadow-2xl overflow-hidden flex flex-col md:flex-row h-[90vh]">
            <div class="flex-1 p-10 overflow-y-auto border-r border-slate-100">
                <div class="flex justify-between items-start mb-8 text-slate-800">
                    <h2 id="modal-room-name" class="text-5xl font-black italic uppercase tracking-tighter text-blue-600">ROOM --</h2>
                    <button onclick="closeModal()" class="text-slate-300 hover:text-red-500 text-5xl transition">&times;</button>
                </div>
                
                <div class="space-y-6">
                    <div class="bg-blue-50 p-6 rounded-[2.5rem] border-2 border-blue-200">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <input type="text" id="input-guest-name" placeholder="NAMA TAMU..." class="w-full p-4 rounded-2xl border-2 font-bold outline-none uppercase">
                            <button onclick="openPicker('staff_handle')" class="p-4 bg-white border-2 rounded-2xl font-bold text-blue-600 text-left flex justify-between items-center">
                                <span id="label-staff-handle">Staff Handle...</span>
                                <i class="fa fa-user-tie opacity-30"></i>
                            </button>
                        </div>
                    </div>

                    <div class="bg-slate-50 p-6 rounded-[2.5rem] border-2 border-slate-200">
                        <div class="grid grid-cols-2 gap-4">
                            <button onclick="openPicker('therapist')" class="p-5 bg-white border-2 rounded-2xl font-bold text-blue-600 text-left flex justify-between items-center">
                                <span id="label-therapist">Pilih Therapist...</span>
                                <i class="fa fa-user-plus opacity-30"></i>
                            </button>
                            <button onclick="openPicker('service')" class="p-5 bg-white border-2 rounded-2xl font-bold text-slate-700 text-left flex justify-between items-center">
                                <span id="label-service">Pilih Layanan...</span>
                                <i class="fa fa-spa opacity-30"></i>
                            </button>
                        </div>
                        <div class="mt-4 flex gap-4">
                            <button id="btn-start-massage" onclick="startSession()" class="flex-1 bg-blue-600 text-white py-5 rounded-2xl font-black uppercase italic shadow-lg">Mulai Massage</button>
                            <button id="btn-checkout-room" onclick="checkoutRoom()" class="hidden flex-1 bg-purple-600 text-white py-5 rounded-2xl font-black uppercase italic shadow-lg">Checkout Room</button>
                            <button id="btn-extra-time" onclick="openExtraTimeModal()" class="hidden bg-yellow-500 text-white px-8 rounded-2xl font-black uppercase italic shadow-lg">+ Extra Time</button>
                        </div>
                    </div>

                    <div class="bg-slate-50 p-6 rounded-[2.5rem] border-2 border-dashed border-slate-200">
                        <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Produk / F&B (Auto-Print)</label>
                        <div class="grid grid-cols-1 gap-3 mt-2">
                             <button onclick="openPicker('therapist_seller')" class="w-full p-4 bg-white border-2 rounded-2xl font-bold text-xs text-emerald-600 text-left flex justify-between items-center">
                                <span id="label-seller">Staff Penjual Item...</span>
                            </button>
                            <div class="flex gap-3">
                                <button onclick="openPicker('product')" class="flex-1 p-5 bg-white border-2 rounded-2xl font-bold text-left flex justify-between items-center">
                                    <span id="label-product">Cari Item...</span>
                                </button>
                                <input type="number" id="input-qty" value="1" min="1" class="w-20 p-5 bg-white border-2 rounded-2xl font-black text-center">
                                <button onclick="addToBill()" class="bg-emerald-500 text-white px-8 rounded-2xl font-black hover:bg-emerald-600 transition"><i class="fa fa-plus"></i></button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="w-full md:w-[400px] bg-slate-50 p-10 flex flex-col border-l">
                <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-6">Current Bill</h3>
                <div id="bill-items" class="flex-1 overflow-y-auto space-y-4 pr-2"></div>
                <div class="border-t-4 border-slate-900 pt-6 mt-6">
                    <div class="flex justify-between items-center mb-4">
                        <span class="text-xs font-black text-slate-400 uppercase">Grand Total</span>
                        <span id="grand-total" class="text-3xl font-black text-blue-600">Rp 0</span>
                    </div>
                    <button onclick="alert('Buka Modal Pembayaran...')" class="w-full bg-slate-900 text-white py-6 rounded-[2rem] font-black uppercase">Bayar</button>
                </div>
            </div>
        </div>
    </div>

    <div id="extra-time-modal" class="fixed inset-0 bg-black/90 hidden z-[80] flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-[3rem] max-w-xl w-full shadow-2xl">
            <h3 class="text-3xl font-black italic text-center mb-8 uppercase">Tambah <span class="text-yellow-500">Extra Time</span></h3>
            <div class="space-y-4">
                <button onclick="openPicker('therapist_extra')" class="w-full p-5 bg-slate-50 border-2 border-dashed rounded-2xl font-bold text-yellow-700 text-left flex justify-between items-center">
                    <span id="label-therapist-extra">Pilih Therapist Extra...</span>
                </button>
                <button onclick="openPicker('service_extra')" class="w-full p-5 bg-slate-50 border-2 border-dashed rounded-2xl font-bold text-slate-700 text-left flex justify-between items-center">
                    <span id="label-service-extra">Pilih Paket Extra...</span>
                </button>
                <div class="grid grid-cols-2 gap-4 mt-6">
                    <button onclick="processExtraTime()" class="bg-yellow-500 text-white py-5 rounded-2xl font-black uppercase">Konfirmasi</button>
                    <button onclick="document.getElementById('extra-time-modal').classList.add('hidden')" class="bg-slate-100 text-slate-400 py-5 rounded-2xl font-black uppercase">Batal</button>
                </div>
            </div>
        </div>
    </div>

    <div id="picker-modal" class="fixed inset-0 bg-black/60 hidden z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-2xl rounded-[3rem] shadow-2xl flex flex-col h-[70vh]">
            <div class="p-8 border-b flex justify-between items-center">
                <h3 id="picker-title" class="text-xl font-black uppercase tracking-tighter">Pilih Data</h3>
                <button onclick="closePicker()" class="text-slate-300 text-4xl">&times;</button>
            </div>
            <div class="flex-1 overflow-y-auto p-6">
                <table class="w-full"><tbody id="picker-table-body" class="font-bold"></tbody></table>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = "https://mbzoydcehhvjdqfefflo.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1iem95ZGNlaGh2amRxZmVmZmxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NzYzNjcsImV4cCI6MjA4ODQ1MjM2N30.q5Ok1HJEeUIh-93KoXuH0zYqRN4i3LcweRMG9pWJkRg";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let currentRoom = null, activeOrders = [], masterRoomsData = [], masterTherapists = [], masterServices = [], masterProducts = [];
        let selectedPicker = {}, selectedSellerId = null, selectedStaffHandleId = null, selectedExtra = { tId: null, sName: null, sPrice: 0, sDur: 0 };

        async function init() {
            await loadMasterData();
            loadRoomMap();
            setInterval(loadRoomMap, 10000);
            setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('id-ID'); }, 1000);
        }

        async function loadMasterData() {
            const out = document.getElementById('active-outlet').value;
            const { data: tps } = await _supabase.from('therapists').select('*').eq('outlet_name', out);
            masterTherapists = tps || [];
            const { data: svc } = await _supabase.from('services').select('*').eq('outlet_name', out);
            masterServices = svc || [];
            const { data: pd } = await _supabase.from('produk').select('*').eq('outlet_name', out);
            masterProducts = pd || [];
        }

        async function loadRoomMap() {
            const out = document.getElementById('active-outlet').value;
            const { data: rooms } = await _supabase.from('rooms').select('*').eq('outlet_name', out).order('name');
            masterRoomsData = rooms || [];
            const grid = document.getElementById('room-grid'); 
            grid.innerHTML = '';
            
            masterRoomsData.forEach(r => {
                let statusClass = 'room-standby', timeLabel = 'READY';
                if (r.status === 'occupied' && r.end_time) {
                    const diff = Math.floor((new Date(r.end_time) - new Date()) / 60000);
                    if (diff <= 0) { statusClass = 'room-overtime'; timeLabel = 'TIME OVER'; }
                    else if (diff <= 10) { statusClass = 'room-warning'; timeLabel = diff + 'm Left'; }
                    else { statusClass = 'room-progress'; timeLabel = diff + 'm Left'; }
                } else if (r.status === 'checked_out') {
                    statusClass = 'room-checkedout'; timeLabel = 'WAITING BILL';
                }

                const card = document.createElement('div');
                card.className = `${statusClass} p-8 rounded-[2rem] text-center shadow-lg cursor-pointer transform hover:scale-105 transition`;
                card.onclick = () => openModal(r);
                card.innerHTML = `<div class="text-[9px] font-black opacity-60 uppercase">${timeLabel}</div><h3 class="font-black text-2xl italic">${r.name}</h3>`;
                grid.appendChild(card);
            });
        }

        function openModal(r) {
            currentRoom = r;
            document.getElementById('modal-room-name').innerText = r.name;
            document.getElementById('pos-modal').classList.remove('hidden');
            const isOcc = r.status === 'occupied';
            document.getElementById('btn-start-massage').classList.toggle('hidden', isOcc);
            document.getElementById('btn-checkout-room').classList.toggle('hidden', !isOcc);
            document.getElementById('btn-extra-time').classList.toggle('hidden', !isOcc);
            fetchActiveBill(r.id);
        }

        async function fetchActiveBill(roomId) {
            const { data } = await _supabase.from('transaksi_spa').select('*').eq('room_id', roomId).eq('status_bayar', 'pending');
            activeOrders = data || [];
            let total = 0;
            document.getElementById('bill-items').innerHTML = activeOrders.map(i => {
                const sub = i.harga_satuan * i.qty;
                total += sub;
                return `
                    <div class="bg-white p-4 rounded-2xl border-2 flex justify-between items-center shadow-sm relative overflow-hidden">
                        <div class="absolute left-0 top-0 bottom-0 w-1 bg-emerald-500"></div>
                        <div class="flex items-center gap-3">
                            <i class="fa fa-check-circle text-emerald-500"></i>
                            <div>
                                <div class="text-[10px] font-black uppercase leading-tight">${i.nama_item}</div>
                                <div class="text-[10px] text-slate-400 font-bold">${i.qty} x Rp ${i.harga_satuan.toLocaleString()}</div>
                            </div>
                        </div>
                        <b class="text-sm font-black text-slate-700">Rp ${sub.toLocaleString()}</b>
                    </div>
                `;
            }).join('');
            document.getElementById('grand-total').innerText = `Rp ${total.toLocaleString()}`;
        }

        function openPicker(type) {
            selectedPicker.type = type;
            const body = document.getElementById('picker-table-body'); 
            body.innerHTML = '';
            let data = [];

            if (['therapist','therapist_extra','therapist_seller','staff_handle'].includes(type)) data = masterTherapists;
            else if (['service','service_extra'].includes(type)) data = masterServices;
            else data = masterProducts;

            data.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = "border-b hover:bg-blue-50 cursor-pointer";
                tr.onclick = () => {
                    const name = item.name || item.nama_produk;
                    const price = item.price || item.harga || 0;

                    if(type === 'staff_handle') { selectedStaffHandleId = item.t_id; document.getElementById('label-staff-handle').innerText = name; }
                    if(type === 'therapist') { selectedPicker.tId = item.t_id; document.getElementById('label-therapist').innerText = name; }
                    if(type === 'service') { selectedPicker.sName = name; selectedPicker.sPrice = price; selectedPicker.sDur = item.duration_minutes; document.getElementById('label-service').innerText = name; }
                    if(type === 'product') { selectedPicker.pName = name; selectedPicker.pPrice = price; document.getElementById('label-product').innerText = name; }
                    if(type === 'therapist_seller') { selectedSellerId = item.t_id; document.getElementById('label-seller').innerText = name; }
                    if(type === 'therapist_extra') { selectedExtra.tId = item.t_id; document.getElementById('label-therapist-extra').innerText = name; }
                    if(type === 'service_extra') { selectedExtra.sName = name; selectedExtra.sPrice = price; selectedExtra.sDur = item.duration_minutes; document.getElementById('label-service-extra').innerText = name; }
                    closePicker();
                };
                tr.innerHTML = `<td class="p-4 uppercase">${item.name || item.nama_produk}</td><td class="p-4 text-right">Rp ${(item.price || item.harga || 0).toLocaleString()}</td>`;
                body.appendChild(tr);
            });
            document.getElementById('picker-modal').classList.remove('hidden');
        }

        async function startSession() {
            if(!selectedStaffHandleId || !selectedPicker.tId || !selectedPicker.sName) return alert("Data Belum Lengkap!");
            const endTime = new Date(Date.now() + (selectedPicker.sDur * 60000)).toISOString();
            await _supabase.from('rooms').update({ status: 'occupied', therapist_id: selectedPicker.tId, end_time: endTime }).eq('id', currentRoom.id);
            await _supabase.from('therapists').update({ status: 'progress' }).eq('t_id', selectedPicker.tId);
            await _supabase.from('transaksi_spa').insert([{ 
                room_id: currentRoom.id, nama_item: selectedPicker.sName, harga_satuan: selectedPicker.sPrice, qty: 1, 
                status_bayar: 'pending', therapist_id: selectedPicker.tId, staff_handle_id: selectedStaffHandleId, outlet_name: document.getElementById('active-outlet').value
            }]);
            closeModal(); loadRoomMap();
        }

        async function addToBill() {
            if(!selectedPicker.pName || !selectedSellerId) return alert("Pilih Produk & Penjual!");
            const qty = parseInt(document.getElementById('input-qty').value);
            const item = { 
                room_id: currentRoom.id, nama_item: selectedPicker.pName, harga_satuan: selectedPicker.pPrice, qty: qty,
                status_bayar: 'pending', therapist_id: selectedSellerId, outlet_name: document.getElementById('active-outlet').value
            };
            await _supabase.from('transaksi_spa').insert([item]);
            printOrderTicket(item); // Auto-Print
            document.getElementById('label-product').innerText = "Cari Item...";
            selectedPicker.pName = null;
            fetchActiveBill(currentRoom.id);
        }

        async function processExtraTime() {
            if(!selectedExtra.tId || !selectedExtra.sName) return alert("Pilih Therapist & Paket!");
            const baseTime = (new Date(currentRoom.end_time) > new Date()) ? new Date(currentRoom.end_time) : new Date();
            const newEndTime = new Date(baseTime.getTime() + (selectedExtra.sDur * 60000)).toISOString();
            await _supabase.from('rooms').update({ end_time: newEndTime, status: 'occupied' }).eq('id', currentRoom.id);
            await _supabase.from('transaksi_spa').insert([{ 
                room_id: currentRoom.id, nama_item: "[EXTRA] " + selectedExtra.sName, harga_satuan: selectedExtra.sPrice, qty: 1, 
                status_bayar: 'pending', therapist_id: selectedExtra.tId, outlet_name: document.getElementById('active-outlet').value
            }]);
            alert("Extra Time Ditambahkan!");
            document.getElementById('extra-time-modal').classList.add('hidden');
            closeModal(); loadRoomMap();
        }

        async function checkoutRoom() {
            const { data: room } = await _supabase.from('rooms').select('therapist_id').eq('id', currentRoom.id).single();
            if(room.therapist_id) await _supabase.from('therapists').update({ status: 'standby' }).eq('t_id', room.therapist_id);
            await _supabase.from('rooms').update({ status: 'checked_out', end_time: null }).eq('id', currentRoom.id);
            closeModal(); loadRoomMap();
        }

        function printOrderTicket(item) {
            const win = window.open('', 'PRINT', 'height=400,width=300');
            win.document.write(`<html><body style="font-family:monospace;width:58mm;font-size:12px;">
                <center><b>ORDER PESANAN</b><br>${currentRoom.name}</center><hr>
                ${new Date().toLocaleTimeString()}<br><b>${item.nama_item} x${item.qty}</b><hr>
                <small>Staff: ${document.getElementById('label-seller').innerText}</small>
            </body></html>`);
            win.document.close(); win.print(); win.close();
        }

        function openExtraTimeModal() { document.getElementById('extra-time-modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('pos-modal').classList.add('hidden'); }
        function closePicker() { document.getElementById('picker-modal').classList.add('hidden'); }

        init();
    </script>
</body>
</html>

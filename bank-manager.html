<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank & Payment Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f1f5f9; }
        .card-gradient { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); }
    </style>
</head>
<body class="p-8">

    <div class="max-w-5xl mx-auto">
        <header class="mb-10 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-black tracking-tighter text-slate-800 uppercase italic">Bank <span class="text-blue-600">Manager</span></h1>
                <p class="text-xs font-bold text-slate-400 tracking-widest uppercase">Pengaturan Metode Pembayaran Non-Tunai</p>
            </div>
            <button onclick="showAddModal()" class="bg-blue-600 text-white px-6 py-3 rounded-2xl font-black text-xs uppercase shadow-lg shadow-blue-200 hover:bg-black transition">
                + Tambah Metode
            </button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="card-gradient p-6 rounded-[2rem] text-white shadow-xl">
                <p class="text-[10px] font-bold opacity-60 uppercase tracking-widest">Total Metode</p>
                <h3 id="stat-total" class="text-4xl font-black italic">0</h3>
            </div>
            <div class="bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Status Sistem</p>
                <h3 class="text-xl font-black text-emerald-500 italic uppercase mt-1">Ready for POS</h3>
            </div>
        </div>

        <div class="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-50 border-b">
                    <tr class="text-[10px] font-black text-slate-400 uppercase tracking-widest">
                        <th class="p-6">Metode / Bank</th>
                        <th class="p-6">No. Rekening / Keterangan</th>
                        <th class="p-6">Status</th>
                        <th class="p-6 text-center">Aksi</th>
                    </tr>
                </thead>
                <tbody id="bank-table-body" class="text-sm font-bold text-slate-700">
                    </tbody>
            </table>
        </div>
    </div>

    <div id="bank-modal" class="fixed inset-0 bg-slate-900/60 hidden z-50 flex items-center justify-center p-4 backdrop-blur-sm">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl">
            <h3 class="text-xl font-black text-slate-800 mb-6 uppercase italic">Detail Pembayaran</h3>
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Nama Bank/E-Wallet (Contoh: BCA, QRIS)</label>
                    <input type="text" id="b-name" placeholder="Contoh: MANDIRI" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-400 uppercase ml-2">Nomor Rekening (Opsional)</label>
                    <input type="text" id="b-account" placeholder="Contoh: 8820xxxxx" class="w-full p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-bold outline-none focus:border-blue-500">
                </div>
                <div class="flex gap-3 pt-4">
                    <button onclick="closeModal()" class="flex-1 py-4 font-black text-slate-400 uppercase text-xs">Batal</button>
                    <button onclick="saveBank()" class="flex-1 bg-blue-600 text-white py-4 rounded-2xl font-black uppercase text-xs shadow-lg">Simpan</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = "https://mbzoydcehhvjdqfefflo.supabase.co"; 
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1iem95ZGNlaGh2amRxZmVmZmxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4NzYzNjcsImV4cCI6MjA4ODQ1MjM2N30.q5Ok1HJEeUIh-93KoXuH0zYqRN4i3LcweRMG9pWJkRg";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        async function init() {
            await loadBanks();
        }

        async function loadBanks() {
            const { data, error } = await _supabase.from('banks').select('*').order('name');
            const tbody = document.getElementById('bank-table-body');
            tbody.innerHTML = '';

            if (data) {
                document.getElementById('stat-total').innerText = data.length;
                data.forEach(b => {
                    tbody.innerHTML += `
                        <tr class="border-b hover:bg-slate-50 transition">
                            <td class="p-6 uppercase font-black italic text-blue-600 text-base">${b.name}</td>
                            <td class="p-6 font-mono text-slate-500">${b.account_number || '-'}</td>
                            <td class="p-6">
                                <span class="${b.is_active ? 'text-emerald-500' : 'text-red-400'} text-[10px] font-black uppercase tracking-widest">
                                    ● ${b.is_active ? 'Aktif' : 'Non-Aktif'}
                                </span>
                            </td>
                            <td class="p-6 text-center space-x-3">
                                <button onclick="toggleStatus(${b.id}, ${b.is_active})" class="text-slate-400 hover:text-blue-600"><i class="fa fa-sync"></i></button>
                                <button onclick="deleteBank(${b.id})" class="text-slate-400 hover:text-red-500"><i class="fa fa-trash-can"></i></button>
                            </td>
                        </tr>
                    `;
                });
            }
        }

        async function saveBank() {
            const name = document.getElementById('b-name').value;
            const account = document.getElementById('b-account').value;

            if(!name) return alert("Nama Bank wajib diisi!");

            const { error } = await _supabase.from('banks').insert([{ 
                name: name, 
                account_number: account,
                is_active: true 
            }]);

            if (error) alert(error.message);
            closeModal();
            loadBanks();
        }

        async function toggleStatus(id, currentStatus) {
            await _supabase.from('banks').update({ is_active: !currentStatus }).eq('id', id);
            loadBanks();
        }

        async function deleteBank(id) {
            if(confirm('Hapus metode pembayaran ini?')) {
                await _supabase.from('banks').delete().eq('id', id);
                loadBanks();
            }
        }

        function showAddModal() { 
            document.getElementById('b-name').value = '';
            document.getElementById('b-account').value = '';
            document.getElementById('bank-modal').classList.remove('hidden'); 
        }
        function closeModal() { document.getElementById('bank-modal').classList.add('hidden'); }

        init();
    </script>
</body>
</html>
